<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Who We Are — Toren by ImperAI</title>
    <meta property="og:title" content="Who We Are — Toren by ImperAI" />
    <meta property="og:description" content="The team building Toren — enterprise AI governance infrastructure." />
    <meta property="og:image" content="https://imperai.ai/og-image.png" />
    <meta property="og:url" content="https://imperai.ai/who-we-are.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://imperai.ai/og-image.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      @font-face {
        font-family: 'SUIT';
        src: url('fonts/SUIT-Variable.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Jost Variable';
        src: url('fonts/Jost-Variable.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Jost Variable';
        src: url('fonts/Jost-Variable-Italic.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: italic;
        font-display: swap;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      :root {
        --obsidian: #0a0a0a;
        --navy: #1b2a4e;
        --authority: #2c4270;
        --slate: #5e6675;
        --mist: #a8adb7;
        --hairline: #d9d6ce;
        --ivory: #f7f6f2;
        --white: #ffffff;
        --font-en: 'Jost Variable', sans-serif;
        --font-kr: 'SUIT', sans-serif;
        --t-display: clamp(32px, 4.5vw, 60px);
        --t-h1: clamp(26px, 3.4vw, 48px);
        --t-h2: clamp(20px, 2.5vw, 34px);
        --t-h2-sm: clamp(18px, 2vw, 26px);
        --t-h3: 18px;
        --wrap: 1200px;
        --col-wide: 1080px;
        --col-text: 720px;
        --col-narrow: 520px;
        --pad-v: 120px;
        --pad-h: 72px;
      }
      body.ko {
        --t-display: clamp(30px, 4.2vw, 56px);
        --t-h1: clamp(24px, 3.1vw, 44px);
        --t-h2: clamp(18px, 2.3vw, 31px);
        --t-h2-sm: clamp(17px, 1.85vw, 24px);
        --t-h3: 17px;
      }
      body {
        background: var(--white);
        color: var(--obsidian);
        font-family: var(--font-en);
        font-weight: 400;
        line-height: 1.7;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        word-break: keep-all;
        overflow-wrap: break-word;
      }

      /* ── NAV ── */
      #nav {
        position: fixed;
        inset: 0 0 auto;
        z-index: 300;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 52px;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid transparent;
        transition: border-color 0.4s;
      }
      #nav.scrolled {
        border-color: var(--hairline);
      }
      .logo {
        text-decoration: none;
        display: flex;
        align-items: center;
      }
      .logo-img {
        height: 44px;
        width: auto;
        display: block;
      }
      .logo-light {
        display: none;
      }
      .nav-links {
        display: flex;
        gap: 40px;
        list-style: none;
      }
      .nav-links a {
        font-size: 15px;
        color: var(--slate);
        text-decoration: none;
        transition: color 0.2s;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--obsidian);
      }
      .nav-end {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .lang-switch {
        display: flex;
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 40px;
        padding: 3px;
        gap: 1px;
      }
      .lang-switch button {
        font-size: 10px;
        letter-spacing: 0.1em;
        padding: 4px 12px;
        border-radius: 40px;
        border: none;
        background: transparent;
        color: var(--mist);
        cursor: pointer;
        transition: all 0.2s;
      }
      .lang-switch button.on {
        background: var(--navy);
        color: var(--white);
      }
      .nav-cta {
        font-size: 11px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--white);
        text-decoration: none;
        padding: 9px 22px;
        background: var(--navy);
        border: 1px solid var(--navy);
        border-radius: 2px;
        transition: all 0.22s;
        white-space: nowrap;
        min-width: 170px;
        text-align: center;
        display: inline-block;
        box-sizing: border-box;
      }
      .nav-cta:hover {
        background: var(--authority);
        border-color: var(--authority);
      }
      .burger {
        display: none;
        flex-direction: column;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
      }
      .burger span {
        display: block;
        width: 20px;
        height: 1px;
        background: var(--obsidian);
      }
      .mob-nav {
        display: none;
        position: fixed;
        top: 80px;
        left: 0;
        right: 0;
        background: var(--white);
        border-bottom: 1px solid var(--hairline);
        padding: 20px 28px 28px;
        z-index: 299;
        flex-direction: column;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      }
      .mob-nav.open {
        display: flex;
      }
      .mob-nav a {
        font-size: 15px;
        color: var(--obsidian);
        font-weight: 500;
        text-decoration: none;
        padding: 15px 0;
        border-bottom: 1px solid var(--hairline);
      }
      .mob-bottom {
        margin-top: 24px;
        display: flex;
        align-items: center;
      }

      /* ── ANIMATIONS ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade {
        opacity: 0;
        transform: translateY(18px);
        transition:
          opacity 0.75s ease,
          transform 0.75s ease;
      }
      .fade.in {
        opacity: 1;
        transform: translateY(0);
      }
      .fd1 {
        transition-delay: 0.1s;
      }
      .fd2 {
        transition-delay: 0.2s;
      }
      .fd3 {
        transition-delay: 0.3s;
      }

      /* ── PAGE HERO ── */
      .wwa-hero {
        padding: 140px var(--pad-h) 96px;
        border-bottom: 1px solid var(--hairline);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
        align-items: end;
      }
      .wwa-eyebrow {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
      }
      .wwa-eyebrow::before {
        content: '';
        width: 28px;
        height: 1px;
        background: var(--navy);
      }
      .wwa-title {
        font-family: var(--font-en);
        font-size: var(--t-display);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.12;
        letter-spacing: 0.02em;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;
      }
      .wwa-title em {
        font-style: italic;
      }
      .wwa-intro {
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
      }
      .wwa-intro-p {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        margin-bottom: 20px;
      }
      .wwa-intro-p b {
        color: var(--obsidian);
        font-weight: 600;
      }
      body.ko .wwa-title {
        font-family: var(--font-kr);
        font-weight: 400;
        line-height: 1.35;
        letter-spacing: -0.01em;
      }
      body.ko .wwa-title em {
        font-style: normal;
      }

      /* ── ORIGIN QUOTE ── */
      .origin-quote {
        background: var(--navy);
        padding: 80px var(--pad-h);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .origin-inner {
        max-width: var(--col-text);
      }
      .quote-glyph {
        display: block;
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 100px;
        line-height: 0.75;
        color: rgba(255, 255, 255, 0.08);
        margin-bottom: -4px;
        user-select: none;
      }
      .quote-text {
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-style: italic;
        color: rgba(255, 255, 255, 0.88);
        line-height: 1.8;
        letter-spacing: 0.01em;
        margin-bottom: 28px;
      }
      body.ko .quote-text {
        font-family: var(--font-kr);
        font-style: normal;
        font-weight: 400;
      }
      .quote-attr {
        font-size: 10px;
        letter-spacing: 0.14em;
        color: rgba(255, 255, 255, 0.36);
        text-transform: uppercase;
        font-family: var(--font-en);
      }

      /* ── TRUST BAND ── */
      .trust-band {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border-bottom: 1px solid var(--hairline);
      }
      .trust-item {
        padding: 44px var(--pad-h);
        border-right: 1px solid var(--hairline);
      }
      .trust-item:last-child {
        border-right: none;
      }
      .trust-n {
        display: block;
        font-family: var(--font-en);
        font-size: clamp(28px, 3.5vw, 44px);
        font-weight: 300;
        color: var(--navy);
        letter-spacing: -0.02em;
        line-height: 1;
        margin-bottom: 10px;
      }
      .trust-l {
        font-size: 10px;
        letter-spacing: 0.1em;
        color: var(--mist);
        text-transform: uppercase;
        line-height: 1.6;
      }
      body.ko .trust-l {
        font-family: var(--font-kr);
        letter-spacing: 0.04em;
      }

      /* ── SECTIONS ── */
      .wwa-section {
        padding: var(--pad-v) var(--pad-h);
        border-bottom: 1px solid var(--hairline);
      }
      .wwa-section.ivory {
        background: var(--ivory);
      }
      .section-label {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.3;
        letter-spacing: 0.02em;
        margin-bottom: 56px;
        display: block;
      }
      body.ko .section-label {
        font-family: var(--font-kr);
        font-weight: 500;
        line-height: 1.45;
      }

      /* ── PILLARS (vertical stack) ── */
      .wwa-pillars {
        display: flex;
        flex-direction: column;
        max-width: var(--col-wide);
      }
      .wwa-pillar {
        display: grid;
        grid-template-columns: 108px 1fr;
        gap: 48px;
        padding: 52px 0;
        border-bottom: 1px solid var(--hairline);
        background: transparent;
      }
      .wwa-pillar:first-child {
        border-top: 1px solid var(--hairline);
      }
      .pillar-n {
        font-family: var(--font-en);
        font-size: clamp(52px, 6vw, 80px);
        font-weight: 300;
        color: var(--hairline);
        letter-spacing: -0.04em;
        line-height: 1;
        padding-top: 6px;
      }
      .pillar-right {
        display: flex;
        flex-direction: column;
        padding-top: 8px;
      }
      .pillar-title {
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.35;
        letter-spacing: 0.01em;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--hairline);
        margin-bottom: 18px;
      }
      body.ko .pillar-title {
        font-family: var(--font-kr);
        font-weight: 500;
      }
      .pillar-body {
        font-size: 14px;
        color: var(--slate);
        line-height: 1.85;
      }
      .pillar-body b {
        color: var(--obsidian);
        font-weight: 600;
      }

      /* ── TEAM (horizontal cards) ── */
      .wwa-team-grid {
        display: flex;
        flex-direction: column;
        gap: 24px;
        max-width: var(--col-wide);
        margin-top: 0;
      }
      .wwa-member {
        display: grid;
        grid-template-columns: 240px 1fr;
        border: 1px solid var(--hairline);
        border-radius: 2px;
        overflow: hidden;
        transition:
          box-shadow 0.3s,
          border-color 0.3s;
      }
      .wwa-member:hover {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        border-color: var(--mist);
      }
      .member-photo {
        overflow: hidden;
        background: var(--ivory);
        align-self: stretch;
      }
      .member-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
        display: block;
        filter: grayscale(100%);
        transition: filter 0.55s ease;
        min-height: 300px;
      }
      .wwa-member:hover .member-photo img {
        filter: grayscale(0%);
      }
      .member-body {
        padding: 36px 40px 32px;
        display: flex;
        flex-direction: column;
      }
      .member-role {
        font-family: var(--font-en);
        font-size: 9px;
        letter-spacing: 0.2em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .member-name {
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-weight: 400;
        color: var(--obsidian);
        letter-spacing: 0.02em;
        margin-bottom: 16px;
        line-height: 1.25;
      }
      body.ko .member-name {
        font-family: var(--font-kr);
        font-weight: 500;
      }
      .member-bio {
        font-size: 14px;
        color: var(--slate);
        line-height: 1.8;
        margin-bottom: 20px;
      }
      body.ko .member-bio {
        font-family: var(--font-kr);
      }
      .member-org-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }
      .org-pill {
        font-family: var(--font-en);
        font-size: 9px;
        letter-spacing: 0.07em;
        color: var(--slate);
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 3px 10px;
        white-space: nowrap;
      }
      .member-edu {
        font-size: 11px;
        color: var(--mist);
        letter-spacing: 0.02em;
        line-height: 1.55;
        margin-bottom: 28px;
      }
      body.ko .member-edu {
        font-family: var(--font-kr);
      }
      .member-linkedin {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: auto;
        font-family: var(--font-en);
        font-size: 10px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--navy);
        text-decoration: none;
        text-transform: uppercase;
        width: fit-content;
        transition: opacity 0.2s;
      }
      .member-linkedin:hover {
        opacity: 0.6;
      }
      .member-linkedin svg {
        flex-shrink: 0;
      }

      /* ── DUAL CTA ── */
      .wwa-cta-dual {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .cta-half {
        padding: var(--pad-v) var(--pad-h);
      }
      .cta-half.navy {
        background: var(--navy);
        border-right: 1px solid rgba(255, 255, 255, 0.07);
      }
      .cta-half.dark {
        background: var(--obsidian);
      }
      .cta-label {
        font-family: var(--font-en);
        font-size: 9px;
        letter-spacing: 0.2em;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.32);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .cta-label::before {
        content: '';
        width: 20px;
        height: 1px;
        background: rgba(255, 255, 255, 0.2);
        flex-shrink: 0;
      }
      .cta-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-weight: 400;
        color: rgba(255, 255, 255, 0.88);
        line-height: 1.5;
        letter-spacing: 0.01em;
        max-width: 400px;
        margin-bottom: 36px;
      }
      body.ko .cta-h2 {
        font-family: var(--font-kr);
        font-weight: 400;
      }
      .cta-btn {
        font-family: var(--font-en);
        font-size: 11px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--navy);
        background: var(--white);
        text-decoration: none;
        padding: 12px 28px;
        border-radius: 2px;
        border: 1px solid var(--white);
        transition: all 0.2s;
        display: inline-block;
      }
      .cta-half.dark .cta-btn {
        color: var(--obsidian);
      }
      .cta-btn:hover {
        background: var(--ivory);
        border-color: var(--ivory);
      }

      /* ── FOOTER ── */
      footer {
        background: var(--obsidian);
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        padding: 32px var(--pad-h);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }
      .foot-logo img {
        height: 40px;
        width: auto;
        display: block;
      }
      .foot-copy {
        font-size: 9.5px;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.6);
      }
      .foot-links {
        display: flex;
        gap: 28px;
      }
      .foot-links a {
        font-size: 9.5px;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.65);
        text-decoration: none;
        transition: color 0.2s;
      }
      .foot-links a:hover {
        color: rgba(255, 255, 255, 0.9);
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 960px) {
        :root {
          --pad-v: 80px;
          --pad-h: 28px;
        }
        #nav {
          padding: 0 28px;
          height: 72px;
        }
        .nav-links,
        .nav-cta,
        #nav .lang-switch {
          display: none;
        }
        .burger {
          display: flex;
        }
        .mob-nav {
          top: 72px;
        }
        .wwa-hero {
          grid-template-columns: 1fr;
          gap: 32px;
          padding: 112px var(--pad-h) 52px;
        }
        .trust-band {
          grid-template-columns: repeat(3, 1fr);
        }
        .trust-item {
          padding: 32px var(--pad-h);
        }
        .wwa-pillars {
          gap: 0;
        }
        .wwa-pillar {
          grid-template-columns: 72px 1fr;
          gap: 28px;
          padding: 36px 0;
        }
        .wwa-member {
          grid-template-columns: 180px 1fr;
        }
        .member-photo img {
          min-height: 240px;
        }
        .member-body {
          padding: 28px 28px 24px;
        }
        .wwa-cta-dual {
          grid-template-columns: 1fr;
        }
        .cta-half.navy {
          border-right: none;
          border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }
        footer {
          padding: 24px var(--pad-h);
          flex-direction: column;
          align-items: flex-start;
          gap: 16px;
        }
        .foot-links {
          flex-wrap: wrap;
        }
      }
      @media (max-width: 560px) {
        :root {
          --pad-v: 56px;
          --pad-h: 20px;
        }
        .wwa-hero {
          padding: 100px var(--pad-h) 40px;
        }
        .trust-band {
          grid-template-columns: 1fr;
        }
        .trust-item {
          border-right: none;
          border-bottom: 1px solid var(--hairline);
          padding: 28px var(--pad-h);
        }
        .trust-item:last-child {
          border-bottom: none;
        }
        .wwa-pillar {
          grid-template-columns: 1fr;
          gap: 8px;
          padding: 32px 0;
        }
        .pillar-n {
          font-size: 32px;
        }
        .pillar-right {
          padding-top: 0;
        }
        .wwa-member {
          grid-template-columns: 1fr;
        }
        .member-photo {
          height: 280px;
        }
        .member-photo img {
          min-height: unset;
          height: 100%;
        }
        .member-body {
          padding: 24px 20px 20px;
        }
      }
    </style>
  </head>
  <body>
    <nav id="nav">
      <a
        href="#"
        class="logo"
        onclick="
          goIndex();
          return false;
        "
      >
        <img class="logo-img logo-dark" src="logo-dark.png" alt="Toren" />
        <img class="logo-img logo-light" src="logo-light.png" alt="Toren" />
      </a>
      <ul class="nav-links">
