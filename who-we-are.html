<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Who We Are — Toren by ImperAI</title>
    <meta property="og:title" content="Who We Are — Toren by ImperAI" />
    <meta property="og:description" content="The team building Toren — enterprise AI governance infrastructure." />
    <meta property="og:image" content="https://imperai.ai/og-image.png" />
    <meta property="og:url" content="https://imperai.ai/who-we-are.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://imperai.ai/og-image.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* ── PAGE HERO ── */
      .wwa-hero {
        padding: 160px var(--pad-h) 120px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
        align-items: start;
        position: relative;
        min-height: 80svh;
        background: url('assets/wwa_hero.webp') center center / cover no-repeat;
      }
      .wwa-hero::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(8, 10, 18, 0.62) 0%, rgba(8, 10, 18, 0.78) 100%);
        pointer-events: none;
      }
      .wwa-hero > * {
        position: relative;
        z-index: 1;
      }
      .wwa-eyebrow {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.55);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
      }
      .wwa-eyebrow::before {
        content: '';
        width: 28px;
        height: 1px;
        background: rgba(255, 255, 255, 0.35);
      }
      .wwa-title {
        font-family: var(--font-en);
        font-size: var(--t-display);
        font-weight: 400;
        color: var(--white);
        line-height: 1.12;
        letter-spacing: 0.02em;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;
      }
      .wwa-title em {
        font-style: italic;
      }
      .wwa-intro {
        padding-top: 44px;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
      }
      .wwa-intro-p {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.65);
        line-height: 1.9;
        margin-bottom: 20px;
      }
      .wwa-intro-p b {
        color: var(--white);
        font-weight: 600;
      }
      body.ko .wwa-title {
        font-family: var(--font-kr);
        font-weight: 400;
        line-height: 1.35;
        letter-spacing: -0.01em;
      }
      body.ko .wwa-title em {
        font-style: normal;
      }

      /* ── SECTIONS ── */
      .wwa-section {
        padding: var(--pad-v) var(--pad-h);
        border-bottom: 1px solid var(--hairline);
      }
      .wwa-section.ivory {
        background: var(--ivory);
      }
      .section-label {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.3;
        letter-spacing: 0.02em;
        margin-bottom: 56px;
        display: block;
      }
      body.ko .section-label {
        font-family: var(--font-kr);
        font-weight: 500;
        line-height: 1.45;
      }

      /* ── PILLARS (horizontal 3-col) ── */
      .wwa-pillars {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        max-width: var(--col-wide);
        border-top: 1px solid var(--hairline);
      }
      .wwa-pillar {
        display: flex;
        flex-direction: column;
        padding: 40px 40px 40px 0;
        border-right: 1px solid var(--hairline);
        background: transparent;
      }
      .wwa-pillar:not(:first-child) {
        padding-left: 40px;
      }
      .wwa-pillar:last-child {
        border-right: none;
        padding-right: 0;
      }
      .pillar-n {
        font-family: var(--font-en);
        font-size: 28px;
        font-weight: 300;
        color: var(--hairline);
        letter-spacing: -0.04em;
        line-height: 1;
        margin-bottom: 20px;
      }
      .pillar-right {
        display: flex;
        flex-direction: column;
      }
      .pillar-title {
        font-family: var(--font-en);
        font-size: var(--t-h3);
        font-weight: 500;
        color: var(--obsidian);
        line-height: 1.4;
        letter-spacing: 0.01em;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--hairline);
        margin-bottom: 14px;
      }
      body.ko .pillar-title {
        font-family: var(--font-kr);
        font-weight: 600;
      }
      .pillar-body {
        font-size: 13px;
        color: var(--slate);
        line-height: 1.8;
      }
      .pillar-body b {
        color: var(--obsidian);
        font-weight: 600;
      }

      /* ── TEAM (horizontal cards) ── */
      .wwa-team-grid {
        display: flex;
        flex-direction: column;
        gap: 48px;
        max-width: var(--col-wide);
        margin-top: 0;
      }
      .wwa-member {
        display: grid;
        grid-template-columns: 220px 1fr;
        border: 1px solid var(--hairline);
        border-radius: 2px;
        overflow: hidden;
        transition:
          box-shadow 0.3s,
          border-color 0.3s;
      }
      .wwa-member:hover {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        border-color: var(--mist);
      }
      .member-photo {
        overflow: hidden;
        background: var(--ivory);
        align-self: start;
        height: 280px;
      }
      .member-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 15%;
        display: block;
        filter: grayscale(100%);
        transition: filter 0.55s ease;
      }
      .wwa-member:hover .member-photo img {
        filter: grayscale(0%);
      }
      .member-body {
        padding: 28px 32px;
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 32px;
        align-items: start;
      }
      .member-left {
        display: flex;
        flex-direction: column;
      }
      .member-right {
        display: flex;
        flex-direction: column;
        border-left: 1px solid var(--hairline);
        padding-left: 32px;
      }
      .member-role {
        font-family: var(--font-en);
        font-size: 9px;
        letter-spacing: 0.2em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .member-name {
        margin-bottom: 14px;
        line-height: 1;
      }
      .member-name-pri {
        display: block;
        font-family: var(--font-en);
        font-size: clamp(16px, 1.6vw, 22px);
        font-weight: 400;
        color: var(--obsidian);
        letter-spacing: 0.02em;
        line-height: 1.2;
      }
      body.ko .member-name-pri {
        font-family: var(--font-kr);
        font-weight: 500;
        letter-spacing: -0.01em;
      }
      .member-name-sec {
        display: block;
        font-family: var(--font-en);
        font-size: 12px;
        font-weight: 400;
        color: var(--mist);
        letter-spacing: 0.03em;
        margin-top: 5px;
      }
      body.ko .member-name-sec {
        font-family: var(--font-kr);
        letter-spacing: 0;
      }
      .member-bio {
        font-size: 13px;
        color: var(--slate);
        line-height: 1.75;
        margin-bottom: 16px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--hairline);
      }
      body.ko .member-bio {
        font-family: var(--font-kr);
      }
      /* Experience list */
      .member-exp-label {
        font-family: var(--font-en);
        font-size: 9px;
        letter-spacing: 0.18em;
        font-weight: 700;
        color: var(--mist);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .member-exp {
        display: flex;
        flex-direction: column;
        border-top: 1px solid var(--hairline);
        margin-bottom: 16px;
      }
      .exp-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 4px 16px;
        padding: 13px 0;
        border-bottom: 1px solid var(--hairline);
        align-items: start;
      }
      .exp-org {
        font-family: var(--font-en);
        font-size: 14px;
        font-weight: 600;
        color: var(--obsidian);
        letter-spacing: 0.01em;
        grid-column: 1;
        grid-row: 1;
      }
      .exp-ctx {
        font-family: var(--font-en);
        font-size: 11px;
        color: var(--mist);
        font-style: italic;
        line-height: 1.4;
        grid-column: 1;
        grid-row: 2;
      }
      body.ko .exp-ctx {
        font-family: var(--font-kr);
        font-style: normal;
      }
      .exp-role {
        font-family: var(--font-en);
        font-size: 12px;
        color: var(--slate);
        text-align: right;
        grid-column: 2;
        grid-row: 1 / 3;
        align-self: center;
        white-space: nowrap;
      }
      body.ko .exp-role {
        font-family: var(--font-kr);
      }
      .member-edu {
        font-size: 11px;
        color: var(--mist);
        letter-spacing: 0.02em;
        line-height: 1.6;
        margin-bottom: 18px;
      }
      body.ko .member-edu {
        font-family: var(--font-kr);
      }
      .member-linkedin {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: auto;
        font-family: var(--font-en);
        font-size: 10px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--navy);
        text-decoration: none;
        text-transform: uppercase;
        width: fit-content;
        transition: opacity 0.2s;
      }
      .member-linkedin:hover {
        opacity: 0.6;
      }
      .member-linkedin svg {
        flex-shrink: 0;
      }

      /* ── DUAL CTA ── */
      .wwa-cta-dual {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .cta-half {
        padding: var(--pad-v) var(--pad-h);
      }
      .cta-half.navy {
        background: var(--navy);
        border-right: 1px solid rgba(255, 255, 255, 0.07);
      }
      .cta-half.dark {
        background: var(--obsidian);
      }
      .cta-label {
        font-family: var(--font-en);
        font-size: 9px;
        letter-spacing: 0.2em;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.32);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .cta-label::before {
        content: '';
        width: 20px;
        height: 1px;
        background: rgba(255, 255, 255, 0.2);
        flex-shrink: 0;
      }
      .cta-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-weight: 400;
        color: rgba(255, 255, 255, 0.88);
        line-height: 1.5;
        letter-spacing: 0.01em;
        max-width: 400px;
        margin-bottom: 36px;
      }
      body.ko .cta-h2 {
        font-family: var(--font-kr);
        font-weight: 400;
      }
      .cta-btn {
        font-family: var(--font-en);
        font-size: 11px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--navy);
        background: var(--white);
        text-decoration: none;
        padding: 12px 28px;
        border-radius: 2px;
        border: 1px solid var(--white);
        transition: all 0.2s;
        display: inline-block;
      }
      .cta-half.dark .cta-btn {
        color: var(--obsidian);
      }
      .cta-btn:hover {
        background: var(--ivory);
        border-color: var(--ivory);
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 960px) {
        .wwa-hero {
          grid-template-columns: 1fr;
          gap: 32px;
          padding: 112px var(--pad-h) 52px;
        }
        .trust-band {
          grid-template-columns: repeat(3, 1fr);
        }
        .trust-item {
          padding: 32px var(--pad-h);
        }
        .wwa-pillars {
          grid-template-columns: 1fr;
        }
        .wwa-pillar {
          padding: 32px 0;
          border-right: none;
          border-bottom: 1px solid var(--hairline);
        }
        .wwa-pillar:not(:first-child) {
          padding-left: 0;
        }
        .wwa-pillar:last-child {
          border-bottom: none;
          padding-right: 0;
        }
        .wwa-member {
          grid-template-columns: 150px 1fr;
        }
        .member-photo {
          height: 240px;
        }
        .member-body {
          grid-template-columns: 1fr;
          padding: 20px 24px 18px;
        }
        .member-right {
          border-left: none;
          border-top: 1px solid var(--hairline);
          padding-left: 0;
          padding-top: 16px;
        }
        .wwa-cta-dual {
          grid-template-columns: 1fr;
        }
        .cta-half.navy {
          border-right: none;
          border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }
      }
      @media (max-width: 560px) {
        .wwa-hero {
          padding: 100px var(--pad-h) 40px;
        }
        .trust-band {
          grid-template-columns: 1fr;
        }
        .trust-item {
          border-right: none;
          border-bottom: 1px solid var(--hairline);
          padding: 28px var(--pad-h);
        }
        .trust-item:last-child {
          border-bottom: none;
        }
        .wwa-pillar {
          grid-template-columns: 1fr;
          gap: 8px;
          padding: 32px 0;
        }
        .pillar-n {
          font-size: 32px;
        }
        .pillar-right {
          padding-top: 0;
        }
        .wwa-member {
          grid-template-columns: 1fr;
        }
        .member-photo {
          height: 280px;
        }
        .member-photo img {
          min-height: unset;
          height: 100%;
        }
        .member-body {
          padding: 24px 20px 20px;
        }
      }
    </style>
  </head>
