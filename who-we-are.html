<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Who We Are — Toren by ImperAI</title>
    <meta property="og:title" content="Who We Are — Toren by ImperAI" />
    <meta property="og:description" content="The team building Toren — enterprise AI governance infrastructure." />
    <meta property="og:image" content="https://imperai.ai/og-image.png" />
    <meta property="og:url" content="https://imperai.ai/who-we-are.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://imperai.ai/og-image.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      @font-face {
        font-family: 'SUIT';
        src: url('fonts/SUIT-Variable.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Jost Variable';
        src: url('fonts/Jost-Variable.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Jost Variable';
        src: url('fonts/Jost-Variable-Italic.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: italic;
        font-display: swap;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      :root {
        --obsidian: #0a0a0a;
        --navy: #1b2a4e;
        --authority: #2c4270;
        --slate: #5e6675;
        --mist: #a8adb7;
        --hairline: #d9d6ce;
        --ivory: #f7f6f2;
        --white: #ffffff;
        --font-en: 'Jost Variable', sans-serif;
        --font-kr: 'SUIT', sans-serif;
        /* ── TYPE SCALE — visual-normalized, EN base ── */
        --t-display: clamp(32px, 4.5vw, 60px);
        --t-h1: clamp(26px, 3.4vw, 48px);
        --t-h2: clamp(20px, 2.5vw, 34px);
        --t-h2-sm: clamp(18px, 2vw, 26px);
        --t-h3: 18px;
        /* ── LAYOUT ── */
        --wrap: 1200px;
        --col-wide: 1080px;
        --col-text: 720px;
        --col-narrow: 520px;
        --pad-v: 120px;
        --pad-h: 72px;
      }

      /* ── KO TYPE SCALE: SUIT fills em square more completely than Century Gothic */
      /* Consistent ~8% reduction maintains visual parity across EN/KO toggle */
      body.ko {
        --t-display: clamp(30px, 4.2vw, 56px);
        --t-h1: clamp(24px, 3.1vw, 44px);
        --t-h2: clamp(18px, 2.3vw, 31px);
        --t-h2-sm: clamp(17px, 1.85vw, 24px);
        --t-h3: 17px;
      }
      body {
        background: var(--white);
        color: var(--obsidian);
        font-family: var(--font-en);
        font-weight: 400;
        line-height: 1.7;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        word-break: keep-all;
        overflow-wrap: break-word;
      }

      /* ── NAV ── */
      #nav {
        position: fixed;
        inset: 0 0 auto;
        z-index: 300;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 52px;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid transparent;
        transition: border-color 0.4s;
      }
      #nav.scrolled {
        border-color: var(--hairline);
      }
      .logo {
        text-decoration: none;
        display: flex;
        align-items: center;
      }
      .logo-img {
        height: 80px;
        width: auto;
        display: block;
      }
      .nav-links {
        display: flex;
        gap: 40px;
        list-style: none;
      }
      .nav-links a {
        font-size: 15px;
        color: var(--slate);
        text-decoration: none;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: var(--obsidian);
      }
      .nav-end {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .lang-switch {
        display: flex;
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 40px;
        padding: 3px;
        gap: 1px;
      }
      .lang-switch button {
        font-size: 10px;
        letter-spacing: 0.1em;
        padding: 4px 12px;
        border-radius: 40px;
        border: none;
        background: transparent;
        color: var(--mist);
        cursor: pointer;
        transition: all 0.2s;
      }
      .lang-switch button.on {
        background: var(--navy);
        color: var(--white);
      }
      .nav-cta {
        font-size: 11px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--white);
        text-decoration: none;
        padding: 9px 22px;
        background: var(--navy);
        border: 1px solid var(--navy);
        border-radius: 2px;
        transition: all 0.22s;
        white-space: nowrap;
        min-width: 170px;
        text-align: center;
        display: inline-block;
        box-sizing: border-box;
      }
      .nav-cta:hover {
        background: var(--authority);
        border-color: var(--authority);
      }
      .burger {
        display: none;
        flex-direction: column;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
      }
      .burger span {
        display: block;
        width: 20px;
        height: 1px;
        background: var(--obsidian);
      }
      .mob-nav {
        display: none;
        position: fixed;
        top: 80px;
        left: 0;
        right: 0;
        background: var(--white);
        border-bottom: 1px solid var(--hairline);
        padding: 20px 28px 28px;
        z-index: 299;
        flex-direction: column;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      }
      .mob-nav.open {
        display: flex;
      }
      .mob-nav a {
        font-size: 15px;
        color: var(--obsidian);
        font-weight: 500;
        text-decoration: none;
        padding: 15px 0;
        border-bottom: 1px solid var(--hairline);
      }
      .mob-bottom {
        margin-top: 24px;
        display: flex;
        align-items: center;
      }

      /* ── ANIMATIONS ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade {
        opacity: 0;
        transform: translateY(18px);
        transition:
          opacity 0.75s ease,
          transform 0.75s ease;
      }
      .fade.in {
        opacity: 1;
        transform: translateY(0);
      }
      .fd1 {
        transition-delay: 0.1s;
      }
      .fd2 {
        transition-delay: 0.2s;
      }
      .fd3 {
        transition-delay: 0.3s;
      }

      /* ── PAGE HEADER ── */
      .wwa-hero {
        padding: 140px var(--pad-h) 96px;
        border-bottom: 1px solid var(--hairline);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
        align-items: end;
      }
      .wwa-eyebrow {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
      }
      .wwa-eyebrow::before {
        content: '';
        width: 28px;
        height: 1px;
        background: var(--navy);
      }
      .wwa-title {
        font-family: var(--font-en);
        font-size: var(--t-display);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.12;
        letter-spacing: 0.02em;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;
      }
      .wwa-title em {
        font-style: italic;
      }
      .wwa-intro {
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
      }
      .wwa-intro-p {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        margin-bottom: 20px;
      }
      .wwa-intro-p b {
        color: var(--obsidian);
        font-weight: 600;
      }

      /* KO overrides */
      body.ko .wwa-title {
        font-family: var(--font-kr);
        font-weight: 400;
        line-height: 1.35;
        letter-spacing: -0.01em;
      }
      body.ko .wwa-title em {
        font-style: normal;
      }
      body.ko .pillar-title {
        font-family: var(--font-kr);
        font-weight: 500;
      }
      body.ko .wwa-cta-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }

      /* ── SECTIONS ── */
      .wwa-section {
        padding: var(--pad-v) var(--pad-h);
        border-bottom: 1px solid var(--hairline);
      }
      .wwa-section.ivory {
        background: var(--ivory);
      }
      .section-label {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.3;
        letter-spacing: 0.02em;
        margin-bottom: 48px;
        display: block;
      }
      body.ko .section-label {
        font-family: var(--font-kr);
        font-weight: 500;
        line-height: 1.45;
      }

      /* ── PILLARS ── */
      .wwa-pillars {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: auto auto auto;
        gap: 24px;
        max-width: var(--col-wide);
        align-items: start;
      }
      .wwa-pillar {
        background: var(--white);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 36px 32px;
        transition:
          box-shadow 0.25s,
          border-color 0.25s;
        display: grid;
        grid-row: span 3;
        grid-template-rows: subgrid;
        align-content: start;
      }
      .wwa-pillar:hover {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        border-color: var(--mist);
      }
      .pillar-n {
        font-size: 10px;
        letter-spacing: 0.14em;
        font-weight: 700;
        color: var(--navy);
      }
      .pillar-title {
        font-family: var(--font-en);
        font-size: var(--t-h3);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.3;
        letter-spacing: 0.02em;
        padding: 16px 0 20px;
        border-bottom: 1px solid var(--hairline);
      }
      .pillar-body {
        font-size: 14px;
        color: var(--slate);
        line-height: 1.85;
        padding-top: 20px;
      }
      .pillar-body b {
        color: var(--obsidian);
        font-weight: 600;
      }

      /* ── TEAM ── */
      .wwa-team-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
        max-width: var(--col-text);
        margin-top: 48px;
      }
      .wwa-member {
        border: 1px solid var(--hairline);
        border-radius: 2px;
        overflow: hidden;
      }
      .member-photo {
        background: var(--ivory);
        height: 192px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid var(--hairline);
      }
      .member-photo img {
        height: 100%;
        width: auto;
        object-fit: contain;
        display: block;
      }
      .member-body {
        padding: 24px 24px 28px;
      }
      .member-name {
        font-family: var(--font-en);
        font-size: var(--t-h3);
        font-weight: 400;
        color: var(--obsidian);
        letter-spacing: 0.04em;
        margin-bottom: 14px;
        line-height: 1.3;
      }
      body.ko .member-name {
        font-family: var(--font-kr);
        font-weight: 500;
      }
      .member-bio {
        font-size: 13px;
        color: var(--slate);
        line-height: 1.75;
      }

      /* ── CTA ── */
      .wwa-cta {
        background: var(--navy);
        padding: var(--pad-v) var(--pad-h);
      }
      .wwa-cta-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--white);
        line-height: 1.28;
        letter-spacing: 0.02em;
        max-width: 620px;
        margin-bottom: 36px;
      }
      .wwa-cta-btn {
        font-size: 12px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--navy);
        background: var(--white);
        text-decoration: none;
        padding: 14px 32px;
        border-radius: 2px;
        border: 1px solid var(--white);
        transition: all 0.2s;
        display: inline-block;
      }
      .wwa-cta-btn:hover {
        background: var(--ivory);
        border-color: var(--ivory);
      }

      /* ── FOOTER ── */
      footer {
        background: var(--obsidian);
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        padding: 32px var(--pad-h);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }
      .foot-logo img {
        height: 40px;
        width: auto;
        display: block;
      }
      .foot-copy {
        font-size: 9.5px;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.6);
      }
      .foot-links {
        display: flex;
        gap: 28px;
      }
      .foot-links a {
        font-size: 9.5px;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.65);
        text-decoration: none;
        transition: color 0.2s;
      }
      .foot-links a:hover {
        color: rgba(255, 255, 255, 0.9);
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 960px) {
        :root {
          --pad-v: 80px;
          --pad-h: 28px;
        }
        #nav {
          padding: 0 28px;
          height: 72px;
        }
        .nav-links,
        .nav-cta,
        #nav .lang-switch {
          display: none;
        }
        .burger {
          display: flex;
        }
        .mob-nav {
          top: 72px;
        }
        .wwa-hero {
          grid-template-columns: 1fr;
          gap: 32px;
          padding: 112px var(--pad-h) 52px;
        }
        .wwa-pillars {
          grid-template-columns: 1fr;
          grid-template-rows: none;
        }
        .wwa-pillar {
          grid-row: span 1;
          grid-template-rows: none;
          display: flex;
          flex-direction: column;
          gap: 12px;
        }
        .wwa-team-grid {
          grid-template-columns: 1fr;
        }
        footer {
          padding: 24px var(--pad-h);
          flex-direction: column;
          align-items: flex-start;
          gap: 16px;
        }
        .foot-links {
          flex-wrap: wrap;
        }
      }
      @media (max-width: 560px) {
        :root {
          --pad-v: 56px;
          --pad-h: 20px;
        }
        .wwa-hero {
          padding: 100px var(--pad-h) 40px;
        }
      }
    </style>
  </head>

    <script>
      let currentLang = 'ko';

      function goIndex(hash, tab) {
        let url = 'index.html?lang=' + currentLang;
        if (tab) url += '&tab=' + tab;
        url += (hash || '');
        window.location.href = url;
      }
      function togMob() {
        document.getElementById('mobNav').classList.toggle('open');
      }
      function closeMob() {
        document.getElementById('mobNav').classList.remove('open');
      }

      window.addEventListener(
        'scroll',
        () => {
          document.getElementById('nav').classList.toggle('scrolled', scrollY > 30);
        },
        { passive: true }
      );

      const io = new IntersectionObserver(

      function setLang(l) {
        currentLang = l;
        document.documentElement.setAttribute('lang', l);
        document.body.classList.toggle('ko', l === 'ko');
        Object.keys(T[l]).forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = T[l][id];
        });
        document
          .querySelectorAll('.lang-switch button')
          .forEach((btn) => btn.classList.toggle('on', btn.dataset.lang === l));
      }
