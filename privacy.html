<!doctype html>

    <meta charset="UTF-8" />

    <style>
      /* ── PAGE HERO ── */
      .pp-hero {
        background: var(--obsidian);
        padding: 150px var(--pad-h) 72px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .pp-eyebrow {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.55);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }
      .pp-eyebrow::before {
        content: '';
        width: 28px;
        height: 1px;
        background: rgba(255, 255, 255, 0.35);
      }
      .pp-title {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--white);
        line-height: 1.2;
        letter-spacing: 0.02em;
      }
      body.ko .pp-title {
        font-family: var(--font-kr);
        line-height: 1.35;
        letter-spacing: -0.01em;
      }

      /* ── DOCUMENT BODY ── */
      .pp-doc {
        max-width: var(--col-text);
        margin: 0 auto;
        padding: 72px var(--pad-h) var(--pad-v);
      }
      .pp-updated {
        font-size: 12px;
        letter-spacing: 0.06em;
        color: var(--mist);
        margin-bottom: 40px;
      }
      .pp-intro {
        font-size: 14.5px;
        color: var(--slate);
        line-height: 1.9;
        margin-bottom: 16px;
      }
      .pp-h {
        font-size: 16px;
        font-weight: 600;
        color: var(--obsidian);
        margin: 44px 0 14px;
        line-height: 1.5;
      }
      .pp-b p {
        font-size: 14px;
        color: var(--slate);
        line-height: 1.9;
        margin-bottom: 10px;
      }
      .pp-b ul {
        list-style: none;
        margin: 0 0 10px;
        padding: 0;
      }
      .pp-b li {
        font-size: 14px;
        color: var(--slate);
        line-height: 1.9;
        padding-left: 16px;
        position: relative;
      }
      .pp-b li::before {
        content: '—';
        position: absolute;
        left: 0;
        color: var(--mist);
      }
      .pp-b b {
        color: var(--obsidian);
        font-weight: 600;
      }
      .pp-b a {
        color: var(--authority);
        text-decoration: none;
        border-bottom: 1px solid var(--hairline);
      }
    </style>

      function goIndex(hash, tab) {
        let url = 'index.html?lang=' + currentLang;

        url += hash || '';
        window.location.href = url;
      }
      function togMob() {
        document.getElementById('mobNav').classList.toggle('open');
      }
      function closeMob() {
        document.getElementById('mobNav').classList.remove('open');
      }

      window.addEventListener(
        'scroll',
        () => {
          document.getElementById('nav').classList.toggle('scrolled', scrollY > 30);
        },
        { passive: true }
      );

      function setLang(l) {
        currentLang = l;
        document.documentElement.setAttribute('lang', l);
        document.body.classList.toggle('ko', l === 'ko');
        Object.keys(T[l]).forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = T[l][id];
        });
        document
          .querySelectorAll('.lang-switch button')
          .forEach((btn) => btn.classList.toggle('on', btn.dataset.lang === l));
      }

      const urlLang = new URLSearchParams(window.location.search).get('lang');
      setLang(urlLang === 'en' ? 'en' : 'ko');
