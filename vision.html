<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vision — Toren by ImperAI</title>
    <meta property="og:title" content="Vision — Toren by ImperAI" />
    <meta
      property="og:description"
      content="Why AI governance is no longer optional — the problem, the gap, and the category that fills it."
    />
    <meta property="og:image" content="https://imperai.ai/og-image.png" />
    <meta property="og:url" content="https://imperai.ai/vision.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://imperai.ai/og-image.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      @font-face {
        font-family: 'SUIT';
        src: url('fonts/SUIT-Variable.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Jost Variable';
        src: url('fonts/Jost-Variable.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Jost Variable';
        src: url('fonts/Jost-Variable-Italic.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: italic;
        font-display: swap;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      :root {
        --obsidian: #0a0a0a;
        --navy: #1b2a4e;
        --authority: #2c4270;
        --slate: #5e6675;
        --mist: #a8adb7;
        --hairline: #d9d6ce;
        --ivory: #f7f6f2;
        --white: #ffffff;
        --font-en: 'Jost Variable', sans-serif;
        --font-kr: 'SUIT', sans-serif;
        --t-display: clamp(32px, 4.5vw, 60px);
        --t-h1: clamp(26px, 3.4vw, 48px);
        --t-h2: clamp(20px, 2.5vw, 34px);
        --t-h2-sm: clamp(18px, 2vw, 26px);
        --col-wide: 1080px;
        --col-text: 720px;
        --pad-v: 120px;
        --pad-h: 72px;
      }

      body.ko {
        --t-display: clamp(30px, 4.2vw, 56px);
        --t-h1: clamp(24px, 3.1vw, 44px);
        --t-h2: clamp(18px, 2.3vw, 31px);
        --t-h2-sm: clamp(17px, 1.85vw, 24px);
      }
      body {
        background: var(--white);
        color: var(--obsidian);
        font-family: var(--font-en);
        font-weight: 400;
        line-height: 1.7;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        word-break: keep-all;
        overflow-wrap: break-word;
      }

      /* ── NAV ── */
      #nav {
        position: fixed;
        inset: 0 0 auto;
        z-index: 300;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 52px;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid transparent;
        transition: border-color 0.4s;
      }
      #nav.scrolled {
        border-color: var(--hairline);
      }
      .logo {
        text-decoration: none;
        display: flex;
        align-items: center;
      }
      .logo-img {
        height: 80px;
        width: auto;
        display: block;
      }
      .nav-links {
        display: flex;
        gap: 40px;
        list-style: none;
      }
      .nav-links a {
        font-size: 15px;
        color: var(--slate);
        text-decoration: none;
        transition: color 0.2s;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--obsidian);
      }
      .nav-end {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .lang-switch {
        display: flex;
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 40px;
        padding: 3px;
        gap: 1px;
      }
      .lang-switch button {
        font-size: 10px;
        letter-spacing: 0.1em;
        padding: 4px 12px;
        border-radius: 40px;
        border: none;
        background: transparent;
        color: var(--mist);
        cursor: pointer;
        transition: all 0.2s;
      }
      .lang-switch button.on {
        background: var(--navy);
        color: var(--white);
      }
      .nav-cta {
        font-size: 11px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--white);
        text-decoration: none;
        padding: 9px 22px;
        background: var(--navy);
        border: 1px solid var(--navy);
        border-radius: 2px;
        transition: all 0.22s;
        white-space: nowrap;
        min-width: 170px;
        text-align: center;
        display: inline-block;
        box-sizing: border-box;
      }
      .nav-cta:hover {
        background: var(--authority);
        border-color: var(--authority);
      }
      .burger {
        display: none;
        flex-direction: column;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
      }
      .burger span {
        display: block;
        width: 20px;
        height: 1px;
        background: var(--obsidian);
        transition: all 0.3s;
      }
      .mob-nav {
        display: none;
        position: fixed;
        top: 80px;
        left: 0;
        right: 0;
        background: var(--white);
        border-bottom: 1px solid var(--hairline);
        padding: 20px 28px 28px;
        z-index: 299;
        flex-direction: column;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      }
      .mob-nav.open {
        display: flex;
      }
      .mob-nav a {
        font-size: 15px;
        color: var(--obsidian);
        font-weight: 500;
        text-decoration: none;
        padding: 15px 0;
        border-bottom: 1px solid var(--hairline);
      }
      .mob-bottom {
        margin-top: 24px;
        display: flex;
        align-items: center;
      }

      /* ── SHARED ── */
      .kicker {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }
      .kicker::before {
        content: '';
        width: 28px;
        height: 1px;
        background: var(--navy);
        flex-shrink: 0;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(22px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade {
        opacity: 0;
        transform: translateY(18px);
        transition:
          opacity 0.75s ease,
          transform 0.75s ease;
      }
      .fade.in {
        opacity: 1;
        transform: translateY(0);
      }
      .fd1 {
        transition-delay: 0.1s;
      }
      .fd2 {
        transition-delay: 0.2s;
      }
      .fd3 {
        transition-delay: 0.3s;
      }
      .fd4 {
        transition-delay: 0.4s;
      }

      /* ── VISION HERO ── */
      .vision-hero {
        padding: 140px var(--pad-h) 80px;
        border-bottom: 1px solid var(--hairline);
        background: var(--white);
      }
      .vision-eyebrow {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
      }
      .vision-eyebrow::before {
        content: '';
        width: 28px;
        height: 1px;
        background: var(--navy);
      }
      .vision-title {
        font-family: var(--font-en);
        font-size: var(--t-display);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.1;
        letter-spacing: 0.02em;
        margin-bottom: 20px;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;
      }
      .vision-title em {
        font-style: italic;
      }
      body.ko .vision-title {
        font-family: var(--font-kr);
        line-height: 1.3;
      }
      .vision-desc {
        font-size: 15px;
        color: var(--slate);
        max-width: 560px;
        line-height: 1.75;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
        margin-bottom: 0;
      }
      .hero-stats {
        display: flex;
        margin-top: 48px;
        max-width: 720px;
        border: 1px solid var(--hairline);
        border-radius: 2px;
        overflow: hidden;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.75s both;
      }
      .hero-stat {
        flex: 1;
        padding: 22px 28px;
        background: var(--ivory);
        border-right: 1px solid var(--hairline);
      }
      .hero-stat:last-child {
        border-right: none;
      }
      .hero-stat-n {
        font-family: var(--font-en);
        font-size: clamp(22px, 2.8vw, 34px);
        font-weight: 400;
        color: var(--navy);
        letter-spacing: -0.01em;
        line-height: 1.1;
        margin-bottom: 7px;
      }
      .hero-stat-l {
        font-size: 11px;
        color: var(--slate);
        line-height: 1.55;
        letter-spacing: 0.01em;
      }

      /* ── WHY NOW ── */
      #why-now {
        background: var(--navy);
        padding: var(--pad-v) var(--pad-h);
        border-top: 1px solid var(--hairline);
      }
      #why-now .kicker {
        color: rgba(255, 255, 255, 0.4);
      }
      #why-now .kicker::before {
        background: rgba(255, 255, 255, 0.25);
      }
      .why-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--white);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 20px;
        max-width: var(--col-wide);
      }
      body.ko .why-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .why-intro {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.5);
        max-width: var(--col-text);
        line-height: 1.85;
        margin-bottom: 56px;
      }
      .why-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        max-width: var(--col-wide);
      }
      .why-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        padding: 40px 36px;
        transition: background 0.22s;
      }
      .why-card:hover {
        background: rgba(255, 255, 255, 0.07);
      }
      .why-n {
        font-family: var(--font-en);
        font-size: clamp(44px, 5.5vw, 68px);
        font-weight: 300;
        color: var(--white);
        letter-spacing: -0.025em;
        line-height: 1;
        margin-bottom: 18px;
      }
      .why-title {
        font-size: 15px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.88);
        margin-bottom: 12px;
        line-height: 1.35;
      }
      body.ko .why-title {
        font-family: var(--font-kr);
      }
      .why-body {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.48);
        line-height: 1.9;
      }
      .why-source {
        font-size: 10px;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.22);
        margin-top: 18px;
        text-transform: uppercase;
      }

      /* ── PROBLEM ── */
      #problem {
        background: var(--white);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .problem-head {
        max-width: var(--col-wide);
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 80px;
        margin-bottom: 56px;
      }
      .problem-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
      }
      body.ko .problem-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .problem-intro {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        align-self: end;
      }
      .persona-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        max-width: var(--col-wide);
        margin-bottom: 40px;
      }
      .persona-card {
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 36px 32px;
        display: flex;
        flex-direction: column;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .persona-card:hover {
        border-color: var(--authority);
        box-shadow: 0 4px 24px rgba(44, 66, 112, 0.08);
      }
      .persona-role {
        font-size: 10px;
        letter-spacing: 0.2em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        margin-bottom: 22px;
      }
      .persona-q {
        font-family: var(--font-en);
        font-size: 17px;
        font-style: italic;
        color: var(--obsidian);
        line-height: 1.5;
        letter-spacing: 0.01em;
        margin-bottom: 20px;
        flex: 1;
      }
      body.ko .persona-q {
        font-family: var(--font-kr);
        font-style: normal;
        font-weight: 500;
        font-size: 15px;
        line-height: 1.65;
      }
      .persona-body {
        font-size: 13px;
        color: var(--slate);
        line-height: 1.8;
        border-top: 1px solid var(--hairline);
        padding-top: 18px;
        margin-top: auto;
      }
      .problem-close-row {
        max-width: var(--col-wide);
        padding-top: 32px;
        border-top: 1px solid var(--hairline);
      }
      .problem-close {
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-style: italic;
        color: var(--obsidian);
        line-height: 1.45;
        letter-spacing: 0.02em;
      }
      body.ko .problem-close {
        font-family: var(--font-kr);
        font-style: normal;
        font-weight: 500;
      }
      .problem-close b {
        font-style: normal;
        color: var(--navy);
        font-weight: 600;
      }

      /* ── TOOLING GAP ── */
      #stack-fail {
        background: var(--ivory);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .stack-head {
        max-width: var(--col-wide);
        margin-bottom: 56px;
      }
      .stack-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 20px;
      }
      body.ko .stack-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .stack-intro {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        max-width: var(--col-text);
      }
      .stack-intro b {
        color: var(--obsidian);
        font-weight: 600;
      }
      .tool-table-wrap {
        max-width: var(--col-wide);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin-bottom: 48px;
        border: 1px solid var(--hairline);
        border-radius: 2px;
      }
      .tool-table {
        width: 100%;
        min-width: 820px;
        border-collapse: collapse;
      }
      .tool-table th,
      .tool-table td {
        border-bottom: 1px solid var(--hairline);
        border-right: 1px solid var(--hairline);
        vertical-align: top;
        text-align: left;
      }
      .tool-table tr:last-child th,
      .tool-table tr:last-child td {
        border-bottom: none;
      }
      .tool-table th:last-child,
      .tool-table td:last-child {
        border-right: none;
      }
      .th-dim {
        width: 150px;
        min-width: 150px;
        background: var(--ivory);
        padding: 20px 20px 16px;
        vertical-align: bottom;
      }
      .th-dim-label {
        font-size: 10px;
        letter-spacing: 0.16em;
        font-weight: 700;
        color: var(--mist);
        text-transform: uppercase;
      }
      .th-tool {
        background: var(--white);
        padding: 20px 20px 18px;
        min-width: 138px;
      }
      .th-tool.diy-col {
        background: var(--ivory);
      }
      .th-tool.eacp-col {
        background: var(--navy);
      }
      .tool-logos {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
        min-height: 22px;
        flex-wrap: wrap;
      }
      .tool-logo-img {
        height: 20px;
        width: auto;
        border-radius: 3px;
        object-fit: contain;
      }
      .tool-logo-badge {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--slate);
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 2px 7px;
        white-space: nowrap;
        line-height: 1.8;
      }
      .th-tool.eacp-col .tool-logo-badge {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.7);
      }
      .tool-cat-name {
        font-family: var(--font-en);
        font-size: 13px;
        font-weight: 600;
        color: var(--obsidian);
        letter-spacing: 0.03em;
        margin-bottom: 3px;
        line-height: 1.3;
      }
      .th-tool.eacp-col .tool-cat-name {
        color: var(--white);
      }
      .tool-cat-tag {
        font-size: 10px;
        color: var(--mist);
        letter-spacing: 0.04em;
        line-height: 1.4;
      }
      .th-tool.eacp-col .tool-cat-tag {
        color: rgba(255, 255, 255, 0.4);
      }
      .th-tool.diy-col .tool-cat-tag {
        color: var(--slate);
      }
      .diy-warn {
        display: inline-block;
        margin-top: 6px;
        font-size: 9px;
        letter-spacing: 0.1em;
        color: var(--slate);
        font-weight: 700;
        text-transform: uppercase;
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 2px 6px;
      }
      .td-dim {
        background: var(--ivory);
        padding: 16px 20px;
        font-size: 11px;
        letter-spacing: 0.1em;
        font-weight: 700;
        color: var(--obsidian);
        text-transform: uppercase;
        vertical-align: middle;
        border-right: 1px solid var(--hairline);
      }
      .td-val {
        padding: 15px 20px;
        font-size: 13px;
        color: var(--slate);
        line-height: 1.5;
        vertical-align: middle;
        background: var(--white);
      }
      .td-val.diy-col {
        background: var(--ivory);
        color: var(--slate);
      }
      .td-val.eacp-col {
        background: rgba(27, 42, 78, 0.04);
        color: var(--navy);
        font-weight: 600;
      }
      .td-val .ok {
        color: var(--navy);
        font-weight: 700;
      }
      .td-val .no {
        color: var(--mist);
      }
      .td-val.diy-col .no {
        color: var(--mist);
      }
      .stack-close {
        max-width: var(--col-wide);
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-style: italic;
        color: var(--obsidian);
        line-height: 1.5;
        letter-spacing: 0.02em;
      }
      .stack-close b {
        font-style: normal;
        color: var(--navy);
        font-weight: 600;
      }
      body.ko .stack-close {
        font-family: var(--font-kr);
        font-style: normal;
        font-weight: 500;
      }

      /* ── CAPER ENGINE ── */
      #eacp-definition {
        background: var(--white);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .eacp-head {
        max-width: var(--col-wide);
        margin-bottom: 56px;
      }
      .eacp-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 24px;
      }
      body.ko .eacp-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .eacp-intro {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        max-width: var(--col-text);
      }
      .eacp-intro b {
        color: var(--navy);
        font-weight: 600;
      }
      .caper-flow {
        max-width: var(--col-wide);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin-bottom: 32px;
      }
      .caper-inner {
        display: flex;
        min-width: 640px;
        border: 1px solid var(--hairline);
        border-radius: 2px;
        overflow: hidden;
        background: var(--hairline);
        gap: 1px;
      }
      .caper-box {
        flex: 1;

      .caper-owner {

        color: var(--hairline);

        color: rgba(255, 255, 255, 0.25);

      .caper-legend {

        gap: 32px;
        align-items: center;
        padding: 18px 24px;

        display: grid;
        grid-template-columns: repeat(4, 1fr);

        line-height: 1.2;
        margin-bottom: 8px;

        font-size: 12px;
        color: var(--slate);
        line-height: 1.65;

      /* ── PACK EVOLUTION ── */
      #pack-evolution {
        background: var(--ivory);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }

        max-width: var(--col-wide);
        margin-bottom: 64px;

        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 20px;

        font-family: var(--font-kr);
        line-height: 1.4;

      .pack-intro {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        max-width: var(--col-text);
      }
      .pack-stages {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        max-width: var(--col-wide);
      }
      .pack-stage {
        background: var(--white);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 36px 32px;
        position: relative;
        overflow: hidden;
        transition:
          border-color 0.22s,
          box-shadow 0.22s;
      }
      .pack-stage:hover {
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      }
      .pack-stage::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
      }
      .pack-stage-1::before {
        background: var(--mist);
      }
      .pack-stage-2::before {
        background: var(--authority);
      }
      .pack-stage-3::before {
        background: var(--navy);
      }
      .pack-stage-header {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 20px;
      }
      .pack-stage-num {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-en);
        font-size: 17px;
        font-weight: 300;
        flex-shrink: 0;
      }
      .pack-stage-1 .pack-stage-num {
        background: var(--ivory);
        border: 1px solid var(--hairline);
        color: var(--mist);
      }
      .pack-stage-2 .pack-stage-num {
        background: var(--authority);
        border: 1px solid var(--authority);
        color: var(--white);
      }
      .pack-stage-3 .pack-stage-num {
        background: var(--navy);
        border: 1px solid var(--navy);
        color: var(--white);
      }
      .pack-stage-meta {
        flex: 1;
      }
      .pack-stage-time {
        font-size: 10px;
        letter-spacing: 0.16em;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .pack-stage-1 .pack-stage-time {
        color: var(--mist);
      }
      .pack-stage-2 .pack-stage-time {
        color: var(--authority);
      }
      .pack-stage-3 .pack-stage-time {
        color: var(--navy);
      }
      .pack-stage-title {
        font-family: var(--font-en);
        font-size: 19px;
        font-weight: 400;
        color: var(--obsidian);
        letter-spacing: 0.02em;

        font-size: 17px;
        font-weight: 600;
      }
      .pack-stage-body {
        font-size: 13px;

        line-height: 1.85;
        margin-bottom: 20px;

      .pack-stage-tag {

        font-size: 9px;
        letter-spacing: 0.12em;
        font-weight: 700;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 2px;

        background: var(--ivory);
        color: var(--mist);
        border: 1px solid var(--hairline);
      }
      .pack-stage-2 .pack-stage-tag {

      }

        background: var(--navy);

      /* ── CTA ── */
      .vision-cta-wrap {

        transition: all 0.22s;

      .vision-cta-btn:hover {
        background: var(--ivory);

        color: rgba(255, 255, 255, 0.9);

      /* ── RESPONSIVE: TABLET ── */

        #nav {

          align-items: flex-start;
          gap: 16px;

          flex-wrap: wrap;
        }

        }

          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
      }

      function setLang(l) {
        currentLang = l;
        document.documentElement.setAttribute('lang', l);
        document.body.classList.toggle('ko', l === 'ko');
        Object.keys(T[l]).forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = T[l][id];
        });
        document.querySelectorAll('.lang-switch button').forEach((btn) => {
          btn.classList.toggle('on', btn.dataset.lang === l);
        });
        document.querySelectorAll('a[onclick*="currentLang"]').forEach((a) => {
          const base = a.href.split('?')[0];
          if (base && !base.includes('mailto') && !base.includes('#')) {
            a.href = base + '?lang=' + l;
          }
        });
      }

      const urlLang = new URLSearchParams(window.location.search).get('lang');
      setLang(urlLang === 'en' ? 'en' : 'ko');
    </script>
