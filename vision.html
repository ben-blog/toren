<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vision — Toren by ImperAI</title>
    <meta property="og:title" content="Vision — Toren by ImperAI" />
    <meta
      property="og:description"
      content="Why AI governance is no longer optional — the problem, the gap, and the category that fills it."
    />
    <meta property="og:image" content="https://imperai.ai/og-image.png" />
    <meta property="og:url" content="https://imperai.ai/vision.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://imperai.ai/og-image.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      @font-face {
        font-family: 'SUIT';
        src: url('fonts/SUIT-Variable.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Jost Variable';
        src: url('fonts/Jost-Variable.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Jost Variable';
        src: url('fonts/Jost-Variable-Italic.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: italic;
        font-display: swap;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      :root {
        --obsidian: #0a0a0a;
        --navy: #1b2a4e;
        --authority: #2c4270;
        --slate: #5e6675;
        --mist: #a8adb7;
        --hairline: #d9d6ce;
        --ivory: #f7f6f2;
        --white: #ffffff;
        --font-en: 'Jost Variable', sans-serif;
        --font-kr: 'SUIT', sans-serif;
        --t-display: clamp(32px, 4.5vw, 60px);
        --t-h1: clamp(26px, 3.4vw, 48px);
        --t-h2: clamp(20px, 2.5vw, 34px);
        --t-h2-sm: clamp(18px, 2vw, 26px);
        --col-wide: 1080px;
        --col-text: 720px;
        --pad-v: 120px;
        --pad-h: 72px;
      }

      body.ko {
        --t-display: clamp(30px, 4.2vw, 56px);
        --t-h1: clamp(24px, 3.1vw, 44px);
        --t-h2: clamp(18px, 2.3vw, 31px);
        --t-h2-sm: clamp(17px, 1.85vw, 24px);
      }
      body {
        background: var(--white);
        color: var(--obsidian);
        font-family: var(--font-en);
        font-weight: 400;
        line-height: 1.7;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        word-break: keep-all;
        overflow-wrap: break-word;
      }

      /* ── NAV ── */
      #nav {
        position: fixed;
        inset: 0 0 auto;
        z-index: 300;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 52px;
        background: transparent;
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
        border-bottom: none;
        transition:
          background 0.4s,
          backdrop-filter 0.4s;
      }
      /* Always dark nav — scrolled only adds blur to background content */
      #nav.scrolled {
        background: rgba(8, 8, 8, 0.42);
        backdrop-filter: blur(28px) saturate(140%);
        -webkit-backdrop-filter: blur(28px) saturate(140%);
      }
      /* Logo and text stay white at all times */
      #nav .logo-dark {
        display: none;
      }
      #nav .logo-light {
        display: block;
      }
      #nav .nav-links a {
        color: rgba(255, 255, 255, 0.5);
      }
      #nav .nav-links a:hover,
      #nav .nav-links a.active {
        color: var(--white);
      }
      #nav .nav-cta {
        background: transparent;
        border-color: rgba(255, 255, 255, 0.28);
        color: var(--white);
      }
      #nav .nav-cta:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.5);
      }
      #nav .lang-switch {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.14);
      }
      #nav .lang-switch button {
        color: rgba(255, 255, 255, 0.45);
      }
      #nav .lang-switch button.on {
        background: rgba(255, 255, 255, 0.12);
        color: var(--white);
      }
      #nav .burger span {
        background: var(--white);
      }
      .logo {
        text-decoration: none;
        display: flex;
        align-items: center;
      }
      .logo-img {
        height: 44px;
        width: auto;
        display: block;
      }
      .logo-light {
        display: none;
      }
      .nav-links {
        display: flex;
        gap: 40px;
        list-style: none;
      }
      .nav-links a {
        font-size: 15px;
        color: var(--slate);
        text-decoration: none;
        transition: color 0.2s;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--obsidian);
      }
      .nav-end {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .lang-switch {
        display: flex;
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 40px;
        padding: 3px;
        gap: 1px;
      }
      .lang-switch button {
        font-size: 10px;
        letter-spacing: 0.1em;
        padding: 4px 12px;
        border-radius: 40px;
        border: none;
        background: transparent;
        color: var(--mist);
        cursor: pointer;
        transition: all 0.2s;
      }
      .lang-switch button.on {
        background: var(--navy);
        color: var(--white);
      }
      .nav-cta {
        font-size: 11px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--white);
        text-decoration: none;
        padding: 9px 22px;
        background: var(--navy);
        border: 1px solid var(--navy);
        border-radius: 2px;
        transition: all 0.22s;
        white-space: nowrap;
        min-width: 170px;
        text-align: center;
        display: inline-block;
        box-sizing: border-box;
      }
      .nav-cta:hover {
        background: var(--authority);
        border-color: var(--authority);
      }
      .burger {
        display: none;
        flex-direction: column;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
      }
      .burger span {
        display: block;
        width: 20px;
        height: 1px;
        background: var(--obsidian);
        transition: all 0.3s;
      }
      .mob-nav {
        display: none;
        position: fixed;
        top: 80px;
        left: 0;
        right: 0;
        background: var(--white);
        border-bottom: 1px solid var(--hairline);
        padding: 20px 28px 28px;
        z-index: 299;
        flex-direction: column;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      }
      .mob-nav.open {
        display: flex;
      }
      .mob-nav a {
        font-size: 15px;
        color: var(--obsidian);
        font-weight: 500;
        text-decoration: none;
        padding: 15px 0;
        border-bottom: 1px solid var(--hairline);
      }
      .mob-bottom {
        margin-top: 24px;
        display: flex;
        align-items: center;
      }

      /* ── SHARED ── */
      .kicker {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }
      .kicker::before {
        content: '';
        width: 28px;
        height: 1px;
        background: var(--navy);
        flex-shrink: 0;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(22px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade {
        opacity: 0;
        transform: translateY(18px);
        transition:
          opacity 0.75s ease,
          transform 0.75s ease;
      }
      .fade.in {
        opacity: 1;
        transform: translateY(0);
      }
      .fd1 {
        transition-delay: 0.1s;
      }
      .fd2 {
        transition-delay: 0.2s;
      }
      .fd3 {
        transition-delay: 0.3s;
      }
      .fd4 {
        transition-delay: 0.4s;
      }

      /* ── MANIFESTO HERO ── */
      #manifesto {
        background: var(--obsidian);
        background-image: url('assets/hero_vision.webp');
        background-size: cover;
        background-position: center 40%;
        padding: calc(80px + 96px) var(--pad-h) 96px;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
      }
      #manifesto::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to right,
          rgba(10, 10, 10, 0.88) 0%,
          rgba(10, 10, 10, 0.65) 55%,
          rgba(10, 10, 10, 0.4) 100%
        );
        pointer-events: none;
      }
      .manifesto-kicker {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.3);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 48px;
      }
      .manifesto-kicker::before {
        content: '';
        width: 28px;
        height: 1px;
        background: rgba(255, 255, 255, 0.18);
        flex-shrink: 0;
      }
      .manifesto-h1 {
        font-family: var(--font-en);
        font-size: var(--t-display);
        font-weight: 300;
        color: var(--white);
        line-height: 1.15;
        letter-spacing: 0.01em;
        max-width: 860px;
        margin-bottom: 32px;
        text-wrap: balance;
      }
      body.ko .manifesto-h1 {
        font-family: var(--font-kr);
        line-height: 1.3;
        font-weight: 300;
      }
      .manifesto-h1 em {
        font-style: italic;
        color: rgba(255, 255, 255, 0.92);
      }
      body.ko .manifesto-h1 em {
        font-family: var(--font-kr);
        font-style: normal;
      }
      .manifesto-sub {
        font-size: 17px;
        color: rgba(255, 255, 255, 0.42);
        max-width: 560px;
        line-height: 1.82;
        margin-bottom: 56px;
      }
      body.ko .manifesto-sub {
        font-family: var(--font-kr);
      }
      .manifesto-actions {
        display: flex;
        gap: 20px;
        align-items: center;
        flex-wrap: wrap;
      }
      .manifesto-btn-primary {
        font-size: 11px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--obsidian);
        text-decoration: none;
        padding: 13px 30px;
        background: var(--white);
        border-radius: 2px;
        transition: all 0.22s;
        white-space: nowrap;
      }
      .manifesto-btn-primary:hover {
        background: var(--ivory);
      }

      /* ── POINT OF VIEW ── */
      #pov {
        background: var(--navy);
        padding: var(--pad-v) var(--pad-h);
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      #pov .kicker {
        color: rgba(255, 255, 255, 0.35);
      }
      #pov .kicker::before {
        background: rgba(255, 255, 255, 0.2);
      }
      .pov-head {
        max-width: var(--col-wide);
        margin-bottom: 64px;
      }
      .pov-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--white);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 16px;
      }
      body.ko .pov-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .pov-intro {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.42);
        max-width: 580px;
        line-height: 1.8;
      }
      body.ko .pov-intro {
        font-family: var(--font-kr);
      }
      .pov-beliefs {
        max-width: var(--col-wide);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .pov-belief {
        position: relative;
        padding: 44px 0;
        min-height: 160px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .pov-belief-num {
        position: absolute;
        left: -8px;
        bottom: -0.1em;
        font-family: var(--font-en);
        font-size: clamp(96px, 14vw, 180px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.04em;
        color: rgba(255, 255, 255, 0.18);
        user-select: none;
        pointer-events: none;
      }
      .pov-belief-text {
        position: relative;
        z-index: 1;
        font-family: var(--font-en);
        font-size: clamp(15px, 1.55vw, 19px);
        font-weight: 300;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.65;
        letter-spacing: 0.01em;
        max-width: 720px;
        padding-left: clamp(120px, 14vw, 200px);
      }
      body.ko .pov-belief-text {
        font-family: var(--font-kr);
        font-size: clamp(14px, 1.4vw, 17px);
        line-height: 1.75;
      }
      .pov-belief-text strong {
        color: var(--white);
        font-weight: 600;
      }

      /* ── WHY NOW ── */
      #why-now {
        background: var(--navy);
        padding: var(--pad-v) var(--pad-h);
        border-top: 1px solid var(--hairline);
      }
      #why-now .kicker {
        color: rgba(255, 255, 255, 0.4);
      }
      #why-now .kicker::before {
        background: rgba(255, 255, 255, 0.25);
      }
      .why-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--white);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 20px;
        max-width: var(--col-wide);
      }
      body.ko .why-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .why-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        max-width: var(--col-wide);
      }
      .why-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        padding: 40px 36px;
        transition: background 0.22s;
        display: flex;
        flex-direction: column;
      }
      .why-card:hover {
        background: rgba(255, 255, 255, 0.07);
      }
      .why-n {
        font-family: var(--font-en);
        font-size: clamp(44px, 5.5vw, 68px);
        font-weight: 300;
        color: var(--white);
        letter-spacing: -0.025em;
        line-height: 1;
        min-height: clamp(52px, 6.5vw, 80px);
        margin-bottom: 18px;
        display: flex;
        align-items: flex-end;
        gap: 10px;
      }
      .why-n-sub {
        font-size: clamp(11px, 1vw, 13px);
        font-weight: 400;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.32);
        line-height: 1.4;
        text-transform: uppercase;
      }
      .why-title {
        font-size: 15px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.88);
        margin-bottom: 12px;
        line-height: 1.35;
      }
      body.ko .why-title {
        font-family: var(--font-kr);
      }
      .why-body {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.48);
        line-height: 1.9;
      }
      .why-source {
        font-size: 10px;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.48);
        margin-top: 18px;
        text-transform: uppercase;
      }

      /* ── PROBLEM ── */
      #problem {
        background: var(--white);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .problem-head {
        max-width: var(--col-wide);
        display: grid;
        grid-template-columns: 3fr 2fr;
        gap: 80px;
        margin-bottom: 56px;
        align-items: start;
      }
      .problem-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
      }
      body.ko .problem-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .problem-right {
        display: flex;
        flex-direction: column;
        padding-top: 40px;
      }
      .problem-stat {
        border-left: 2px solid var(--navy);
        padding-left: 20px;
      }
      .problem-stat-row {
        display: flex;
        align-items: baseline;
        gap: 24px;
        margin-bottom: 10px;
      }
      .problem-stat-num {
        font-family: var(--font-en);
        font-size: clamp(32px, 4vw, 52px);
        font-weight: 700;
        color: var(--navy);
        letter-spacing: -0.02em;
        line-height: 1;
      }
      .problem-stat-num.muted {
        color: var(--mist);
      }
      .problem-stat-arrow {
        font-size: 18px;
        color: var(--hairline);
      }
      .problem-stat-labels {
        display: flex;
        gap: 24px;
      }
      .problem-stat-label {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--slate);
        line-height: 1.5;
        flex: 1;
      }
      .problem-stat-label.muted {
        color: var(--mist);
      }
      .problem-stat-source {
        font-size: 11px;
        color: var(--mist);
        margin-top: 12px;
        letter-spacing: 0.04em;
      }
      .problem-intro {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        max-width: var(--col-wide);
        margin-bottom: 32px;
      }
      body.ko .problem-intro {
        font-family: var(--font-kr);
      }
      .persona-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        max-width: var(--col-wide);
        margin-bottom: 40px;
      }
      .persona-card {
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 36px 32px;
        display: flex;
        flex-direction: column;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .persona-card:hover {
        border-color: var(--authority);
        box-shadow: 0 4px 24px rgba(44, 66, 112, 0.08);
      }
      .persona-role {
        font-size: 10px;
        letter-spacing: 0.2em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        margin-bottom: 22px;
      }
      .persona-q {
        font-family: var(--font-en);
        font-size: 17px;
        font-style: italic;
        color: var(--obsidian);
        line-height: 1.5;
        letter-spacing: 0.01em;
        margin-bottom: 20px;
        flex: 1;
      }
      body.ko .persona-q {
        font-family: var(--font-kr);
        font-style: normal;
        font-weight: 500;
        font-size: 15px;
        line-height: 1.65;
      }
      .persona-body {
        font-size: 13px;
        color: var(--slate);
        line-height: 1.8;
        border-top: 1px solid var(--hairline);
        padding-top: 18px;
        margin-top: auto;
      }
      .problem-close-row {
        max-width: var(--col-wide);
        padding-top: 32px;
        border-top: 1px solid var(--hairline);
      }
      .problem-close {
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-style: italic;
        color: var(--obsidian);
        line-height: 1.45;
        letter-spacing: 0.02em;
      }
      body.ko .problem-close {
        font-family: var(--font-kr);
        font-style: normal;
        font-weight: 500;
      }
      .problem-close b {
        font-style: normal;
        color: var(--navy);
        font-weight: 600;
      }

      /* ── TOOLING GAP ── */
      #stack-fail {
        background: var(--ivory);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .stack-head {
        max-width: var(--col-wide);
        margin-bottom: 40px;
      }
      .stack-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 20px;
      }
      body.ko .stack-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .stack-intro {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        max-width: var(--col-text);
      }
      /* Table wrapper */
      .tool-table-wrap {
        max-width: var(--col-wide);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin-bottom: 48px;
        border: 1px solid var(--hairline);
        border-radius: 2px;
      }
      .tool-table {
        width: 100%;
        min-width: 820px;
        border-collapse: collapse;
      }
      .tool-table th,
      .tool-table td {
        border-bottom: 1px solid var(--hairline);
        border-right: 1px solid var(--hairline);
        text-align: left;
      }
      .tool-table tr:last-child th,
      .tool-table tr:last-child td {
        border-bottom: none;
      }
      .tool-table th:last-child,
      .tool-table td:last-child {
        border-right: none;
      }
      /* Column headers */
      .mx-th-dim {
        width: 180px;
        min-width: 180px;
        background: var(--ivory);
        padding: 20px 20px 16px;
        vertical-align: bottom;
        position: sticky;
        left: 0;
        z-index: 2;
      }
      .mx-dim-label {
        font-size: 10px;
        letter-spacing: 0.16em;
        font-weight: 700;
        color: var(--mist);
        text-transform: uppercase;
      }
      .mx-th-tool {
        background: var(--white);
        padding: 20px 20px 16px;
        min-width: 160px;
        vertical-align: top;
        transition: opacity 0.25s;
        border-bottom: 1px solid var(--hairline);
      }
      .mx-col-diy {
        background: var(--white) !important;
      }
      .mx-col-toren {
        background: #ebf1fb !important;
        position: sticky;
        left: 180px;
        z-index: 2;
      }
      .mx-col-comp {
        /* no opacity fade — color handles differentiation */
      }
      /* Competitor body cells — full opacity, readable */
      .tool-table tbody td:nth-child(3),
      .tool-table tbody td:nth-child(4),
      .tool-table tbody td:nth-child(5),
      .tool-table tbody td:nth-child(6) {
        transition: opacity 0.25s;
      }
      .tool-logos {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        /* fixed top offset so logos always start at same position */
        margin-top: 12px;
        min-height: 28px;
      }
      .tool-logo-img {
        height: 18px;
        width: auto;
        max-width: 80px;
        object-fit: contain;
        mix-blend-mode: multiply;
        /* normalize visual weight across logos */
        display: block;
      }
      .mx-col-toren .tool-logo-img {
        mix-blend-mode: normal;
        filter: invert(1) brightness(0.15);
        opacity: 0.7;
      }
      .tool-logo-badge {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--slate);
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 2px 7px;
        white-space: nowrap;
        line-height: 1.8;
      }
      .mx-col-toren .tool-logo-badge {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.7);
      }
      .mx-col-name {
        font-family: var(--font-en);
        font-size: 15px;
        font-weight: 700;
        color: var(--obsidian);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        line-height: 1.3;
        /* fixed height so logos always start at the same Y */
        min-height: 40px;
        display: flex;
        align-items: flex-start;
      }
      .mx-col-toren .mx-col-name {
        color: var(--navy);
        font-size: 17px;
      }
      .mx-col-tag {
        font-size: 10px;
        color: var(--slate);
        letter-spacing: 0.03em;
        line-height: 1.4;
      }
      .mx-col-toren .mx-col-tag {
        color: rgba(255, 255, 255, 0.65);
      }
      .mx-col-diy .mx-col-tag {
        color: var(--slate);
      }
      .diy-warn {
        display: inline-block;
        margin-top: 6px;
        font-size: 9px;
        letter-spacing: 0.1em;
        color: var(--slate);
        font-weight: 700;
        text-transform: uppercase;
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 2px 6px;
      }
      /* Coverage dots */
      .mx-toren-score {
        display: flex;
        gap: 5px;
        margin-top: 16px;
        align-items: center;
      }
      .mx-score-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
      }
      .mx-score-dot.full {
        background: rgba(255, 255, 255, 0.78);
      }
      .mx-score-label {
        font-size: 9px;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.35);
        text-transform: uppercase;
        margin-left: 6px;
        font-family: var(--font-en);
      }
      /* Row label cells */
      .mx-td-dim {
        background: var(--ivory);
        padding: 16px 16px;
        vertical-align: top;
        border-right: 1px solid var(--hairline);
        position: sticky;
        left: 0;
        z-index: 1;
        transition: opacity 0.25s;
      }
      .mx-row-label {
        display: block;
        font-size: 10px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--obsidian);
        text-transform: uppercase;
        margin-bottom: 5px;
        line-height: 1.4;
      }
      .mx-row-ctx {
        display: block;
        font-size: 11px;
        color: var(--slate);
        line-height: 1.55;
        letter-spacing: 0;
        text-transform: none;
        max-width: 160px;
      }
      body.ko .mx-row-ctx {
        font-family: var(--font-kr);
      }
      /* Value cells */
      .mx-td-val {
        padding: 16px 16px;
        font-size: 13px;
        color: var(--obsidian);
        line-height: 1.55;
        vertical-align: top;
        text-align: left;
        background: var(--white);
        transition: opacity 0.25s;
      }
      /* Rich cell descriptions — R1 / R2 */
      .mx-cell-primary {
        display: block;
        font-size: 13px;
        font-weight: 700;
        color: var(--obsidian);
        letter-spacing: 0.02em;
        margin-bottom: 6px;
        line-height: 1.4;
      }
      .mx-cell-sub {
        display: block;
        font-size: 12px;
        color: var(--obsidian);
        line-height: 1.65;
        font-weight: 400;
      }
      body.ko .mx-cell-primary,
      body.ko .mx-cell-sub {
        font-family: var(--font-kr);
      }
      .mx-td-toren .mx-cell-primary {
        color: var(--navy);
        font-weight: 700;
      }
      .mx-td-toren .mx-cell-sub {
        color: rgba(27, 42, 78, 0.8);
      }
      .mx-td-diy {
        background: var(--white);
      }
      .mx-td-toren {
        background: #ebf1fb;
        color: var(--navy);
        font-weight: 500;
        text-align: left;
        vertical-align: top;
        position: sticky;
        left: 180px;
        z-index: 1;
        transition: opacity 0.25s;
        padding: 16px 16px;
      }
      /* Moon chart — SVG pie-chart style */
      .mx-moon-cell {
        padding: 16px 16px;
        text-align: center;
        vertical-align: top;
      }
      .moon-svg {
        display: block;
        margin: 0 auto 8px;
        overflow: visible;
      }
      .moon-svg .moon-bg {
        fill: var(--hairline);
      }
      .moon-svg .moon-fill {
        fill: var(--authority);
      }
      /* Toren column: light bg → dark navy pie fill */
      .mx-td-toren .moon-svg .moon-bg {
        fill: rgba(27, 42, 78, 0.1);
      }
      .mx-td-toren .moon-svg .moon-fill {
        fill: var(--navy);
      }
      .moon-label {
        display: block;
        font-size: 11px;
        color: var(--obsidian);
        line-height: 1.5;
        letter-spacing: 0.01em;
        max-width: none;
        margin: 0;
      }
      .mx-moon-cell .mx-cell-primary {
        font-size: 12px;
        margin-bottom: 4px;
      }
      .mx-moon-cell .mx-cell-sub {
        font-size: 11px;
        line-height: 1.55;
      }
      .mx-td-toren .moon-label {
        color: var(--navy);
        font-weight: 600;
      }
      /* Stack close */
      .stack-close {
        max-width: var(--col-wide);
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-style: normal;
        color: var(--obsidian);
        line-height: 1.5;
        letter-spacing: 0.02em;
      }
      .stack-close b {
        font-style: italic;
        color: var(--navy);
        font-weight: 600;
      }
      body.ko .stack-close {
        font-family: var(--font-kr);
        font-style: normal;
        font-weight: 500;
      }

      /* ── PACK EVOLUTION ── */
      #pack-evolution {
        background: var(--ivory);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .pack-head {
        max-width: var(--col-wide);
        margin-bottom: 64px;
      }
      .pack-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 20px;
      }
      body.ko .pack-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .pack-intro {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        max-width: var(--col-text);
      }
      .pack-stages {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        max-width: var(--col-wide);
      }
      .pack-stage {
        background: var(--white);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 36px 32px;
        position: relative;
        overflow: hidden;
        transition:
          border-color 0.22s,
          box-shadow 0.22s;
      }
      .pack-stage:hover {
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      }
      .pack-stage::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
      }
      .pack-stage-1::before {
        background: var(--mist);
      }
      .pack-stage-2::before {
        background: var(--authority);
      }
      .pack-stage-3::before {
        background: var(--navy);
      }
      .pack-stage-header {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 20px;
      }
      .pack-stage-num {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-en);
        font-size: 17px;
        font-weight: 300;
        flex-shrink: 0;
      }
      .pack-stage-1 .pack-stage-num {
        background: var(--ivory);
        border: 1px solid var(--hairline);
        color: var(--mist);
      }
      .pack-stage-2 .pack-stage-num {
        background: var(--authority);
        border: 1px solid var(--authority);
        color: var(--white);
      }
      .pack-stage-3 .pack-stage-num {
        background: var(--navy);
        border: 1px solid var(--navy);
        color: var(--white);
      }
      .pack-stage-meta {
        flex: 1;
      }
      .pack-stage-time {
        font-size: 10px;
        letter-spacing: 0.16em;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .pack-stage-1 .pack-stage-time {
        color: var(--mist);
      }
      .pack-stage-2 .pack-stage-time {
        color: var(--authority);
      }
      .pack-stage-3 .pack-stage-time {
        color: var(--navy);
      }
      .pack-stage-title {
        font-family: var(--font-en);
        font-size: 19px;
        font-weight: 400;
        color: var(--obsidian);
        letter-spacing: 0.02em;
        line-height: 1.3;
      }
      body.ko .pack-stage-title {
        font-family: var(--font-kr);
        font-size: 17px;
        font-weight: 600;
      }
      .pack-stage-body {
        font-size: 13px;
        color: var(--slate);
        line-height: 1.85;
        margin-bottom: 20px;
      }
      .pack-stage-tag {
        display: inline-block;
        font-size: 9px;
        letter-spacing: 0.12em;
        font-weight: 700;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 2px;
      }
      .pack-stage-1 .pack-stage-tag {
        background: var(--ivory);
        color: var(--mist);
        border: 1px solid var(--hairline);
      }
      .pack-stage-2 .pack-stage-tag {
        background: rgba(44, 66, 112, 0.07);
        color: var(--authority);
        border: 1px solid rgba(44, 66, 112, 0.18);
      }
      .pack-stage-3 .pack-stage-tag {
        background: var(--navy);
        color: var(--white);
        border: 1px solid var(--navy);
      }

      /* ── FOOTER ── */
      footer {
        background: var(--obsidian);
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        padding: 32px var(--pad-h);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }
      .foot-logo img {
        height: 40px;
        width: auto;
        display: block;
      }
      .foot-copy {
        font-size: 9.5px;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.6);
      }
      .foot-links {
        display: flex;
        gap: 28px;
      }
      .foot-links a {
        font-size: 9.5px;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.65);
        text-decoration: none;
        transition: color 0.2s;
      }
      .foot-links a:hover {
        color: rgba(255, 255, 255, 0.9);
      }

      /* ── RESPONSIVE: TABLET ── */
      @media (max-width: 960px) {
        :root {
          --pad-v: 80px;
          --pad-h: 28px;
        }
        #nav {
          padding: 0 28px;
          height: 72px;
        }
        .nav-links,
        .nav-cta,
        #nav .lang-switch {
          display: none;
        }
        .burger {
          display: flex;
        }
        .mob-nav {
          top: 72px;
        }
        #manifesto {
          padding: calc(72px + 72px) var(--pad-h) 80px;
        }
        .manifesto-h1 {
          max-width: 100%;
        }
        .why-cards {
          grid-template-columns: 1fr;
          gap: 12px;
        }
        .problem-head {
          grid-template-columns: 1fr;
          gap: 32px;
        }
        .problem-right {
          padding-top: 0;
        }
        .persona-grid {
          grid-template-columns: 1fr;
        }
        .tool-table-wrap {
          overflow-x: auto;
        }
        .pack-stages {
          grid-template-columns: 1fr;
          gap: 12px;
        }
        .outcome-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        footer {
          padding: 24px var(--pad-h);
          flex-direction: column;
          align-items: flex-start;
          gap: 16px;
        }
        .foot-links {
          flex-wrap: wrap;
        }
      }

      /* ── RESPONSIVE: MOBILE ── */
      @media (max-width: 560px) {
        :root {
          --pad-v: 56px;
          --pad-h: 20px;
        }
        #manifesto {
          padding: calc(72px + 56px) var(--pad-h) 72px;
          min-height: 100svh;
        }
        .pov-belief {
          padding: 32px 0;
        }
        .pov-belief-num {
          font-size: clamp(72px, 22vw, 120px);
        }
        .outcome-grid {
          grid-template-columns: 1fr;
        }
        .caper-legend {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
      }
    </style>
  </head>

      // ── TOOLING GAP: Moon phase SVG renderer ────────────────────────────
      (function () {
        // Pie-chart style: 12 o'clock start, clockwise fill
        // Center (14,14), radius 13, viewBox 28×28
        // level 1 = 25% = 90deg, level 2 = 50% = 180deg,
        // level 3 = 75% = 270deg, level 4 = 100% = full circle
        var NS = 'http://www.w3.org/2000/svg';
        var piePaths = {
          1: 'M 14 14 L 14 1 A 13 13 0 0 1 27 14 Z', // 90° — quarter
          2: 'M 14 14 L 14 1 A 13 13 0 0 1 14 27 Z', // 180° — half
          3: 'M 14 14 L 14 1 A 13 13 0 1 1 1 14 Z', //  270° — three-quarter
        };
        document.querySelectorAll('.moon').forEach(function (span) {
          var level = parseInt(span.dataset.level) || 0;
          var svg = document.createElementNS(NS, 'svg');
          svg.setAttribute('viewBox', '0 0 28 28');
          svg.setAttribute('width', '28');
          svg.setAttribute('height', '28');
          svg.classList.add('moon-svg');
          svg.setAttribute('data-level', level);
          // Background circle
          var bg = document.createElementNS(NS, 'circle');
          bg.setAttribute('cx', '14');
          bg.setAttribute('cy', '14');
          bg.setAttribute('r', '13');
          bg.classList.add('moon-bg');
          svg.appendChild(bg);
          // Fill: pie slice or full circle
          if (level === 4) {
            var full = document.createElementNS(NS, 'circle');
            full.setAttribute('cx', '14');
            full.setAttribute('cy', '14');
            full.setAttribute('r', '13');
            full.classList.add('moon-fill');
            svg.appendChild(full);
          } else if (level > 0 && piePaths[level]) {
            var path = document.createElementNS(NS, 'path');
            path.setAttribute('d', piePaths[level]);
            path.classList.add('moon-fill');
            svg.appendChild(path);
          }
          span.parentNode.replaceChild(svg, span);
        });
      })();

      // ── TOOLING GAP: Column hover ────────────────────────────────────────
      (function () {
        var colIndex = { sec: 3, obs: 4, gw: 5, diy: 6 };

        function setBodyColOpacity(col, opacity) {
          var idx = colIndex[col];
          if (!idx) return;
          document.querySelectorAll('#mx-table tbody tr').forEach(function (row) {
            var td = row.querySelectorAll('td')[idx - 1];
            if (td) td.style.opacity = opacity !== null ? String(opacity) : '';
          });
        }

        document.querySelectorAll('.mx-th-tool.mx-col-comp').forEach(function (th) {
          var col = th.dataset.col;
          th.addEventListener('mouseenter', function () {
            document.querySelectorAll('.mx-th-tool.mx-col-comp').forEach(function (h) {
              h.style.opacity = h.dataset.col === col ? '1' : '0.52';
            });
            Object.keys(colIndex).forEach(function (c) {
              setBodyColOpacity(c, c === col ? 1 : 0.52);
            });
          });
          th.addEventListener('mouseleave', function () {
            document.querySelectorAll('.mx-th-tool.mx-col-comp').forEach(function (h) {
              h.style.opacity = '';
            });
            Object.keys(colIndex).forEach(function (c) {
              setBodyColOpacity(c, null);
            });
          });
        });
      })();

      function setLang(l) {
        currentLang = l;
        document.documentElement.setAttribute('lang', l);
        document.body.classList.toggle('ko', l === 'ko');
        Object.keys(T[l]).forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = T[l][id];
        });
        document.querySelectorAll('.lang-switch button').forEach((btn) => {
          btn.classList.toggle('on', btn.dataset.lang === l);
        });
        document.querySelectorAll('a[onclick*="currentLang"]').forEach((a) => {
          const base = a.href.split('?')[0];
          if (base && !base.includes('mailto') && !base.includes('#')) {
            a.href = base + '?lang=' + l;
          }
        });
      }

      const urlLang = new URLSearchParams(window.location.search).get('lang');
      setLang(urlLang === 'en' ? 'en' : 'ko');
    </script>
