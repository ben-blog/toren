<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vision — Toren by ImperAI</title>
    <meta property="og:title" content="Vision — Toren by ImperAI" />
    <meta
      property="og:description"
      content="Why AI governance is no longer optional — the problem, the gap, and the category that fills it."
    />
    <meta property="og:image" content="https://imperai.ai/og-image.png" />
    <meta property="og:url" content="https://imperai.ai/vision.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://imperai.ai/og-image.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      @font-face {
        font-family: 'SUIT';
        src: url('fonts/SUIT-Variable.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Jost Variable';
        src: url('fonts/Jost-Variable.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Jost Variable';
        src: url('fonts/Jost-Variable-Italic.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: italic;
        font-display: swap;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      :root {
        --obsidian: #0a0a0a;
        --navy: #1b2a4e;
        --authority: #2c4270;
        --slate: #5e6675;
        --mist: #a8adb7;
        --hairline: #d9d6ce;
        --ivory: #f7f6f2;
        --white: #ffffff;
        --font-en: 'Jost Variable', sans-serif;
        --font-kr: 'SUIT', sans-serif;
        /* ── TYPE SCALE — visual-normalized, EN base ── */
        --t-display: clamp(32px, 4.5vw, 60px);
        --t-h1: clamp(26px, 3.4vw, 48px);
        --t-h2: clamp(20px, 2.5vw, 34px);
        --t-h2-sm: clamp(18px, 2vw, 26px);
        --t-h3: 18px;
        /* ── LAYOUT ── */
        --wrap: 1200px;
        --col-wide: 1080px;
        --col-text: 720px;
        --col-narrow: 520px;
        --pad-v: 120px;
        --pad-h: 72px;
      }

      /* ── KO TYPE SCALE: SUIT fills em square more completely than Century Gothic */
      /* Consistent ~8% reduction maintains visual parity across EN/KO toggle */
      body.ko {
        --t-display: clamp(30px, 4.2vw, 56px);
        --t-h1: clamp(24px, 3.1vw, 44px);
        --t-h2: clamp(18px, 2.3vw, 31px);
        --t-h2-sm: clamp(17px, 1.85vw, 24px);
        --t-h3: 17px;
      }
      body {
        background: var(--white);
        color: var(--obsidian);
        font-family: var(--font-en);
        font-weight: 400;
        line-height: 1.7;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        word-break: keep-all;
        overflow-wrap: break-word;
      }

      /* ── NAV ── */
      #nav {
        position: fixed;
        inset: 0 0 auto;
        z-index: 300;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 52px;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid transparent;
        transition: border-color 0.4s;
      }
      #nav.scrolled {
        border-color: var(--hairline);
      }
      .logo {
        text-decoration: none;
        display: flex;
        align-items: center;
      }
      .logo-img {
        height: 80px;
        width: auto;
        display: block;
      }
      .nav-links {
        display: flex;
        gap: 40px;
        list-style: none;
      }
      .nav-links a {
        font-size: 15px;
        color: var(--slate);
        text-decoration: none;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: var(--obsidian);
      }
      .nav-end {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .lang-switch {
        display: flex;
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 40px;
        padding: 3px;
        gap: 1px;
      }
      .lang-switch button {
        font-size: 10px;
        letter-spacing: 0.1em;
        padding: 4px 12px;
        border-radius: 40px;
        border: none;
        background: transparent;
        color: var(--mist);
        cursor: pointer;
        transition: all 0.2s;
      }
      .lang-switch button.on {
        background: var(--navy);
        color: var(--white);
      }
      .nav-cta {
        font-size: 11px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--white);
        text-decoration: none;
        padding: 9px 22px;
        background: var(--navy);
        border: 1px solid var(--navy);
        border-radius: 2px;
        transition: all 0.22s;
        white-space: nowrap;
        min-width: 170px;
        text-align: center;
        display: inline-block;
        box-sizing: border-box;
      }
      .nav-cta:hover {
        background: var(--authority);
        border-color: var(--authority);
      }
      .burger {
        display: none;
        flex-direction: column;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
      }
      .burger span {
        display: block;
        width: 20px;
        height: 1px;
        background: var(--obsidian);
        transition: all 0.3s;
      }
      .mob-nav {
        display: none;
        position: fixed;
        top: 80px;
        left: 0;
        right: 0;
        background: var(--white);
        border-bottom: 1px solid var(--hairline);
        padding: 20px 28px 28px;
        z-index: 299;
        flex-direction: column;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      }
      .mob-nav.open {
        display: flex;
      }
      .mob-nav a {
        font-size: 15px;
        color: var(--obsidian);
        font-weight: 500;
        text-decoration: none;
        padding: 15px 0;
        border-bottom: 1px solid var(--hairline);
      }
      .mob-bottom {
        margin-top: 24px;
        display: flex;
        align-items: center;
      }

      /* ── SHARED ── */
      .kicker {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }
      .kicker::before {
        content: '';
        width: 28px;
        height: 1px;
        background: var(--navy);
        flex-shrink: 0;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(22px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade {
        opacity: 0;
        transform: translateY(18px);
        transition:
          opacity 0.75s ease,
          transform 0.75s ease;
      }
      .fade.in {
        opacity: 1;
        transform: translateY(0);
      }
      .fd1 {
        transition-delay: 0.1s;
      }
      .fd2 {
        transition-delay: 0.2s;
      }
      .fd3 {
        transition-delay: 0.3s;
      }
      .fd4 {
        transition-delay: 0.4s;
      }

      /* ── PROBLEM ── */
      #problem {
        background: var(--white);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .problem-grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 80px;
        max-width: var(--col-wide);
      }
      .problem-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
      }
      body.ko .problem-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .problem-right {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .problem-p {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
      }
      .problem-p b {
        color: var(--obsidian);
        font-weight: 600;
      }
      .problem-rule {
        width: 100%;
        height: 1px;
        background: var(--hairline);
      }
      .problem-close {
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-style: italic;
        color: var(--obsidian);
        line-height: 1.45;
        letter-spacing: 0.02em;
      }
      .problem-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      .pcard {
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 28px 24px;
        transition: border-color 0.2s;
      }
      .pcard:hover {
        border-color: var(--mist);
      }
      .pcard-icon {
        width: 36px;
        height: 36px;
        background: var(--white);
        border: 1px solid var(--hairline);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 18px;
      }
      .pcard-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--obsidian);
        line-height: 1.2;
        margin-bottom: 10px;
      }
      .pcard-desc {
        font-size: 13px;
        color: var(--slate);
        line-height: 1.75;
      }

      /* ── STACK FAIL ── */
      #stack-fail {
        background: var(--ivory);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .stack-head {
        max-width: var(--col-wide);
        margin-bottom: 64px;
      }
      .stack-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 20px;
      }
      .stack-intro {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        max-width: var(--col-text);
      }
      .stack-intro b {
        color: var(--obsidian);
        font-weight: 600;
      }
      .stack-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        max-width: var(--col-wide);
        margin-bottom: 64px;
      }
      .scard {
        background: var(--white);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 32px 28px;
        transition: border-color 0.2s;
      }
      .scard:hover {
        border-color: var(--mist);
      }
      .scard-title {
        font-family: var(--font-en);
        font-size: 18px;
        color: var(--obsidian);
        letter-spacing: 0.04em;
        margin-bottom: 4px;
      }
      .scard-tag {
        font-size: 10px;
        letter-spacing: 0.12em;
        color: var(--mist);
        text-transform: uppercase;
        font-weight: 700;
        margin-bottom: 20px;
        display: block;
      }
      .scard-body {
        font-size: 13px;
        color: var(--slate);
        line-height: 1.85;
      }
      .stack-table-wrap {
        max-width: var(--col-wide);
      }
      .stack-table {
        background: var(--white);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        overflow: hidden;
      }
      .stack-trow {
        display: grid;
        grid-template-columns: 1.4fr 1fr 1fr 1fr;
        border-bottom: 1px solid var(--hairline);
      }
      .stack-trow:last-child {
        border-bottom: none;
      }
      .stack-trow.header {
        background: var(--ivory);
      }
      .stack-tcell {
        padding: 18px 24px;
        font-size: 13px;
        color: var(--slate);
        border-right: 1px solid var(--hairline);
        display: flex;
        align-items: center;
      }
      .stack-tcell:last-child {
        border-right: none;
      }
      .stack-trow.header .stack-tcell {
        font-family: var(--font-en);
        font-size: 13px;
        color: var(--obsidian);
        letter-spacing: 0.04em;
        font-weight: 400;
      }
      body.ko .stack-trow.header .stack-tcell {
        font-family: var(--font-kr);
        font-weight: 500;
      }
      .stack-trow .stack-tcell:first-child {
        font-weight: 600;
        color: var(--obsidian);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .stack-trow .stack-tcell.eacp {
        background: rgba(27, 42, 78, 0.04);
        color: var(--navy);
        font-weight: 600;
      }
      .stack-trow.header .stack-tcell.eacp {
        background: var(--navy);
        color: var(--white);
      }
      .stack-close {
        max-width: var(--col-wide);
        margin-top: 48px;
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-style: italic;
        color: var(--obsidian);
        line-height: 1.5;
        letter-spacing: 0.02em;
      }
      .stack-close b {
        font-style: normal;
        color: var(--navy);
        font-weight: 600;
      }
      body.ko .stack-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      body.ko .stack-close {
        font-family: var(--font-kr);
        font-style: normal;
        font-weight: 500;
      }

      /* ── EACP DEFINITION ── */
      #eacp-definition {
        background: var(--white);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .eacp-head {
        max-width: var(--col-wide);
        margin-bottom: 56px;
      }
      .eacp-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.2;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 24px;
      }
      body.ko .eacp-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .eacp-intro {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        max-width: var(--col-text);
      }
      .eacp-intro b {
        color: var(--navy);
        font-weight: 600;
      }
      .eacp-pillars {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1px;
        max-width: var(--col-wide);
        background: var(--hairline);
        border: 1px solid var(--hairline);
        margin-bottom: 48px;
      }
      .epillar {
        background: var(--white);
        padding: 36px 32px;
      }
      .epillar-n {
        font-family: var(--font-en);
        font-size: 10px;
        letter-spacing: 0.22em;
        color: var(--navy);
        text-transform: uppercase;
        margin-bottom: 16px;
        font-weight: 700;
      }
      .epillar-title {
        font-family: var(--font-en);
        font-size: 20px;
        color: var(--obsidian);
        letter-spacing: 0.04em;
        margin-bottom: 12px;
        line-height: 1.3;
      }
      body.ko .epillar-title {
        font-family: var(--font-kr);
        font-size: 18px;
        font-weight: 500;
      }
      .epillar-body {
        font-size: 14px;
        color: var(--slate);
        line-height: 1.8;
      }
      .eacp-close {
        max-width: var(--col-wide);
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-style: italic;
        color: var(--obsidian);
        line-height: 1.5;
        letter-spacing: 0.02em;
        padding-top: 32px;
        border-top: 1px solid var(--hairline);
      }
      .eacp-close b {
        font-style: normal;
        color: var(--navy);
        font-weight: 600;
      }
      body.ko .eacp-close {
        font-family: var(--font-kr);
        font-style: normal;
        font-weight: 500;
      }

      /* ── FOOTER ── */
      footer {
        background: var(--obsidian);
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        padding: 32px var(--pad-h);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }
      .foot-logo img {
        height: 40px;
        width: auto;
        display: block;
      }
      .foot-copy {
        font-size: 9.5px;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.6);
      }
      .foot-links {
        display: flex;
        gap: 28px;
      }
      .foot-links a {
        font-size: 9.5px;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.65);
        text-decoration: none;
        transition: color 0.2s;
      }
      .foot-links a:hover {
        color: rgba(255, 255, 255, 0.9);
      }

      /* ── RESPONSIVE: TABLET ── */
      @media (max-width: 960px) {
        :root {
          --pad-v: 80px;
          --pad-h: 28px;
        }
        #nav {
          padding: 0 28px;
          height: 72px;
        }
        .nav-links,
        .nav-cta,
        #nav .lang-switch {
          display: none;
        }
        .burger {
          display: flex;
        }
        .mob-nav {
          top: 72px;
        }
        .problem-grid {
          grid-template-columns: 1fr;
          gap: 40px;
        }
        .problem-cards {
          grid-template-columns: 1fr;
        }
        footer {
          padding: 24px var(--pad-h);
          flex-direction: column;
          align-items: flex-start;
          gap: 16px;
        }
        .foot-links {
          flex-wrap: wrap;
        }
        .stack-cards {
          grid-template-columns: 1fr;
          gap: 32px;
        }
        .stack-table-wrap {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }
        .stack-table {
          min-width: 560px;
        }
        .stack-trow {
          min-width: 560px;
        }
        .eacp-pillars {
          grid-template-columns: 1fr;
        }
      }

      /* ── RESPONSIVE: MOBILE ── */
      @media (max-width: 560px) {
        :root {
          --pad-v: 56px;
          --pad-h: 20px;
        }
        .stack-tcell {
          padding: 14px 16px;
          font-size: 12px;
        }
        .stack-close {
          font-size: 16px;
        }
      }

      /* ── VISION HERO ── */
      .vision-hero {
        padding: 140px var(--pad-h) 80px;
        border-bottom: 1px solid var(--hairline);
        background: var(--white);
      }
      .vision-eyebrow {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
      }
      .vision-eyebrow::before {
        content: '';
        width: 28px;
        height: 1px;
        background: var(--navy);
      }
      .vision-title {
        font-family: var(--font-en);
        font-size: var(--t-display);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.1;
        letter-spacing: 0.02em;
        margin-bottom: 20px;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;
      }
      .vision-title em {
        font-style: italic;
      }
      .vision-desc {
        font-size: 15px;
        color: var(--slate);
        max-width: 560px;
        line-height: 1.75;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
      }
      body.ko .vision-title {
        font-family: var(--font-kr);
        line-height: 1.3;
      }
      /* Vision CTA */
      .vision-cta-wrap {
        padding: 80px var(--pad-h) 112px;
        background: var(--navy);
        text-align: center;
      }
      .vision-cta-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h2);
        font-weight: 400;
        color: var(--white);
        letter-spacing: 0.02em;
        margin-bottom: 12px;
      }
      body.ko .vision-cta-h2 {
        font-family: var(--font-kr);
      }
      .vision-cta-sub {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.65);
        margin-bottom: 36px;
      }
      .vision-cta-btn {
        display: inline-block;
        font-size: 11px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--navy);
        text-decoration: none;
        padding: 14px 36px;
        background: var(--white);
        border-radius: 2px;
        transition: all 0.22s;
      }
      .vision-cta-btn:hover {
        background: var(--ivory);
      }
      @media (max-width: 960px) {
        .vision-hero {
          padding: 112px var(--pad-h) 56px;
        }
        .vision-cta-wrap {
          padding: 60px var(--pad-h) 80px;
        }
      }
    </style>
  </head>
  <body>
    <nav id="nav">
      <a href="index.html" onclick="this.href = 'index.html?lang=' + currentLang" class="logo">
        <img class="logo-img" src="toren_logo_navy.svg" alt="Toren" />
      </a>
