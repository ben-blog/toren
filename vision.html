<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vision — Toren by ImperAI</title>
    <meta property="og:title" content="Vision — Toren by ImperAI" />
    <meta
      property="og:description"
      content="Why AI governance is no longer optional — the problem, the gap, and the category that fills it."
    />
    <meta property="og:image" content="https://imperai.ai/og-image.png" />
    <meta property="og:url" content="https://imperai.ai/vision.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://imperai.ai/og-image.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <style>
      :root {
        --toren-bg: #ebf1fb;
      }

      /* ── VISION.HTML NAV OVERRIDES (dark theme) ── */
      #nav {
        background: transparent;
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
        border-bottom: none;
        transition:
          background 0.4s,
          backdrop-filter 0.4s;
      }
      #nav.scrolled {
        background: rgba(8, 8, 8, 0.42);
        backdrop-filter: blur(28px) saturate(140%);
        -webkit-backdrop-filter: blur(28px) saturate(140%);
      }
      #nav .logo-dark {
        display: none;
      }
      #nav .logo-light {
        display: block;
      }
      #nav .nav-links a {
        color: rgba(255, 255, 255, 0.5);
      }
      #nav .nav-links a:hover,
      #nav .nav-links a.active {
        color: var(--white);
      }
      #nav .nav-cta {
        background: transparent;
        border-color: rgba(255, 255, 255, 0.28);
        color: var(--white);
      }
      #nav .nav-cta:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.5);
      }
      #nav .lang-switch {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.14);
      }
      #nav .lang-switch button {
        color: rgba(255, 255, 255, 0.45);
      }
      #nav .lang-switch button.on {
        background: rgba(255, 255, 255, 0.12);
        color: var(--white);
      }
      #nav .burger span {
        background: var(--white);
      }

      /* ── MANIFESTO HERO ── */
      #manifesto {
        background: var(--obsidian);
        background-image: url('assets/hero_vision.webp');
        background-size: cover;
        background-position: center 40%;
        padding: calc(80px + 96px) var(--pad-h) 96px;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
      }
      #manifesto::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to right,
          rgba(10, 10, 10, 0.88) 0%,
          rgba(10, 10, 10, 0.65) 55%,
          rgba(10, 10, 10, 0.4) 100%
        );
        pointer-events: none;
      }
      .manifesto-kicker {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.3);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 48px;
      }
      .manifesto-kicker::before {
        content: '';
        width: 28px;
        height: 1px;
        background: rgba(255, 255, 255, 0.18);
        flex-shrink: 0;
      }
      .manifesto-h1 {
        font-family: var(--font-en);
        font-size: var(--t-display);
        font-weight: 300;
        color: var(--white);
        line-height: 1.15;
        letter-spacing: 0.01em;
        max-width: 860px;
        margin-bottom: 32px;
        text-wrap: balance;
      }
      body.ko .manifesto-h1 {
        font-family: var(--font-kr);
        line-height: 1.3;
        font-weight: 300;
      }
      .manifesto-h1 em {
        font-style: italic;
        color: rgba(255, 255, 255, 0.92);
      }
      body.ko .manifesto-h1 em {
        font-family: var(--font-kr);
        font-style: normal;
      }
      .manifesto-sub {
        font-size: 17px;
        color: rgba(255, 255, 255, 0.42);
        max-width: 560px;
        line-height: 1.82;
        margin-bottom: 56px;
      }
      body.ko .manifesto-sub {
        font-family: var(--font-kr);
      }
      .manifesto-actions {
        display: flex;
        gap: 20px;
        align-items: center;
        flex-wrap: wrap;
      }
      .manifesto-btn-primary {
        font-size: 11px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--obsidian);
        text-decoration: none;
        padding: 13px 30px;
        background: var(--white);
        border-radius: 2px;
        transition: all 0.22s;
        white-space: nowrap;
      }
      .manifesto-btn-primary:hover {
        background: var(--ivory);
      }

      /* ── POINT OF VIEW ── */
      #pov {
        background: var(--navy);
        padding: var(--pad-v) var(--pad-h);
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      #pov .kicker {
        color: rgba(255, 255, 255, 0.35);
      }
      #pov .kicker::before {
        background: rgba(255, 255, 255, 0.2);
      }
      .pov-head {
        max-width: var(--col-wide);
        margin-bottom: 64px;
      }
      .pov-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--white);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 16px;
      }
      body.ko .pov-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .pov-intro {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.42);
        max-width: 580px;
        line-height: 1.8;
      }
      body.ko .pov-intro {
        font-family: var(--font-kr);
      }
      .pov-beliefs {
        max-width: var(--col-wide);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .pov-belief {
        position: relative;
        padding: 44px 0;
        min-height: 160px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .pov-belief-num {
        position: absolute;
        left: -8px;
        bottom: -0.1em;
        font-family: var(--font-en);
        font-size: clamp(96px, 14vw, 180px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.04em;
        color: rgba(255, 255, 255, 0.18);
        user-select: none;
        pointer-events: none;
      }
      .pov-belief-text {
        position: relative;
        z-index: 1;
        font-family: var(--font-en);
        font-size: clamp(15px, 1.55vw, 19px);
        font-weight: 300;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.65;
        letter-spacing: 0.01em;
        max-width: 720px;
        padding-left: clamp(120px, 14vw, 200px);
      }
      body.ko .pov-belief-text {
        font-family: var(--font-kr);
        font-size: clamp(14px, 1.4vw, 17px);
        line-height: 1.75;
      }
      .pov-belief-text strong {
        color: var(--white);
        font-weight: 600;
      }

      /* ── WHY NOW ── */
      #why-now {
        background: var(--navy);
        padding: var(--pad-v) var(--pad-h);
        border-top: 1px solid var(--hairline);
      }
      #why-now .kicker {
        color: rgba(255, 255, 255, 0.4);
      }
      #why-now .kicker::before {
        background: rgba(255, 255, 255, 0.25);
      }
      .why-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--white);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 20px;
        max-width: var(--col-wide);
      }
      body.ko .why-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .why-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        max-width: var(--col-wide);
      }
      .why-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        padding: 40px 36px;
        transition: background 0.22s;
        display: flex;
        flex-direction: column;
      }
      .why-card:hover {
        background: rgba(255, 255, 255, 0.07);
      }
      .why-n {
        font-family: var(--font-en);
        font-size: clamp(44px, 5.5vw, 68px);
        font-weight: 300;
        color: var(--white);
        letter-spacing: -0.025em;
        line-height: 1;
        min-height: clamp(52px, 6.5vw, 80px);
        margin-bottom: 18px;
        display: flex;
        align-items: flex-end;
        gap: 10px;
      }
      .why-n-sub {
        font-size: clamp(11px, 1vw, 13px);
        font-weight: 400;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.32);
        line-height: 1.4;
        text-transform: uppercase;
      }
      .why-title {
        font-size: 15px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.88);
        margin-bottom: 12px;
        line-height: 1.35;
      }
      body.ko .why-title {
        font-family: var(--font-kr);
      }
      .why-body {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.48);
        line-height: 1.9;
      }
      .why-source {
        font-size: 10px;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.48);
        margin-top: 18px;
        text-transform: uppercase;
      }

      /* ── PROBLEM ── */
      #problem {
        background: var(--white);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .problem-head {
        max-width: var(--col-wide);
        display: grid;
        grid-template-columns: 3fr 2fr;
        gap: 80px;
        margin-bottom: 56px;
        align-items: start;
      }
      .problem-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
      }
      body.ko .problem-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .problem-right {
        display: flex;
        flex-direction: column;
        padding-top: 40px;
      }
      .problem-stat {
        border-left: 2px solid var(--navy);
        padding-left: 20px;
      }
      .problem-stat-row {
        display: flex;
        align-items: baseline;
        gap: 24px;
        margin-bottom: 10px;
      }
      .problem-stat-num {
        font-family: var(--font-en);
        font-size: clamp(32px, 4vw, 52px);
        font-weight: 700;
        color: var(--navy);
        letter-spacing: -0.02em;
        line-height: 1;
      }
      .problem-stat-num.muted {
        color: var(--mist);
      }
      .problem-stat-arrow {
        font-size: 18px;
        color: var(--hairline);
      }
      .problem-stat-labels {
        display: flex;
        gap: 24px;
      }
      .problem-stat-label {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--slate);
        line-height: 1.5;
        flex: 1;
      }
      .problem-stat-label.muted {
        color: var(--mist);
      }
      .problem-stat-source {
        font-size: 11px;
        color: var(--mist);
        margin-top: 12px;
        letter-spacing: 0.04em;
      }
      .problem-intro {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        max-width: var(--col-wide);
        margin-bottom: 32px;
      }
      body.ko .problem-intro {
        font-family: var(--font-kr);
      }
      .persona-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        max-width: var(--col-wide);
        margin-bottom: 40px;
      }
      .persona-card {
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 36px 32px;
        display: flex;
        flex-direction: column;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .persona-card:hover {
        border-color: var(--authority);
        box-shadow: 0 4px 24px rgba(44, 66, 112, 0.08);
      }
      .persona-role {
        font-size: 10px;
        letter-spacing: 0.2em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        margin-bottom: 22px;
      }
      .persona-q {
        font-family: var(--font-en);
        font-size: 17px;
        font-style: italic;
        color: var(--obsidian);
        line-height: 1.5;
        letter-spacing: 0.01em;
        margin-bottom: 20px;
        flex: 1;
      }
      body.ko .persona-q {
        font-family: var(--font-kr);
        font-style: normal;
        font-weight: 500;
        font-size: 15px;
        line-height: 1.65;
      }
      .persona-body {
        font-size: 13px;
        color: var(--slate);
        line-height: 1.8;
        border-top: 1px solid var(--hairline);
        padding-top: 18px;
        margin-top: auto;
      }
      .problem-close-row {
        max-width: var(--col-wide);
        padding-top: 32px;
        border-top: 1px solid var(--hairline);
      }
      .problem-close {
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-style: italic;
        color: var(--obsidian);
        line-height: 1.45;
        letter-spacing: 0.02em;
      }
      body.ko .problem-close {
        font-family: var(--font-kr);
        font-style: normal;
        font-weight: 500;
      }
      .problem-close b {
        font-style: normal;
        color: var(--navy);
        font-weight: 600;
      }

      /* ── TOOLING GAP ── */
      #stack-fail {
        background: var(--ivory);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .stack-head {
        max-width: var(--col-wide);
        margin-bottom: 40px;
      }
      .stack-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 20px;
      }
      body.ko .stack-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .stack-intro {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        max-width: var(--col-text);
      }
      /* Table wrapper */
      .tool-table-wrap {
        max-width: var(--col-wide);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin-bottom: 48px;
        border: 1px solid var(--hairline);
        border-radius: 2px;
      }
      .tool-table {
        width: 100%;
        min-width: 820px;
        border-collapse: collapse;
      }
      .tool-table th,
      .tool-table td {
        border-bottom: 1px solid var(--hairline);
        border-right: 1px solid var(--hairline);
        text-align: left;
      }
      .tool-table tr:last-child th,
      .tool-table tr:last-child td {
        border-bottom: none;
      }
      .tool-table th:last-child,
      .tool-table td:last-child {
        border-right: none;
      }
      /* Column headers */
      .mx-th-dim {
        width: 180px;
        min-width: 180px;
        background: var(--ivory);
        padding: 20px 20px 16px;
        vertical-align: bottom;
        position: sticky;
        left: 0;
        z-index: 2;
        border-bottom: 1px solid var(--hairline);
      }
      .mx-dim-label {
        font-size: 10px;
        letter-spacing: 0.16em;
        font-weight: 700;
        color: var(--mist);
        text-transform: uppercase;
      }
      .mx-th-tool {
        background: var(--white);
        padding: 0;
        min-width: 160px;
        vertical-align: top;
        transition: opacity 0.25s;
        border-bottom: 1px solid var(--hairline);
      }
      .mx-header-inner {
        position: relative;
        padding: 20px 20px 64px;
      }
      .mx-col-diy {
        background: var(--white) !important;
      }
      .mx-col-toren {
        background: var(--toren-bg) !important;
        position: sticky;
        left: 180px;
        z-index: 2;
      }
      .mx-col-comp {
        /* no opacity fade — color handles differentiation */
      }
      /* Competitor body cells — full opacity, readable */
      .tool-table tbody td:nth-child(3),
      .tool-table tbody td:nth-child(4),
      .tool-table tbody td:nth-child(5),
      .tool-table tbody td:nth-child(6) {
        transition: opacity 0.25s;
      }
      .tool-logos {
        /* 2-column grid: always 2 logos per row regardless of name line count */
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 8px;
        align-items: start;
        /* absolute inside .mx-header-inner (div) — reliable cross-browser containing block */
        position: absolute;
        top: 72px; /* 20px top padding + 40px name height + 12px gap */
        left: 20px;
        right: 20px;
        min-height: 28px;
      }
      /* Toren column — single hero logo, no grid needed */
      .mx-col-toren .tool-logos {
        display: block;
      }
      .tool-logo-img {
        height: 16px;
        width: auto;
        max-width: 100%;
        object-fit: contain;
        object-position: left center;
        display: block;
      }
      .mx-col-toren .tool-logo-img {
        height: 40px; /* 2× original 20px */
        mix-blend-mode: normal;
        filter: invert(1) brightness(0.15);
        opacity: 0.7;
      }
      /* Per-logo height normalization — equalize visual character size */
      img.tool-logo-img[alt='LangSmith'] {
        height: 12px;
      }
      img.tool-logo-img[alt='Langfuse'] {
        height: 16px;
      }
      img.tool-logo-img[alt='LiteLLM'] {
        height: 14px;
      }
      img.tool-logo-img[alt='Lakera'] {
        height: 18px;
      }
      img.tool-logo-img[alt='Guardrails AI'] {
        height: 20px;
      }
      img.tool-logo-img[alt='Portkey'] {
        height: 16px;
      }
      .tool-logo-badge {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--slate);
        background: var(--ivory);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 2px 7px;
        white-space: nowrap;
        line-height: 1.8;
      }
      .mx-col-toren .tool-logo-badge {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.7);
      }
      .mx-col-name {
        font-family: var(--font-en);
        font-size: 15px;
        font-weight: 700;
        color: var(--obsidian);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        line-height: 1.25;
        /* fixed height = 2 lines max, so logos always start at same Y */
        height: 40px;
        overflow: hidden;
        display: flex;
        align-items: flex-start;
      }
      .mx-col-toren .mx-col-name {
        color: var(--navy);
        font-size: 17px;
      }
      .mx-col-tag {
        font-size: 10px;
        color: var(--slate);
        letter-spacing: 0.03em;
        line-height: 1.4;
      }
      .mx-col-toren .mx-col-tag {
        color: rgba(255, 255, 255, 0.65);
      }
      .mx-col-diy .mx-col-tag {
        color: var(--slate);
      }
      .diy-warn {
        display: inline-block;
        margin-top: 6px;
        font-size: 9px;
        letter-spacing: 0.1em;
        color: var(--slate);
        font-weight: 700;
        text-transform: uppercase;
        border: 1px solid var(--hairline);
        border-radius: 2px;
        padding: 2px 6px;
      }
      /* Row label cells */
      .mx-td-dim {
        background: var(--ivory);
        padding: 16px 16px;
        vertical-align: top;
        border-right: 1px solid var(--hairline);
        position: sticky;
        left: 0;
        z-index: 1;
        transition: opacity 0.25s;
      }
      .mx-row-label {
        display: block;
        font-size: 10px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--obsidian);
        text-transform: uppercase;
        margin-bottom: 5px;
        line-height: 1.4;
      }
      .mx-row-ctx {
        display: block;
        font-size: 11px;
        color: var(--slate);
        line-height: 1.55;
        letter-spacing: 0;
        text-transform: none;
        max-width: 160px;
      }
      body.ko .mx-row-ctx {
        font-family: var(--font-kr);
      }
      /* Value cells */
      .mx-td-val {
        padding: 16px 16px;
        font-size: 13px;
        color: var(--obsidian);
        line-height: 1.55;
        vertical-align: top;
        text-align: left;
        background: var(--white);
        transition: opacity 0.25s;
      }
      /* Rich cell descriptions — R1 / R2 */
      .mx-cell-primary {
        display: block;
        font-size: 13px;
        font-weight: 700;
        color: var(--obsidian);
        letter-spacing: 0.02em;
        margin-bottom: 6px;
        line-height: 1.4;
      }
      .mx-cell-sub {
        display: block;
        font-size: 12px;
        color: var(--obsidian);
        line-height: 1.65;
        font-weight: 400;
      }
      body.ko .mx-cell-primary,
      body.ko .mx-cell-sub {
        font-family: var(--font-kr);
      }
      .mx-td-toren .mx-cell-primary {

        font-family: var(--font-kr);
        font-style: normal;
        font-weight: 500;

      /* ── PACK EVOLUTION ── */
      #pack-evolution {
        background: var(--ivory);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .pack-head {
        max-width: var(--col-wide);
        margin-bottom: 64px;
      }
      .pack-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        margin-bottom: 20px;

        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .pack-intro {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        max-width: var(--col-text);
      }
      .pack-stages {
        max-width: var(--col-wide);
      }

      /* ── Expanding Tab Row ── */
      .pack-tabs {
        display: flex;
        height: 450px;
        border: 1px solid var(--hairline);
        border-radius: 2px;
        overflow: hidden;
      }
      .pack-tab {
        flex: 0 0 108px;
        border-right: 1px solid var(--hairline);
        cursor: pointer;
        overflow: hidden;
        transition:
          flex 0.52s cubic-bezier(0.4, 0, 0.2, 1),
          background-color 0.3s;
        position: relative;
      }
      .pack-tab:last-child {
        border-right: none;
      }
      .pack-tab.open {
        flex: 1 1 0;
        cursor: default;
      }
      /* Top accent bar */
      .pack-tab::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
      }
      .pack-tab-1::before {
        background: var(--slate);
      }
      .pack-tab-2::before {
        background: var(--authority);
      }
      .pack-tab-3::before {
        background: var(--navy);
      }
      /* Background tint when open */
      .pack-tab-1.open {
        background: rgba(94, 102, 117, 0.04);
      }
      .pack-tab-2.open {
        background: rgba(44, 66, 112, 0.04);
      }
      .pack-tab-3.open {
        background: rgba(27, 42, 78, 0.05);
      }

      /* Inner flex row: vlabel | hcontent */
      .pack-tab-inner {
        display: flex;
        flex-direction: row;
        height: 100%;
        overflow: hidden;
        position: relative;
      }

      /* ── Collapsed: vertical label ── */
      .pack-tab-vlabel {
        flex: 0 0 108px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 24px 0;
        overflow: hidden;
        transition:
          flex-basis 0.52s cubic-bezier(0.4, 0, 0.2, 1),
          opacity 0.18s;
      }
      .pack-tab.open .pack-tab-vlabel {
        flex-basis: 0;
        opacity: 0;
        padding: 0;
      }
      .pack-tab-vstep {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .pack-tab-1 .pack-tab-vstep {
        color: var(--slate);
      }
      .pack-tab-2 .pack-tab-vstep {
        color: var(--authority);
      }
      .pack-tab-3 .pack-tab-vstep {
        color: var(--navy);
      }

      /* ── Open: horizontal content ── */
      .pack-tab-hcontent {
        position: absolute;
        inset: 0;
        padding: 40px 36px 36px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.28s 0.18s;
        overflow: hidden;
        display: flex;
        gap: 40px;
        align-items: flex-start;
      }
      .pack-tab.open .pack-tab-hcontent {
        opacity: 1;
        pointer-events: auto;
      }
      /* Left column: text content */
      .pack-content-left {
        flex: 1;
        min-width: 0;
      }
      /* Right column: ghost number decoration */
      .pack-content-right {
        flex: 0 0 160px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: flex-start;
        padding-top: 4px;
        user-select: none;
        pointer-events: none;
      }
      .pack-ghost-num {
        font-family: var(--font-en);
        font-size: 108px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.05em;
      }
      .pack-tab-1 .pack-ghost-num {
        color: rgba(94, 102, 117, 0.11);
      }
      .pack-tab-2 .pack-ghost-num {
        color: rgba(44, 66, 112, 0.09);
      }
      .pack-tab-3 .pack-ghost-num {
        color: rgba(27, 42, 78, 0.09);
      }
      .pack-ghost-lines {
        margin-top: 20px;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: flex-end;
      }
      .pack-ghost-line {
        height: 1px;
      }
      .pack-tab-1 .pack-ghost-line {
        background: rgba(94, 102, 117, 0.14);
      }
      .pack-tab-2 .pack-ghost-line {
        background: rgba(44, 66, 112, 0.12);
      }
      .pack-tab-3 .pack-ghost-line {
        background: rgba(27, 42, 78, 0.12);
      }
      .pack-ghost-line:nth-child(1) {
        width: 100%;
      }
      .pack-ghost-line:nth-child(2) {
        width: 72%;
      }
      .pack-ghost-line:nth-child(3) {
        width: 48%;
      }
      .pack-ghost-line:nth-child(4) {
        width: 28%;
      }
      /* Text styles */
      .pack-stage-time {
        font-size: 10px;
        letter-spacing: 0.16em;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .pack-tab-1 .pack-stage-time {
        color: var(--mist);
      }
      .pack-tab-2 .pack-stage-time {
        color: var(--authority);
      }
      .pack-tab-3 .pack-stage-time {
        color: var(--navy);
      }
      .pack-stage-title {
        font-family: var(--font-en);
        font-size: 22px;
        font-weight: 400;
        color: var(--obsidian);
        letter-spacing: 0.02em;
        line-height: 1.25;
        margin-bottom: 16px;
      }
      body.ko .pack-stage-title {
        font-family: var(--font-kr);
        font-size: 19px;
        font-weight: 600;
      }
      .pack-stage-body {
        font-size: 13px;
        color: var(--slate);
        line-height: 1.85;
        margin-bottom: 20px;
      }
      body.ko .pack-stage-body {
        font-family: var(--font-kr);
      }
      /* Checklist */
      .pack-checklist {
        list-style: none;
        margin-bottom: 24px;
      }
      .pack-checklist li {
        font-size: 12px;
        color: var(--slate);
        padding: 7px 0 7px 16px;
        border-bottom: 1px solid var(--hairline);
        position: relative;
        line-height: 1.4;
      }
      .pack-checklist li:first-child {
        border-top: 1px solid var(--hairline);
      }
      .pack-checklist li::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 5px;
        height: 5px;
        border-radius: 50%;
      }
      body.ko .pack-checklist li {
        font-family: var(--font-kr);
        font-size: 12px;
      }
      .pack-tab-1 .pack-checklist li::before {
        background: var(--mist);
      }
      .pack-tab-2 .pack-checklist li::before {
        background: var(--authority);
      }
      .pack-tab-3 .pack-checklist li::before {
        background: var(--navy);
      }
      .pack-stage-tag {
        display: inline-block;
        font-size: 9px;
        letter-spacing: 0.12em;
        font-weight: 700;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 2px;
      }
      .pack-tab-1 .pack-stage-tag {
        background: var(--ivory);
        color: var(--mist);
        border: 1px solid var(--hairline);
      }
      .pack-tab-2 .pack-stage-tag {
        background: rgba(44, 66, 112, 0.07);
        color: var(--authority);
        border: 1px solid rgba(44, 66, 112, 0.18);
      }
      .pack-tab-3 .pack-stage-tag {
        background: var(--navy);
        color: var(--white);
        border: 1px solid var(--navy);
      }

      /* ── Mobile: vertical accordion ── */
      @media (max-width: 680px) {
        .pack-tabs {
          flex-direction: column;
          height: auto;
        }
        .pack-tab {
          flex: 0 0 auto;
          border-right: none;
          border-bottom: 1px solid var(--hairline);
        }
        .pack-tab:last-child {
          border-bottom: none;
        }
        .pack-tab.open {
          flex: 0 0 auto;
        }
        .pack-tab-inner {
          flex-direction: column;
          height: auto;
          min-height: auto;
        }
        .pack-tab-vlabel {
          flex: 0 0 auto;
          flex-direction: row;
          justify-content: flex-start;
          padding: 16px 20px;
          gap: 10px;
          min-height: 56px;
        }
        .pack-tab.open .pack-tab-vlabel {
          flex-basis: auto;
          opacity: 1;
          padding: 16px 20px;
          border-bottom: 1px solid var(--hairline);
        }
        .pack-tab-vstep {
          writing-mode: horizontal-tb;
        }
        .pack-tab-hcontent {
          position: static;
          max-height: 0;
          padding: 0 20px;
          overflow: hidden;
          opacity: 1;
          pointer-events: none;
          transition:
            max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
            padding 0.3s;
          min-width: 0;
          display: block;
        }
        .pack-tab.open .pack-tab-hcontent {
          max-height: 900px;
          padding: 24px 20px 28px;
          pointer-events: auto;
          opacity: 1;
        }
        .pack-content-right {
          display: none;
        }
        .pack-tab-vlabel::after {
          content: '+';
          font-family: var(--font-en);
          font-size: 18px;
          font-weight: 300;
          color: var(--mist);
          margin-left: auto;
          padding-right: 4px;
          transition: transform 0.3s;
        }
        .pack-tab.open .pack-tab-vlabel::after {
          content: '−';
          color: var(--slate);
        }
      }

      /* ── RESPONSIVE: TABLET ── */
      @media (max-width: 960px) {
        #manifesto {
          padding: calc(72px + 72px) var(--pad-h) 80px;
        }
        .manifesto-h1 {
          max-width: 100%;
        }
        .why-cards {
          grid-template-columns: 1fr;
          gap: 12px;
        }
        .problem-head {
          grid-template-columns: 1fr;
          gap: 32px;
        }
        .problem-right {
          padding-top: 0;
        }
        .persona-grid {
          grid-template-columns: 1fr;
        }
        .tool-table-wrap {
          overflow-x: auto;
        }
        .pack-tabs {
          /* mobile accordion handled in pack-tabs CSS above */
          gap: 0;
        }
      }

      /* ── RESPONSIVE: MOBILE ── */
      @media (max-width: 560px) {
        .mx-th-dim,
        .mx-col-toren,
        .mx-td-dim,
        .mx-td-toren {
          position: static;
        }

        }
        #manifesto {
          padding: calc(72px + 56px) var(--pad-h) 72px;
          min-height: 100svh;
        }
        .pov-belief {
          padding: 32px 0;
        }
        .pov-belief-num {
          font-size: clamp(72px, 22vw, 120px);
        }
      }
    </style>

          entries.forEach((e) => {

            }

      // ── TOOLING GAP: Moon phase SVG renderer ────────────────────────────
      (function () {
        // Pie-chart style: 12 o'clock start, clockwise fill
        // Center (14,14), radius 13, viewBox 28×28
        // level 1 = 25% = 90deg, level 2 = 50% = 180deg,
        // level 3 = 75% = 270deg, level 4 = 100% = full circle
        var NS = 'http://www.w3.org/2000/svg';
        var piePaths = {
          1: 'M 14 14 L 14 1 A 13 13 0 0 1 27 14 Z', // 90° — quarter
          2: 'M 14 14 L 14 1 A 13 13 0 0 1 14 27 Z', // 180° — half
          3: 'M 14 14 L 14 1 A 13 13 0 1 1 1 14 Z', //  270° — three-quarter
        };
        document.querySelectorAll('.moon').forEach(function (span) {
          var level = parseInt(span.dataset.level) || 0;
          var svg = document.createElementNS(NS, 'svg');
          svg.setAttribute('viewBox', '0 0 28 28');
          svg.setAttribute('width', '28');
          svg.setAttribute('height', '28');
          svg.classList.add('moon-svg');
          svg.setAttribute('data-level', level);
          // Background circle
          var bg = document.createElementNS(NS, 'circle');
          bg.setAttribute('cx', '14');
          bg.setAttribute('cy', '14');
          bg.setAttribute('r', '13');
          bg.classList.add('moon-bg');
          svg.appendChild(bg);
          // Fill: pie slice or full circle
          if (level === 4) {
            var full = document.createElementNS(NS, 'circle');
            full.setAttribute('cx', '14');
            full.setAttribute('cy', '14');
            full.setAttribute('r', '13');
            full.classList.add('moon-fill');
            svg.appendChild(full);
          } else if (level > 0 && piePaths[level]) {
            var path = document.createElementNS(NS, 'path');
            path.setAttribute('d', piePaths[level]);
            path.classList.add('moon-fill');
            svg.appendChild(path);
          }
          span.parentNode.replaceChild(svg, span);
        });
      })();

      // ── TOOLING GAP: Column hover ────────────────────────────────────────
      (function () {
        var colIndex = { sec: 3, obs: 4, gw: 5, diy: 6 };

        function setBodyColOpacity(col, opacity) {
          var idx = colIndex[col];
          if (!idx) return;
          document.querySelectorAll('#mx-table tbody tr').forEach(function (row) {
            var td = row.querySelectorAll('td')[idx - 1];
            if (td) td.style.opacity = opacity !== null ? String(opacity) : '';
          });
        }

        document.querySelectorAll('.mx-th-tool.mx-col-comp').forEach(function (th) {
          var col = th.dataset.col;
          th.addEventListener('mouseenter', function () {
            document.querySelectorAll('.mx-th-tool.mx-col-comp').forEach(function (h) {
              h.style.opacity = h.dataset.col === col ? '1' : '0.52';
            });
            Object.keys(colIndex).forEach(function (c) {
              setBodyColOpacity(c, c === col ? 1 : 0.52);
            });
          });
          th.addEventListener('mouseleave', function () {
            document.querySelectorAll('.mx-th-tool.mx-col-comp').forEach(function (h) {
              h.style.opacity = '';
            });
            Object.keys(colIndex).forEach(function (c) {
              setBodyColOpacity(c, null);
            });
          });
        });
      })();

      function setLang(l) {
        currentLang = l;
        document.documentElement.setAttribute('lang', l);
        document.body.classList.toggle('ko', l === 'ko');
        Object.keys(T[l]).forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = T[l][id];
        });
        document.querySelectorAll('.lang-switch button').forEach((btn) => {
          btn.classList.toggle('on', btn.dataset.lang === l);
        });
        document.querySelectorAll('a[onclick*="currentLang"]').forEach((a) => {
          const base = a.href.split('?')[0];
          if (base && !base.includes('mailto') && !base.includes('#')) {
            a.href = base + '?lang=' + l;
          }
        });
      }

      const urlLang = new URLSearchParams(window.location.search).get('lang');
      setLang(urlLang === 'en' ? 'en' : 'ko');
    </script>
