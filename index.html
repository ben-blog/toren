<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toren — Enterprise Agent Control Plane by ImperAI</title>
    <meta property="og:title" content="Toren — Enterprise Agent Control Plane by ImperAI" />
    <meta
      property="og:description"
      content="ImperAI's control plane for enterprise AI agents — governing, authorizing, and auditing every decision."
    />
    <meta property="og:image" content="https://imperai.ai/og-image.png" />
    <meta property="og:url" content="https://imperai.ai/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://imperai.ai/og-image.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* ── HERO ── */
      #hero {
        position: relative;
        min-height: 100svh;
        display: grid;
        align-items: end;
        overflow: hidden;
        background: var(--obsidian);
      }
      #hero-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        background: var(--obsidian);
      }
      .hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(10, 10, 10, 0.94) 0%,
          rgba(10, 10, 10, 0.45) 38%,
          rgba(10, 10, 10, 0) 72%
        );
        pointer-events: none;
      }
      .hero-inner {
        position: relative;
        z-index: 10;
        padding: 160px var(--pad-h) 136px;
        max-width: var(--wrap);
      }
      .hero-tag {
        font-size: 10px;
        letter-spacing: 0.22em;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
        margin-bottom: 32px;
        display: flex;
        align-items: center;
        gap: 14px;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
        font-weight: 700;
      }
      .hero-tag::before {
        content: '';
        display: block;
        width: 28px;
        height: 1px;
        background: rgba(255, 255, 255, 0.35);
      }
      .hero-h1 {
        font-family: var(--font-en);
        font-size: var(--t-display);
        font-weight: 400;
        color: #fff;
        line-height: 1.18;
        letter-spacing: 0.02em;
        margin-bottom: 32px;
      }
      .hero-h1-line {
        display: block;
        overflow: hidden;
        padding-bottom: 0.06em;
      }
      .hero-h1-inner {
        display: block;
        transform: translateY(110%);
        opacity: 0;
        animation: lineReveal 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .hero-h1-inner.d1 {
        animation-delay: 0.55s;
      }
      .hero-h1-inner.d2 {
        animation-delay: 0.72s;
      }
      .hero-h1-inner.d3 {
        animation-delay: 0.88s;
      }
      @keyframes lineReveal {
        from {
          transform: translateY(110%);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .hero-h1 em {
        font-style: italic;
        color: rgba(255, 255, 255, 0.65);
      }
      .hero-h1 .mdash {
        color: rgba(255, 255, 255, 0.4);
        font-style: normal;
      }
      .hero-p {
        font-size: clamp(14px, 1.4vw, 17px);
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.85;
        max-width: var(--col-narrow);
        margin-bottom: 52px;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both;
      }
      .hero-p b {
        color: rgba(255, 255, 255, 0.88);
        font-weight: 600;
      }
      .hero-support {
        font-family: var(--font-en);
        font-size: clamp(15px, 1.4vw, 18px);
        color: rgba(255, 255, 255, 0.82);
        font-style: italic;
        line-height: 1.55;
        letter-spacing: 0.02em;
        margin-bottom: 44px;
        max-width: var(--col-narrow);
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1s both;
      }
      body.ko .hero-support {
        font-family: var(--font-kr);
        font-style: normal;
        font-size: clamp(15px, 1.4vw, 17px);
        font-weight: 500;
      }
      .hero-btns {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        opacity: 0;
        animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1.15s both;
      }
      .btn-primary {
        font-size: 11px;
        letter-spacing: 0.14em;
        font-weight: 700;
        color: var(--navy);
        background: var(--white);
        text-decoration: none;
        padding: 14px 32px;
        border-radius: 2px;
        border: 1px solid var(--white);
        transition: all 0.2s;
        display: inline-block;
      }
      .btn-primary:hover {
        background: var(--ivory);
        border-color: var(--ivory);
      }
      /* KO overrides */
      body.ko .hero-h1 {
        font-family: var(--font-kr);
        font-weight: 500;
        line-height: 1.35;
        letter-spacing: -0.01em;
      }
      body.ko .contact-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }

      /* ── TRUST ── */
      #trust {
        background: var(--white);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .trust-head {
        max-width: var(--col-wide);
        margin-bottom: 56px;
      }
      .trust-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-top: 12px;
        max-width: var(--col-text);
      }
      body.ko .trust-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .trust-pillars {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 32px;
        max-width: var(--col-wide);
        border-top: 1px solid var(--hairline);
        padding-top: 48px;
      }
      .tpillar-n {
        font-family: var(--font-en);
        font-size: 10px;
        letter-spacing: 0.22em;
        color: var(--mist);
        text-transform: uppercase;
        margin-bottom: 14px;
        font-weight: 700;
      }
      .tpillar-title {
        font-family: var(--font-en);
        font-size: 17px;
        color: var(--obsidian);
        letter-spacing: 0.04em;
        margin-bottom: 14px;
        line-height: 1.35;
      }
      body.ko .tpillar-title {
        font-family: var(--font-kr);
        font-size: 16px;
        font-weight: 500;
      }
      .tpillar-body {
        font-size: 13px;
        color: var(--slate);
        line-height: 1.85;
      }
      .tpillar-body b {
        color: var(--obsidian);
        font-weight: 600;
      }
      .tpillar-body a {
        color: var(--navy);
        text-decoration: none;
        border-bottom: 1px solid var(--navy);
        transition: color 0.2s;
      }
      .tpillar-body a:hover {
        color: var(--authority);
        border-color: var(--authority);
      }

      /* ── CONTACT ── */
      #contact {
        background: var(--white);
        border-top: 1px solid var(--hairline);
        padding: var(--pad-v) var(--pad-h);
      }
      .contact-kicker {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }
      .contact-kicker::before {
        content: '';
        width: 28px;
        height: 1px;
        background: var(--navy);
        flex-shrink: 0;
      }
      .contact-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.25;
        letter-spacing: 0.02em;
        margin-bottom: 24px;
        max-width: var(--col-text);
      }
      .contact-p {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.9;
        max-width: var(--col-narrow);
        margin-bottom: 48px;
      }
      .cform {
        max-width: var(--col-narrow);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .cform-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .cform-label {
        font-size: 10px;
        letter-spacing: 0.14em;
        font-weight: 700;
        color: var(--slate);
        text-transform: uppercase;
        display: block;
        margin-bottom: 8px;
      }
      .cform-input {
        width: 100%;
        background: var(--white);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        color: var(--obsidian);
        font-family: var(--font-en);
        font-size: 14px;
        padding: 12px 14px;
        outline: none;
        transition: border-color 0.2s;
      }
      .cform-input:focus {
        border-color: var(--navy);
      }
      .cform-input::placeholder {
        color: var(--mist);
      }
      .cform-textarea {
        width: 100%;
        background: var(--white);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        color: var(--obsidian);
        font-family: var(--font-en);
        font-size: 14px;
        padding: 12px 14px;
        outline: none;
        transition: border-color 0.2s;
        resize: vertical;
        line-height: 1.7;
      }
      .cform-textarea:focus {
        border-color: var(--navy);
      }
      .cform-textarea::placeholder {
        color: var(--mist);
      }
      body.ko .cform-textarea {
        font-family: var(--font-kr);
      }
      .cform-submit {
        width: 100%;
        font-size: 11px;
        letter-spacing: 0.14em;
        font-weight: 700;
        color: var(--white);
        background: var(--navy);
        border: 1px solid var(--navy);
        border-radius: 2px;
        padding: 16px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .cform-submit:hover {
        background: var(--authority);
        border-color: var(--authority);
      }
      /* ── CONTACT TABS ── */
      .ctab-nav {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--hairline);
        margin-bottom: 36px;
        max-width: var(--col-narrow);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .ctab-btn {
        font-size: 10px;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--mist);
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        padding: 10px 20px 10px 0;
        margin-bottom: -1px;
        cursor: pointer;
        transition:
          color 0.2s,
          border-color 0.2s;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .ctab-btn.active {
        color: var(--navy);
        border-bottom-color: var(--navy);
      }
      .ctab-btn:hover:not(.active) {
        color: var(--slate);
      }
      .ctab-panel {
        display: none;
      }
      .ctab-panel.active {
        display: block;
      }
      .demo-notice {
        font-size: 14px;
        color: var(--slate);
        line-height: 1.75;
        max-width: var(--col-narrow);
        margin-bottom: 28px;
        padding: 18px 20px;
        background: var(--ivory);
        border-left: 3px solid var(--navy);
        border-radius: 0 2px 2px 0;
      }

      /* ── RESPONSIVE: TABLET ── */
      @media (max-width: 960px) {
        .hero-inner {
          padding: 130px var(--pad-h) 80px;
        }
        .trust-pillars {
          grid-template-columns: 1fr;
          gap: 32px;
          padding-top: 40px;
        }
        .hero-btns {
          flex-direction: column;
          align-items: stretch;
        }
        .hero-btns a {
          text-align: center;
        }
      }

      /* ── RESPONSIVE: MOBILE ── */
      @media (max-width: 560px) {
        .hero-h1 {
          font-size: 28px;
        }
        .cform-row {
          grid-template-columns: 1fr;
        }
        .trust-pillars {
          gap: 32px;
        }
      }

      /* ── INDEX SUMMARY SECTIONS ── */
      /* Vision teaser */
      /* ── LOGO TICKER ── */
      /* Hero variant — absolute bottom, white logos on dark bg */
      #hero .logo-ticker {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 10;
        padding: 16px 0;
        border-top: none;
        border-bottom: none;
        background: transparent;
      }
      #hero .ticker-label {
        color: rgba(255, 255, 255, 0.3);
        text-align: right;
        padding-right: var(--pad-h);
      }
      #hero .ticker-logo {
        filter: brightness(0) invert(1);
        opacity: 0.35;
      }
      #hero .ticker-logo:hover {
        filter: brightness(0) invert(1);
        opacity: 0.75;
      }
      .logo-ticker {
        padding: 20px 0;
        border-top: 1px solid var(--hairline);
        border-bottom: 1px solid var(--hairline);
        background: var(--white);
        overflow: hidden;
      }
      .ticker-label {
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--mist);
        margin-bottom: 16px;
        font-family: var(--font-en);
      }
      .ticker-track {
        overflow: hidden;
        -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
        mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
      }
      .ticker-inner {
        display: flex;
        align-items: center;
        width: max-content;
        animation: ticker-scroll 22s linear infinite;
      }
      .ticker-inner:hover {
        animation-play-state: paused;
      }
      .ticker-set {
        display: flex;
        align-items: center;
        gap: 72px;
        padding-right: 160px;
      }
      @keyframes ticker-scroll {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(calc(-1 * var(--set-w, 600px)));
        }
      }
      .ticker-logo {
        height: 26px;
        width: auto;
        display: block;
        opacity: 0.4;
        filter: grayscale(100%);
        transition:
          opacity 0.3s ease,
          filter 0.3s ease;
        flex-shrink: 0;
      }
      .ticker-logo:hover {
        opacity: 0.85;
        filter: grayscale(0%);
      }
      @media (prefers-reduced-motion: reduce) {
        .ticker-inner {
          animation: none;
        }
      }

      .vision-teaser {
        padding: var(--pad-v) var(--pad-h);
        background: var(--obsidian);
        color: var(--white);
      }
      .vt-inner {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
        align-items: start;
        max-width: var(--wrap);
      }
      .vt-left {
      }
      .vt-kicker {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: var(--mist);
        text-transform: uppercase;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 14px;
        max-width: var(--wrap);
      }
      .vt-kicker::before {
        content: '';
        width: 28px;
        height: 1px;
        background: var(--mist);
        flex-shrink: 0;
      }
      .vt-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        line-height: 1.25;
        letter-spacing: 0.02em;
        color: var(--white);
        margin-bottom: 24px;
      }
      body.ko .vt-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .vt-sub {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.75;
        margin-bottom: 36px;
      }
      .vt-link {
        font-size: 11px;
        letter-spacing: 0.1em;
        font-weight: 700;
        color: var(--white);
        text-decoration: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        padding-bottom: 2px;
        transition: border-color 0.2s;
      }
      .vt-link:hover {
        border-color: var(--white);
      }
      .vt-right {
        display: flex;
        flex-direction: column;
        gap: 28px;
      }
      .vt-card {
        border-left: 2px solid var(--authority);
        padding-left: 20px;
      }
      .vt-card-q {
        font-family: var(--font-en);
        font-size: 17px;
        font-weight: 400;
        color: var(--white);
        margin-bottom: 6px;
        letter-spacing: 0.01em;
      }
      body.ko .vt-card-q {
        font-family: var(--font-kr);
      }
      .vt-card-a {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.65;
      }

      /* Offering teaser */
      .offering-teaser {
        padding: var(--pad-v) var(--pad-h);
        background: var(--ivory);
        border-top: 1px solid var(--hairline);
      }
      .ot-inner {
        max-width: var(--wrap);
      }
      .ot-head {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        margin-bottom: 64px;
        align-items: start;
      }
      .ot-kicker {
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .ot-kicker::before {
        content: '';
        width: 28px;
        height: 1px;
        background: var(--navy);
        flex-shrink: 0;
      }
      .ot-h2 {
        font-family: var(--font-en);
        font-size: var(--t-h1);
        font-weight: 400;
        line-height: 1.25;
        letter-spacing: 0.02em;
        color: var(--obsidian);
      }
      body.ko .ot-h2 {
        font-family: var(--font-kr);
        line-height: 1.4;
      }
      .ot-right {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .ot-sub {
        font-size: 15px;
        color: var(--slate);
        line-height: 1.75;
      }
      .ot-link {
        font-size: 11px;
        letter-spacing: 0.1em;
        font-weight: 700;
        color: var(--navy);
        text-decoration: none;
        border-bottom: 1px solid var(--authority);
        padding-bottom: 2px;
        transition: border-color 0.2s;
        display: inline-block;
      }
      .ot-link:hover {
        border-color: var(--navy);
      }

      /* Caps grid for offering teaser */
      .ot-caps {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 1px;
        background: var(--hairline);
        border: 1px solid var(--hairline);
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 48px;
      }
      .ot-cap {
        background: var(--white);
        padding: 28px 24px;
      }
      .ot-cap-n {
        font-size: 10px;
        letter-spacing: 0.12em;
        color: var(--mist);
        margin-bottom: 8px;
      }
      .ot-cap-title {
        font-family: var(--font-en);
        font-size: 14px;
        font-weight: 400;
        color: var(--obsidian);
        margin-bottom: 6px;
        letter-spacing: 0.01em;
      }
      body.ko .ot-cap-title {
        font-family: var(--font-kr);
      }
      .ot-cap-tag {
        font-size: 10px;
        color: var(--navy);
        letter-spacing: 0.06em;
      }

      /* Key lines */
      .ot-key {
        font-family: var(--font-en);
        font-size: var(--t-h2-sm);
        font-weight: 400;
        color: var(--slate);
        line-height: 1.4;
        letter-spacing: 0.01em;
        max-width: var(--col-text);
        border-top: 1px solid var(--hairline);
        padding-top: 36px;
      }
      body.ko .ot-key {
        font-family: var(--font-kr);
      }
      .ot-key b {
        color: var(--obsidian);
        font-weight: 600;
      }

      @media (max-width: 960px) {
        .vt-inner,
        .ot-head {
          grid-template-columns: 1fr;
          gap: 40px;
        }
        .ot-caps {
          grid-template-columns: repeat(2, 1fr);
        }
        .ot-caps .ot-cap:last-child {
          grid-column: 1 / -1;
        }
      }
      @media (max-width: 560px) {
        .ot-caps {
          grid-template-columns: 1fr;
        }
        .ot-caps .ot-cap:last-child {
          grid-column: auto;
        }
      }
    </style>
  </head>

      <a href="#hero" class="logo">
        <img class="logo-img logo-dark" src="assets/toren_logo_dark.png" alt="Toren" />
        <img class="logo-img logo-light" src="assets/toren_logo_light.png" alt="Toren" />
      </a>
      <ul class="nav-links">
        <li>

          </a>

        <li>
          <a href="who-we-are.html" onclick="this.href = 'who-we-are.html?lang=' + currentLang" id="nav-wwa">

          </a>

        <li>
          <a href="insight.html" onclick="this.href = 'insight.html?lang=' + currentLang" id="nav-insight">Insight</a>

      // ── TICKER: fill screen width seamlessly ──
      window.addEventListener('load', function () {
        var track = document.querySelector('.ticker-track');
        var inner = document.getElementById('ticker-inner');
        if (!track || !inner) return;
        var original = inner.querySelector('.ticker-set');
        if (!original) return;
        var setW = original.offsetWidth;
        var trackW = track.offsetWidth;
        // enough copies to cover 2x track width — guarantees no gap at any screen size
        var copies = Math.ceil((trackW * 2) / setW) + 1;
        for (var i = 0; i < copies; i++) {
          var clone = original.cloneNode(true);
          clone.setAttribute('aria-hidden', 'true');
          inner.appendChild(clone);
        }
        inner.style.setProperty('--set-w', setW + 'px');
      });

      let currentLang = 'ko';

      function togMob() {
        document.getElementById('mobNav').classList.toggle('open');
      }
      function closeMob() {
        document.getElementById('mobNav').classList.remove('open');
      }
      function goWWA() {
        window.location.href = 'who-we-are.html?lang=' + currentLang;
      }

      window.addEventListener(
        'scroll',
        () => {
          document.getElementById('nav').classList.toggle('scrolled', scrollY > 30);
        },
        { passive: true }
      );

      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        },
        { threshold: 0.08 }
      );
      document.querySelectorAll('.fade').forEach((el) => io.observe(el));

      function setTab(tab) {
        document.querySelectorAll('.ctab-btn').forEach((b) => b.classList.toggle('active', b.dataset.tab === tab));
        document.querySelectorAll('.ctab-panel').forEach((p) => p.classList.toggle('active', p.id === 'panel-' + tab));
      }

      async function onSubmit(e, type) {
        e.preventDefault();
        const btn = e.target.querySelector('.cform-submit');
        btn.textContent = currentLang === 'ko' ? '전송 중…' : 'Sending…';
        btn.disabled = true;
        const inputs = e.target.querySelectorAll('input');
        const ta = e.target.querySelector('textarea');
        let body = { _type: type };
        if (type === 'general') {
          body.company = inputs[0].value;
          body.title = inputs[1].value;
          body.name = inputs[2].value;
          body.email = inputs[3].value;
          if (ta) body.message = ta.value;
          body._subject = '[Toren] General Inquiry — ' + body.company;
          body._replyto = body.email;
        } else if (type === 'demo') {
          body.company = inputs[0].value;
          body.title = inputs[1].value;
          body.name = inputs[2].value;
          body.email = inputs[3].value;
          body._subject = '[Toren] Demo Request — ' + body.company;
          body._replyto = body.email;
        } else if (type === 'investor') {
          body.name = inputs[0].value;
          body.fund = inputs[1].value;
          body.title = inputs[2].value;
          body.email = inputs[3].value;
          if (ta) body.message = ta.value;
          body._subject = '[Toren] Investor Inquiry — ' + body.name + ' / ' + body.fund;
          body._replyto = body.email;
        }
        try {
          await fetch('https://formspree.io/f/mdabaygv', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
            body: JSON.stringify(body),
          });
          btn.textContent = currentLang === 'ko' ? '완료됐습니다 ✓' : 'Sent ✓';
        } catch (err) {
          btn.disabled = false;
          btn.textContent =
            currentLang === 'ko' ? '오류가 발생했습니다. 다시 시도해주세요.' : 'Error. Please try again.';
        }
      }

      function setLang(l) {
        currentLang = l;
        document.documentElement.setAttribute('lang', l);
        document.body.classList.toggle('ko', l === 'ko');
        Object.keys(T[l]).forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = T[l][id];
        });
        document.querySelectorAll('.lang-switch button').forEach((btn) => {
          btn.classList.toggle('on', btn.dataset.lang === l);
        });
      }

      const urlLang = new URLSearchParams(window.location.search).get('lang');
      setLang(urlLang === 'en' ? 'en' : 'ko');
      const urlTab = new URLSearchParams(window.location.search).get('tab');
      if (urlTab) setTab(urlTab);

      // Scroll to hash after lang set
      if (window.location.hash) {
        setTimeout(() => {
          const el = document.querySelector(window.location.hash);
          if (el) el.scrollIntoView({ behavior: 'smooth' });
        }, 100);
      }
