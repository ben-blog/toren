<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="A fast capability clock sends work toward a slower clock of consequence and a human decision owner">
  <defs>
    <radialGradient id="bg" cx="32%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#141d33"/>
      <stop offset="45%" stop-color="#0d1526"/>
      <stop offset="100%" stop-color="#070b14"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0392b" stop-opacity="0.34"/>
      <stop offset="70%" stop-color="#c0392b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="navyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2c4270" stop-opacity="0.4"/>
      <stop offset="72%" stop-color="#2c4270" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2c4270" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0392b" stop-opacity="0.0"/>
      <stop offset="35%" stop-color="#c0392b" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#8fa3c8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8fa3c8" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="560" cy="470" r="520" fill="url(#redGlow)"/>
  <circle cx="1440" cy="640" r="560" fill="url(#navyGlow)"/>

  <!-- faint tick grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
  </g>

  <!-- ===== FAST CAPABILITY CLOCK (left) ===== -->
  <g transform="translate(560,470)">
    <!-- motion arcs -->
    <g fill="none" stroke="#c0392b" stroke-linecap="round">
      <path d="M -300 -110 A 320 320 0 0 1 -180 -270" stroke-opacity="0.5" stroke-width="8"/>
      <path d="M -330 -60 A 335 335 0 0 1 -250 -235" stroke-opacity="0.28" stroke-width="6"/>
      <path d="M -352 0 A 352 352 0 0 1 -305 -175" stroke-opacity="0.16" stroke-width="4"/>
    </g>
    <circle r="248" fill="#0b1220" stroke="#c0392b" stroke-opacity="0.85" stroke-width="3"/>
    <circle r="248" fill="none" stroke="#c0392b" stroke-opacity="0.25" stroke-width="14"/>
    <!-- ticks -->
    <g stroke="#e07a6a" stroke-opacity="0.55" stroke-width="3">
      <line x1="0" y1="-228" x2="0" y2="-206"/>
      <line x1="228" y1="0" x2="206" y2="0"/>
      <line x1="0" y1="228" x2="0" y2="206"/>
      <line x1="-228" y1="0" x2="-206" y2="0"/>
    </g>
    <g stroke="#c0392b" stroke-opacity="0.3" stroke-width="2">
      <line x1="161" y1="-161" x2="147" y2="-147"/>
      <line x1="161" y1="161" x2="147" y2="147"/>
      <line x1="-161" y1="161" x2="-147" y2="147"/>
      <line x1="-161" y1="-161" x2="-147" y2="-147"/>
    </g>
    <!-- fast hands -->
    <line x1="0" y1="0" x2="120" y2="-95" stroke="#f0a898" stroke-width="7" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="150" y2="120" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>
    <circle r="11" fill="#f0a898"/>
  </g>

  <!-- ===== FLOW between clocks ===== -->
  <g>
    <path d="M 830 500 C 1010 560, 1050 600, 1180 640" fill="none" stroke="url(#flow)" stroke-width="4" stroke-dasharray="2 16" stroke-linecap="round"/>
    <path d="M 820 460 C 1010 500, 1060 540, 1170 590" fill="none" stroke="url(#flow)" stroke-width="3" stroke-dasharray="2 16" stroke-linecap="round" opacity="0.6"/>
    <g fill="#c9d3e6">
      <circle cx="905" cy="520" r="4" fill-opacity="0.8"/>
      <circle cx="985" cy="548" r="3.5" fill-opacity="0.6"/>
      <circle cx="1065" cy="585" r="3" fill-opacity="0.45"/>
    </g>
  </g>

  <!-- ===== SLOW CONSEQUENCE CLOCK (right) ===== -->
  <g transform="translate(1440,640)">
    <circle r="300" fill="#0c1424" stroke="#2c4270" stroke-opacity="0.9" stroke-width="3"/>
    <circle r="300" fill="none" stroke="#2c4270" stroke-opacity="0.22" stroke-width="18"/>
    <!-- full tick ring, slow/heavy -->
    <g stroke="#8fa3c8" stroke-opacity="0.5" stroke-width="3">
      <line x1="0" y1="-278" x2="0" y2="-250"/>
      <line x1="278" y1="0" x2="250" y2="0"/>
      <line x1="0" y1="278" x2="0" y2="250"/>
      <line x1="-278" y1="0" x2="-250" y2="0"/>
    </g>
    <g stroke="#5e6675" stroke-opacity="0.55" stroke-width="2">
      <line x1="196" y1="-196" x2="178" y2="-178"/>
      <line x1="196" y1="196" x2="178" y2="178"/>
      <line x1="-196" y1="196" x2="-178" y2="178"/>
      <line x1="-196" y1="-196" x2="-178" y2="-178"/>
    </g>
    <!-- slow single hand near 12 -->
    <line x1="0" y1="0" x2="34" y2="-176" stroke="#b0c4e8" stroke-width="9" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="70" y2="18" stroke="#5e6675" stroke-width="6" stroke-linecap="round"/>
    <circle r="13" fill="#b0c4e8"/>
  </g>

  <!-- ===== HUMAN DECISION OWNER (far right) ===== -->
  <g transform="translate(1790,640)" opacity="0.92">
    <circle cx="0" cy="-46" r="26" fill="none" stroke="#8fa3c8" stroke-opacity="0.7" stroke-width="4"/>
    <path d="M -34 40 C -34 -6, 34 -6, 34 40" fill="none" stroke="#8fa3c8" stroke-opacity="0.7" stroke-width="4"/>
  </g>
  <path d="M 1745 640 L 1690 640" stroke="#8fa3c8" stroke-opacity="0.4" stroke-width="3" stroke-dasharray="2 12" stroke-linecap="round"/>
</svg>
