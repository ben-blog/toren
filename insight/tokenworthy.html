    <script>
      let currentLang = 'ko';

      function goIndex(hash, tab) {
        let url = 'index.html?lang=' + currentLang;
        if (tab) url += '&tab=' + tab;
        url += hash || '';
        window.location.href = url;
      }
      function togMob() {
        document.getElementById('mobNav').classList.toggle('open');
      }
      function closeMob() {
        document.getElementById('mobNav').classList.remove('open');
      }

      window.addEventListener(
        'scroll',
        () => {
          document.getElementById('nav').classList.toggle('scrolled', scrollY > 30);
        },
        { passive: true }
      );

      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        },
        { threshold: 0.08 }
      );
      document.querySelectorAll('.fade').forEach((el) => io.observe(el));

      /* ── share ────────────────────────────────────────────────────── */
      function copyLink(btn) {
        navigator.clipboard.writeText(window.location.href).then(() => {
          btn.classList.add('copied');
          btn.textContent = T[currentLang]['share-copied'];
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.textContent = T[currentLang]['share-copy'];
          }, 1800);
        });
      }
      function setupShareLinks() {
        const url = encodeURIComponent(window.location.href);
        const title = encodeURIComponent(document.title);
        document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${title}&url=${url}`;
        document.getElementById('share-li').href = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
      }

      /* ── i18n ─────────────────────────────────────────────────────── */
      const T = {
        ko: {
          'post-eyebrow': 'Insight — by ImperAI',
          'post-title': "세어봐야 할 것은 <em>'토큰'이 아닙니다.</em>",
          'post-subtitle':
            "메타가 단 몇 달 만에 '토큰 많이 쓰기'에서 '토큰 아끼기'로 돌아선 이유, 그리고 우리가 정말 측정해야 하는 것에 관해서.",
          'post-meta-author': 'Imperai',
          'post-meta-date': '2026년 6월',
          'post-meta-read': '읽는 시간 7분',

          'p-intro-1':
            "지난 봄 메타에서는 'Claudeonomics(클로드노믹스)'라는 게 돌아가고 있었습니다. AI 토큰을 가장 많이 쓴 직원 250명의 순위를 매긴 사내 리더보드였죠. <a href=\"https://www.theinformation.com\" target=\"_blank\" rel=\"noopener\">The Information</a> 보도를 보면, 몇몇 직원은 등수를 올리려고 별 쓸모도 없는 작업까지 에이전트를 동시에 여러 개 돌렸다고 합니다. 그렇게 한 달 소비량이 73조 토큰까지 불어났고, 결국 이 리더보드는 슬그머니 사라졌습니다.",
          'p-intro-2':
            '그런데 지난 주, 올해 사내 AI 비용이 수십억 달러에 이를 거라는 전망과 함께 메타가 이번에는 직원 한 명 한 명에게 토큰 사용 한도를 걸겠다고 발표했습니다. 토큰을 마음껏 쓰라고(tokenmaxxing) 등 떠밀던 회사가, 불과 몇 달 만에 토큰을 아끼라고(tokenminimizing) 돌아선 거죠.',
          'p-intro-3':
            "저는 이 두 장면이 결국 같은 실수를 두 번 되풀이한 것이라고 봅니다. 둘 다 '얼마나 썼나'라는 투입(input) 지표에 사람을 끼워 맞춘 겁니다. 더 쓰라고 하면 사람들은 쓸데없는 일까지 만들어 숫자를 부풀리고, 반대로 아끼라고 하면 정작 제대로 써야 할 곳에서까지 손을 움츠리게 됩니다. 메타에서의 이 해프닝은, 그저 어떤 '숫자'가 목표가 되는 순간, 그 숫자는 더 이상 믿을 만한 잣대가 못 된다는, 그 유명한 <b>굿하트의 법칙(Goodhart's Law)</b>이 또 한 번 들어맞은 가장 최근의 사례라고 하겠습니다.",
          'p-intro-4':
            '재미있는 건, 메타의 CTO가 이미 4월에 이 문제에 대한 정답을 이야기한 적이 있다는 점이에요: <em>"토큰을 얼마나 썼는지만으로는 그 일이 얼마나 값진 것이었는지 알 수 없다"</em>고 했거든요. 백번 옳은 말입니다. 그런데 회사가 그 다음에 내놓은 대책이 \'더 정밀하게 토큰을 얼마나 쓰는지 체크하는 토큰 미터기\'였다는 게 아이러니입니다. 일의 가치를 잴 방법이 마땅찮으니, 그나마 잴 수 있는 토큰이라도 더 꼼꼼히 재기로 한 거죠.',
          'p-intro-5':
            "이게 메타만의 일은 아닙니다. 우버와 서비스나우(ServiceNow)도 한 해 치 AI 예산을 몇 달 만에 다 써버렸다고 하고, 딜로이트는 CFO를 위한 보고서에서 이 현상에 아예 '토크노믹스(tokenomics)'라는 이름을 붙이고, 회사의 이익이 토큰 사용 때문에 줄줄 새는 위험을 경고하기도 했습니다. EY는 챗봇과 한 번 대화하는 데 드는 비용이 3년 전보다 30배쯤 비싸졌다고 추산하기도 했고, 가트너는 한발 더 나가 2027년 말까지 에이전트형 AI 프로젝트의 40% 이상이 비용 부담, 그리고 '그래서 이게 무슨 가치가 있느냐'는 의문 때문에 중간에 엎어질 거라고 합니다.",
          'p-intro-6':
            "이런 진단에는 다들 고개를 끄덕이지만, 막상 이에 대한 대책을 보면 하나같이 여전히 '토큰 사용량을 관리하라'는 겁니다. 총량을 예측하고, 단가를 깎고, 예산을 통제하라는 거예요.",

          'h2-1': "토큰 단위의 비용 추적, 비용의 '의미'를 알 수 없습니다",
          'p-1-1':
            '토큰 단위로 비용을 따지는 건 신용카드 명세서를 들여다보는 것과 비슷한 게 아닌가 생각합니다. 필요한 일이죠. 돈을 얼마나 썼는지 확인하는 데는 좋지만, 어디에 더 쓰고 어디서 줄일지 판단하는 데는 크게 도움이 안 돼요. 진짜로 필요한 건, 그 비용을 <b>회사가 실제로 의미있게 굴러가게 만드는 단위</b>에 붙여 보는 겁니다. 그 돈이 <em>어떤 일</em>에 쓰였는지, <em>누가</em> 그 일을 책임졌는지, 그래서 무슨 가치를 만들고 어떤 위험을 막았는지 같은 거죠.',
          'p-1-2':
            "그래서 제 생각은 이렇습니다. <b>비용을 '의사결정' 단위로 따져 보자는 겁니다.</b> 여기서 의사결정이라는 건, 에이전트가 무언가를 실제로 결정짓는 모든 순간을 말하는데, 고객 데이터를 꺼내 본다든가, 어떤 질문에 대해 최종적인 답을 내놓는다든가, 실패한 작업을 다시 시도한다든가, 사람에게 판단을 넘긴다든가, 이런 하나하나가 다 의사결정이라고 하자구요.",
          'bq-1': "<p>의미나 책임은 '의사결정' 단위로는 생각해 볼 수 있어도, <em>'토큰' 단위로는 그게 어렵습니다.</em></p>",

          'h2-2': '의사결정을 기준으로 보기 시작하면, 두 가지가 달라집니다',
          'p-2-1':
            "첫째, <b>'고민한 값'을 떳떳하게 인정할 수 있게 됩니다.</b> 에이전트가 여러 옵션을 따져 보다가 결국 버린 선택지들 — 거기 들어간 토큰은, 토큰량만 기준으로 보다 보면 '낭비'로 보기 쉽습니다. 하지만 의사결정 단위로 보면 이야기가 달라질 수 있어요 — 낭비가 아니라, <em>그만큼 충분히 따져 보고 내린 판단이라는 증거</em>로 생각할 수 있어요.",
          'p-2-2':
            '둘째, <b>무엇을 손봐야 할지가 또렷해집니다.</b> 어느 에이전트가 어떤 판단이나 행위를 해야 할 때 아무런 결론도 내지 못하고 같은 자리만 맴도는지, 반대로 어떤 판단 하나가 그 값은 비쌌지만 사고를 막아내서 오히려 예산을 더 줘도 아깝지 않은지 — 이런 게 비로소 눈에 들어올 수 있습니다.',

          'h2-3': "'Tokenworthy' — 토큰을 쓸 만한 의사결정이었나",
          'p-3-1':
            "그래서 단어 하나를 새로 제안합니다. 바로 <b>'tokenworthy'</b>라는 단어고, 이 단어를 쓰겠다는 건 <em>이 일이 토큰을 쓸 만한 일인가</em>를 기준으로 살펴보겠다는 뜻이죠.",
          'p-3-2':
            "비행기를 떠올려보면 이 의미를 이해하기 쉽습니다. 항공사는 비행기를 띄울 때 '오래 나는 비행기'를 기준으로 고르는 게 아니라, <b>'감항성(airworthy)'</b> — 안전하게 날 수 있다고 검증받은 비행기를 띄우겠죠. 그래서 '감항성'은 그저 듣기 좋은 형용사가 아니라, 비행기가 반드시 통과해야 하는 엄격한 검증 체계를 가리킵니다. 토큰을 쓴다는 것에도 그런 잣대가 있어야 한다고 생각합니다. 특히, 앞으로 다가올 에이전트 시대에 우리가 사용하게 될, 그리고 부담해야 할, 그 어마어마한 토큰량을 생각해 보면 더 그렇죠. 안 쓸 수는 없으니까요.",
          'p-3-3':
            "그리고 그 바탕에 깔린 사고방식은, '토큰 경제학(token economics)'이라기보다는 <b>'의사결정 경제학(decision economics)'</b>이라고 부르는 게 본질적으로는 맞을 겁니다. '셈'의 기준을 토큰이 아니라 의사결정에 두자는 뜻으로요.",
          'p-3-4':
            "토큰량을 세는 회사는 앞으로도 '많이 쓰기'와 '아끼기' 사이를 시계추처럼 오락가락할 수밖에 없겠지만, 의사결정을 기준으로 토큰 소비를 판단하는 회사는, 결국 진짜 <em>최적화</em>를 시작할 수 있습니다.",

          'about-text':

          'about-link-site': 'imperai.ai 둘러보기 →',
          'about-link-toren': 'Toren 살펴보기 →',
          'post-note': 'Imperai Signal은 에이전트 거버넌스의 구조적 신호를 읽는 (주)임페라이의 칼럼 시리즈입니다.',

      function setLang(l) {

          const el = document.getElementById(id);
          if (el) el.innerHTML = T[l][id];
        });
        document
          .querySelectorAll('.lang-switch button')
          .forEach((btn) => btn.classList.toggle('on', btn.dataset.lang === l));
        document.title =
          l === 'ko'
            ? "세어봐야 할 것은 '토큰'이 아닙니다 — Insight by ImperAI"
            : 'Stop counting tokens. Count decisions. — Insight by ImperAI';
        setupShareLinks();
        addSectionNumbers();

      /* ── section numbers ──────────────────────────────────────────── */
      function addSectionNumbers() {
        document.querySelectorAll('.post-body h2').forEach((h2, i) => {
          const existing = h2.querySelector('.sec-num');
          if (existing) existing.remove();
          const span = document.createElement('span');
          span.className = 'sec-num';
          span.textContent = String(i + 1).padStart(2, '0');
          h2.insertBefore(span, h2.firstChild);
        });
      }

      /* TOC: show after hero passes, highlight active section */
      const tocEl = document.getElementById('post-toc');
      const heroVisual = document.querySelector('.post-hero');

      function updateTocVisibility() {
        if (!heroVisual || !tocEl) return;
        const heroBottom = heroVisual.getBoundingClientRect().bottom;
        tocEl.classList.toggle('toc-visible', heroBottom < 0);
      }
      window.addEventListener('scroll', updateTocVisibility, { passive: true });
      updateTocVisibility();

      /* TOC click: prevent base-href redirect, scroll to section instead */
      const tocList = document.getElementById('toc-list');
      if (tocList) {
        tocList.addEventListener('click', function (e) {
          const a = e.target.closest('a[href^="#"]');
          if (!a) return;
          const id = a.getAttribute('href').slice(1);
          const target = document.getElementById(id);
          if (target) {
            e.preventDefault();
            const navEl = document.getElementById('nav');
            const offset = navEl ? navEl.offsetHeight + 16 : 88;
            const top = target.getBoundingClientRect().top + window.scrollY - offset;
            window.scrollTo({ top, behavior: 'smooth' });
          }
        });
      }

      /* active section highlight */
      const tocObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            const id = e.target.id;
            const link = document.querySelector(`#toc-list a[href="#${id}"]`);
            if (!link) return;
            if (e.isIntersecting) {
              document.querySelectorAll('#toc-list a').forEach((a) => a.classList.remove('toc-active'));
              link.classList.add('toc-active');
            }
          });
        },
        { rootMargin: '-15% 0px -75% 0px' }
      );
      document.querySelectorAll('.post-body h2[id]').forEach((h2) => tocObserver.observe(h2));

      /* ── reading progress ─────────────────────────────────────────── */
      (function () {
        const bar = document.getElementById('reading-progress');
        const article = document.querySelector('article');
        if (!bar || !article) return;
        window.addEventListener(
          'scroll',
          () => {
            const top = article.getBoundingClientRect().top + window.scrollY;
            const height = article.offsetHeight - window.innerHeight;
            const pct = Math.max(0, Math.min(100, ((window.scrollY - top) / height) * 100));
            bar.style.width = pct + '%';
          },
          { passive: true }
        );
      })();

      const urlLang = new URLSearchParams(window.location.search).get('lang');
      setLang(urlLang === 'en' ? 'en' : 'ko');
