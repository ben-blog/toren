    <script>
      let currentLang = 'ko';

      function goIndex(hash, tab) {
        let url = 'index.html?lang=' + currentLang;
        if (tab) url += '&tab=' + tab;
        url += hash || '';
        window.location.href = url;
      }
      function togMob() {
        document.getElementById('mobNav').classList.toggle('open');
      }
      function closeMob() {
        document.getElementById('mobNav').classList.remove('open');
      }

      window.addEventListener(
        'scroll',
        () => {
          document.getElementById('nav').classList.toggle('scrolled', scrollY > 30);
        },
        { passive: true }
      );

      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        },
        { threshold: 0.08 }
      );
      document.querySelectorAll('.fade').forEach((el) => io.observe(el));

      /* ── share ────────────────────────────────────────────────────── */
      function copyLink(btn) {
        navigator.clipboard.writeText(window.location.href).then(() => {
          btn.classList.add('copied');
          btn.textContent = T[currentLang]['share-copied'];
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.textContent = T[currentLang]['share-copy'];
          }, 1800);
        });
      }
      function setupShareLinks() {
        const url = encodeURIComponent(window.location.href);
        const title = encodeURIComponent(document.title);
        document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${title}&url=${url}`;
        document.getElementById('share-li').href = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;

            '하지만 회사 안의 데이터는 성격이 다릅니다. 고객 계약, 직원 인사, 재무 내역, 거래 기록, 도메인 노하우 같은 데이터는 단순히 "연결하면 편해지는 정보"가 아닙니다. 기업의 자산이고, 책임이고, 때로는 규제의 대상입니다. 구글이 마음대로 접근할 수 없고, 접근해서도 안 되는 경우가 많습니다.',
          'p-2-12':
            '한국 금융권을 보면 이 점은 더 분명합니다. 금융위원회는 2024년 8월 「금융분야 망분리 개선 로드맵」을 발표했고, 2026년 1월 사전예고를 거쳐 4월에는 후속 전자금융감독규정 시행세칙 개정도 마무리되었습니다. 일정한 보안 통제를 전제로 SaaS의 내부망 활용이 허용되었고, 생성형 AI 영역의 망분리 개선은 후속 과제로 이어지는 중입니다.',
          'p-2-13':
            '다만 이 흐름의 무게는 "이제 마음껏 써도 된다"에 있지 않습니다. 금융위가 로드맵에서 가장 또렷이 짚은 원칙은 "자율보안·결과책임"입니다. 규제가 완화된다는 것은 책임이 사라진다는 뜻이 아니라, 기업이 스스로 더 잘 보고, 더 잘 막고, 문제가 생기면 설명해야 한다는 뜻에 가깝습니다.',
          'p-2-14':
            '비슷한 흐름은 금융권 밖에서도 나타나기 시작했습니다. 제조, 공공, 헬스케어처럼 규제 환경이 무거운 산업일수록, 외부 플랫폼이 대신 풀어주기 어려운 데이터와 책임의 영역이 더 커집니다. 소비자 영역의 에이전트 경험은 플랫폼이 대신 만들어줄 수 있습니다. 하지만 기업 안의 에이전트 경험은 기업 스스로 책임져야 합니다. 그때 필요한 것은 매끄러운 UX만이 아닙니다.',

          'h2-3': "기업에서는 '매끄러움' 옆에 '흔적'이 있어야 합니다",
          'p-3-1':
            '구글이 보여준 경험의 핵심은 "seamless"입니다. 사용자가 의도를 말하면 결과가 나옵니다. 중간 과정은 거의 보이지 않습니다. 소비자 서비스에서는 이것이 큰 장점입니다. 사용자는 보통 과정을 보고 싶어 하지 않습니다. 원하는 결과가 편하게 나오면 됩니다.',
          'p-3-2':
            '기업 환경에서는 조금 다릅니다. 중간 과정이 보이지 않는다는 것이 편리함이 아니라 불안의 출발점이 될 수 있습니다. 특히 AI가 정보를 보여주는 수준을 넘어 실제 업무 행동을 하기 시작하면, 아래와 같은 질문이 남습니다.',
          'ul-3-q': `
            <li>그 에이전트는 왜 그 고객에게 그 메일을 보냈을까?</li>
            <li>그 판단의 근거가 된 정보는 어디에서 왔을까?</li>
            <li>누가 그 행위를 허가했을까?</li>
            <li>비슷한 상황에서 다른 에이전트는 어떻게 행동했을까?</li>
          `,
          'p-3-3':
            '이 질문은 추상적인 거버넌스 얘기처럼 들릴 수 있습니다. 하지만 이미 비슷한 장면은 현실에서 나타났습니다.',
          'p-3-4':
            '2024년 2월, 캐나다 브리티시컬럼비아주 시민재판소는 Air Canada 챗봇이 고객에게 사후 환불 정책을 잘못 안내한 사건에서 항공사의 책임을 인정했습니다. Air Canada는 "챗봇은 별개의 법적 실체"라고 주장했지만, 재판부는 받아들이지 않았습니다. 챗봇이 상호작용 기능을 가지고 있더라도 결국 회사 웹사이트의 일부이며, 고객에게 제공된 정보에 대한 책임은 회사에 있다는 판단이었습니다.',
          'p-3-5':
            '손해액은 약 651캐나다달러였습니다. 금액만 보면 큰 사건은 아니었습니다. 하지만 이 사건이 남긴 원칙은 작지 않습니다.',
          'p-3-6': '<strong>에이전트가 한 말은 고객에게 회사가 한 말처럼 받아들여질 수 있습니다.</strong>',
          'p-3-7':
            '그래서 기업 안의 에이전트에는 매끄러운 행위만으로는 부족합니다. 그 옆에 반드시 <strong>감사 가능한 행위(auditable action)</strong>가 있어야 합니다.',
          'p-3-8':
            '매끄럽지 않으면 사람들이 쓰지 않습니다. 하지만 감사 가능성이 없으면 오래 쓰기 어렵습니다. 기업 입장에서는 둘 중 하나를 고르는 문제가 아닙니다. 처음부터 같이 설계해야 하는 문제입니다.',
          'p-3-9':
            '기존 거버넌스 도구만으로는 이 문제를 충분히 다루기 어렵습니다. 데이터 거버넌스는 <strong>데이터의 출처(data lineage)</strong>를 봤고, 초기 AI 거버넌스는 <strong>모델의 출처(model lineage)</strong>를 봤습니다. 그런데 에이전트가 직접 행동하기 시작하면 하나가 더 필요해집니다.',
          'p-3-10': '<strong>행위의 출처(action provenance)</strong>입니다.',
          'ul-caper': `
            <li>어떤 인지에서 출발했는가 <span class="caper-term">(Cognition)</span></li>
            <li>어떤 판단을 거쳤는가 <span class="caper-term">(Appraisal)</span></li>
            <li>누가, 어떤 정책으로 허가했는가 <span class="caper-term">(Permission)</span></li>
            <li>어떻게 실행되었는가 <span class="caper-term">(Execution)</span></li>
            <li>결과를 어떻게 회고했는가 <span class="caper-term">(Review)</span></li>
          `,
          'p-3-11':
            'Imperai는 이 다섯 단계를 CAPER라고 부릅니다. 인지·판단·허가·실행·회고. 에이전트가 어떤 행동을 하기까지 거치는 의사결정의 흐름입니다.',
          'p-3-12':
            '여기서 중요한 것은 이름이 아닙니다. 각 단계가 남아야 한다는 점입니다. 막을 것은 막고, 통과시킬 것은 통과시키되, 나중에 다시 봐도 "왜 그렇게 되었는지" 설명할 수 있어야 합니다.',
          'p-3-13':
            'Permission, 즉 허가 단계를 예로 들어보겠습니다. 영업 지원 에이전트가 CRM에 접속해 이렇게 판단했다고 해보겠습니다.',
          'bq-mail-campaign': '<p>"지난 분기 휴면 고객 1,200명에게 재참여 캠페인 메일을 보내겠다."</p>',
          'p-3-14':
            '이때 시스템은 바로 실행하면 안 됩니다. 이 메일은 마케팅 채널에서 보내는 것이 맞는지, 영업 채널에서 보내는 것이 맞는지 확인해야 합니다. 수신 동의는 최근 90일 안에 갱신되었는지, 발송 규모가 일일 한도를 넘지는 않는지, 본문에 개인정보가 들어 있다면 사전 승인된 템플릿을 따르고 있는지도 봐야 합니다.',
          'p-3-15':
            '이 중 하나라도 통과하지 못하면 행위는 멈춰야 합니다. 그리고 왜 멈췄는지 남아야 합니다. 어떤 기준으로 막았는지, 어떤 근거를 봤는지도 같은 로그에 남아야 합니다. 그래야 나중에 누가 보더라도 같은 설명에 도달할 수 있습니다.',
          'p-3-16':
            '기업이 에이전트를 쓴다는 것은 결국 이 문제로 들어갑니다. 에이전트가 무엇을 했는지도 중요하지만, <strong>왜 그렇게 했고, 누가 허가했으며, 어떤 기준으로 막거나 통과시켰는지</strong>가 함께 남아야 합니다.',
          'p-3-17': "이것이 기업용 AI 에이전트에서 점점 더 중요한 '허리'가 될 가능성이 큽니다.",

          'h2-4': '선택지는 이미 갈리고 있습니다',
          'p-4-1':
            '구글 I/O 2026이 기업에 보여준 것은 새로운 기능만이 아닙니다. 직원들의 기대치가 바뀌고 있다는 점입니다. 사람들은 이미 회사 밖에서 AI가 자연스럽게 도와주는 경험을 하고 있고, 회사 안에서도 비슷한 경험을 기대하게 됩니다. 이 변화는 어느 날 갑자기 오지 않습니다. 이미 조금씩 들어오고 있습니다.',
          'p-4-2': '기업 입장에서는 두 가지 길이 보입니다.',
          'p-4-3':
            '하나는 매끄러운 사용 경험을 먼저 들여오는 방식입니다. "일단 써보자"는 접근은 빠릅니다. 조직 안에서 반응도 좋을 수 있고, 데모도 잘 나옵니다. 문제는 첫 사고가 났을 때입니다. 통제 구조가 없으면 흐름이 바로 끊길 수 있습니다.',
          'p-4-4':
            '비슷한 장면은 이미 있었습니다. 2023년 3월 11일, 삼성전자는 디바이스솔루션 부문에 ChatGPT 사용을 허용했습니다. 그런데 약 20일 만에 엔지니어가 ChatGPT에 사내 소스코드와 회의 내용을 입력하는 사고가 세 차례 발생했고, 5월 1일에는 사내 네트워크와 회사 단말에서의 생성형 AI 사용을 전면 금지했습니다.',
          'p-4-5': '허용에서 금지까지 두 달이 채 걸리지 않았습니다. 사내 메모 한 장으로 끝났습니다.',
          'p-4-6':
            '물론 모든 조직이 같은 과정을 겪는 것은 아닙니다. 업종도 다르고, 보안 체계도 다르고, 리더십의 성향도 다릅니다. 하지만 통제 구조 없이 사용성만 먼저 들여오면 비슷한 일이 반복될 가능성은 충분합니다.',
          'p-4-7':
            '다른 길은 Control Plane을 먼저 깔고, 그 위에서 사용 경험을 넓혀가는 방식입니다. 처음에는 느려 보일 수 있습니다. 정책을 정리해야 하고, 권한을 나눠야 하고, 로그를 남겨야 하기 때문입니다. 현업 입장에서는 답답하게 느껴질 수도 있습니다.',
          'p-4-8':
            '하지만 시간이 지나면 차이가 납니다. IAM이 잘 잡힌 조직에서 새로운 SaaS를 붙이는 것과, 그렇지 않은 조직에서 같은 일을 하는 것은 전혀 다른 일입니다. 에이전트도 비슷합니다. Control Plane이 있는 조직은 새 에이전트를 붙일 때마다 처음부터 다시 고민하지 않아도 됩니다. 어디까지 허용할지, 무엇을 남길지, 어떤 경우에 멈출지에 대한 기본 뼈대가 이미 있기 때문입니다.',
          'p-4-9': 'Imperai가 <strong>EACP(Enterprise Agent Control Plane)</strong>를 만들려는 이유도 여기에 있습니다.',
          'p-4-10':
            '구글이든, Anthropic이든, OpenAI든, 자체 구축 에이전트든 상관없이, 어떤 에이전트를 쓰더라도 같은 Control Plane 안에서 인지·판단·허가·실행·회고가 남아야 한다고 보기 때문입니다. IAM이 SaaS 도입의 발목을 잡지 않고 오히려 더 많은 SaaS를 더 안전하게 깔 수 있게 해주는 기반이 되었듯이, EACP도 에이전트 도입의 브레이크가 아닙니다. 더 오래, 더 넓게 쓰기 위한 기반에 가깝습니다.',
          'p-4-11':
            '제대로 통제할 수 있어야 더 과감하게 배포할 수 있고, 더 과감하게 배포할 수 있어야 에이전트는 기업 안에서 실험 도구를 넘어 실제 업무 도구가 됩니다.',
          'p-4-12': '앞으로 기업이 던져야 할 질문은 "에이전트를 쓸 것인가"에서 조금씩 옮겨갈 것입니다.',
          'p-4-13':
            '"우리 회사는 에이전트가 한 일을 어디까지 설명할 수 있는가?" 이 질문에 답할 수 있는 회사와 그렇지 못한 회사의 차이는 생각보다 빨리 드러날 수 있습니다.',

          'post-note':
            'Imperai Signal은 AI 에이전트 시대의 기업 거버넌스를 다루는 Imperai의 정기 칼럼입니다. Imperai는 기업의 AI 에이전트 Control Plane을 설계하는 회사입니다. 첫 번째 제품 Toren은 CAPER(인지·판단·허가·실행·회고) 5단계 의사결정 사이클을 기반으로, 어떤 에이전트든 안전하게 배포할 수 있는 거버넌스 인프라를 제공합니다.',

          `,

        en: {
          'post-eyebrow': 'Imperai Signal #01 · May 2026',
          'post-context-tag': 'Google I/O 2026 Analysis',
          'post-title': 'The Day Search Became Action: What Must Enterprises Prepare For?',
          'post-subtitle':
            "Google I/O 2026 showed the moment search becomes 'action.' As agentic experience rapidly becomes the default in the consumer world, what enterprises need to build to deliver it safely from within.",
          'post-meta-author': 'Imperai',
          'post-meta-date': 'May 2026',
          'post-meta-read': '10 min read',

          'h2-1': "It's not the search bar that's changing. It's the role of search.",
          'p-1-1':
            'The search bar has been an almost unchanged landscape for 25 years. An empty rectangle, a blinking cursor, and an unspoken agreement to compress your question into a handful of keywords. Most of us learned the internet in front of this screen.',
          'p-1-2':
            'That landscape was disrupted on May 19, 2026, at the Google I/O 2026 keynote. Google announced a redesign of the search box for the first time in 25 years — but look a little closer and the core of that announcement is less about the screen and more about a change in role.',
          'p-1-3':
            "Search is no longer content to be a tool that returns an answer when a user types a question. It's moving toward monitoring for changes users care about without waiting to be asked — and in some cases, taking direct Action on their behalf.",
          'p-1-4': "Google's Information Agents illustrate the direction clearly.",
          'bq-1':
            '<p>Information Agents run 24 hours a day in the background, tracking changes across web, news, social, and real-time data that match conditions the user has defined — then surfacing consolidated updates.</p>',
          'p-1-5':
            "At first glance that can look like a slightly smarter notification feature. But Agentic Booking changes the story. A user says 'book a karaoke room for six on Friday night,' and Google aggregates prices and available slots, then surfaces a direct booking link. In some categories — hair salons, home repair, pet care — it goes a step further: Google places a phone call to the business and books the appointment on your behalf.",
          'p-1-6':
            "Generative UI sits on the same current. Users used to have to learn a fixed interface — which menu to enter, which filter to click, which button to find. Now the relationship is reversing: the screen and the actions adapt to the user's intent in the moment.",
          'p-1-7':
            "AI Mode surpassing 1 billion monthly active users within its first year is hard to read as just a product milestone. Per Google's own disclosure, AI Mode query volume has more than doubled every quarter since launch. The pace at which people are growing comfortable with the sense that 'AI looks things up for me, judges for me, and to some degree acts for me' is accelerating.",
          'p-1-8': 'In the consumer space, that sense is rapidly becoming the default.',

          'h2-2': 'The moment it enters the enterprise, everything changes.',
          'p-2-1':
            "While this shift stays outside the company, it's relatively uncomplicated. Personal schedules, restaurant reservations, travel planning, browsing public information — in domains where users themselves own the consequences, having AI be more proactive creates little friction. Users simply adjust to the convenience.",
          'p-2-2': 'Bring the same experience inside a company, however, and the air changes.',
          'p-2-3': 'Picture Kim, a senior marketing manager, on his commute to the office. From the car he says:',
          'bq-dial-1':
            '<p>"Book me a hotel in Busan next week for the business trip — within company policy limits. Somewhere near the area I used last year."</p>',
          'p-2-4':
            'Google cross-references his calendar, pricing, and past preferences, books one option, and sends a confirmation. All Kim did was state his intent. The system handled the rest.',
          'p-2-5': 'Now the same Kim arrives at the office and says to the enterprise AI:',
          'bq-dial-2':
            '<p>"Summarize last quarter\'s campaign results and send a review-request email to the Sales Director."</p>',
          'p-2-6':
            'On the surface it looks like the same kind of request. The user stated the desired outcome; the AI finds and organizes the information and carries through to the next action. But inside the enterprise, a few questions immediately follow. Can anyone explain what data was used in the process? Is there a record of who authorized sending that email? If something goes wrong, can the organization say where responsibility lies?',
          'p-2-7':
            "There may not be many companies that can handle this end-to-end — but the harder problem is the explanation after the fact. 'The AI handled it' may pass in consumer services; inside an enterprise it does not qualify as an answer.",
          'p-2-8':
            'Employees feel this gap acutely. Outside the office, AI increasingly takes over tasks naturally and smoothly. Inside the office, it runs into authority walls, data walls, accountability walls. Executives are not unaware. CIOs and CISOs know it better than most. What remains unclear is what structure closes this gap.',
          'p-2-9': 'The question eventually reduces to this:',
          'bq-2':
            '<p>How do we make available — securely, on top of company data — the same seamlessness employees experience every day on Google?</p>',
          'p-2-10':
            "Answering that requires first drawing a line between what Google can solve well and what enterprises must solve themselves. Google's domain is the web, the news, public pricing, and data the user has explicitly connected — Gmail, Photos. In this space, agent experience can improve quickly and, for many users, is likely to become table-stakes functionality within a few years.",
          'p-2-11':
            'Enterprise data is a different matter. Customer contracts, employee records, financial histories, transaction logs, proprietary domain knowledge — these are not simply information that becomes more useful when connected. They are company assets, liabilities, and frequently subjects of regulation. Google cannot and often must not have unilateral access to them.',
          'p-2-12':
            'The Korean financial sector makes this especially clear. The FSC published its "Financial-Sector Network Separation Improvement Roadmap" in August 2024. After pre-notice in January 2026, the follow-on revision to the Electronic Financial Supervision Regulations was finalized in April. SaaS access to internal networks became permissible under defined security controls, with GenAI network-separation improvements designated as a next phase.',
          'p-2-13':
            "But the weight of this development does not lie in the message 'go ahead and use everything freely.' The principle the FSC emphasized most clearly in the roadmap is 'autonomous security, resultant accountability.' Regulatory relaxation does not mean accountability disappears — it means enterprises are expected to monitor better, block better, and explain when things go wrong.",
          'p-2-14':
            "The same pattern is beginning to appear outside finance. In manufacturing, public sector, and healthcare, the heavier the regulatory environment, the larger the zone of data and accountability that external platforms cannot solve on the enterprise's behalf. The consumer agent experience can be built by platforms. The enterprise agent experience must be owned by the enterprise itself — and seamless UX alone will not be enough.",

          'h2-3': "In the enterprise, 'seamless' must sit next to 'traceable'.",
          'p-3-1':
            "The hallmark of the experience Google demonstrated is seamlessness. The user states intent; the result appears. The process is nearly invisible. In consumer services that is a strength — users generally don't want to see the middle. They want the outcome, delivered smoothly.",
          'p-3-2':
            "Inside an enterprise, it's different. An invisible process is not a convenience — it can be the starting point of anxiety. Especially once AI moves beyond showing information to actually taking business actions, a set of questions is left behind:",
          'ul-3-q': `
            <li>Why did that agent send that email to that customer?</li>
            <li>Where did the information behind that decision come from?</li>
            <li>Who authorized that action?</li>
            <li>In a similar situation, how did another agent behave?</li>
          `,
          'p-3-3':
            'These can sound like abstract governance concerns. But similar moments have already appeared in the real world.',
          'p-3-4':
            'In February 2024, the Civil Resolution Tribunal of British Columbia found Air Canada liable in a case where its chatbot gave a customer incorrect guidance about the airline\'s bereavement refund policy. Air Canada argued the chatbot was a "separate legal entity," but the tribunal rejected that. The chatbot, regardless of its interactive capabilities, was ultimately part of the company\'s website, and the company was responsible for the information it provided to customers.',
          'p-3-5':
            'The damages were roughly CAD 651. Not large by any measure. But the principle the case established is not small.',
          'p-3-6': '<strong>What an agent says can be received by the customer as what the company said.</strong>',
          'p-3-7':
            'That is why seamless action is not enough for enterprise agents. Alongside it, there must be <strong>auditable action</strong>.',
          'p-3-8':
            'If it is not seamless, people will not use it. If it is not auditable, it cannot last. For the enterprise, it is not a choice between the two. It must be designed for both from the start.',
          'p-3-9':
            'Existing governance tools are not sufficient for this. Data governance looked at <strong>data lineage</strong>. Early AI governance looked at <strong>model lineage</strong>. But when agents begin to act directly, one more layer is needed:',
          'p-3-10': '<strong>Action provenance.</strong>',
          'ul-caper': `
            <li>What cognition triggered the action? <span class="caper-term">(Cognition)</span></li>
            <li>What appraisal was performed? <span class="caper-term">(Appraisal)</span></li>
            <li>Who gave permission, under what policy? <span class="caper-term">(Permission)</span></li>
            <li>How was it executed? <span class="caper-term">(Execution)</span></li>
            <li>How was the outcome reviewed? <span class="caper-term">(Review)</span></li>
          `,
          'p-3-11':
            'Imperai calls these five stages CAPER: Cognition, Appraisal, Permission, Execution, Review — the decision-making flow an agent traverses before any action is taken.',
          'p-3-12':
            'What matters here is not the name. It is that each stage must leave a record. What should be blocked gets blocked; what should pass gets through — but anyone reviewing it later should arrive at the same explanation of why.',
          'p-3-13':
            'Take the Permission stage as an example. Suppose a sales support agent has accessed CRM and reached this judgment:',
          'bq-mail-campaign':
            '<p>"I will send a re-engagement campaign email to 1,200 dormant customers from last quarter."</p>',
          'p-3-14':
            'The system must not execute immediately. It should verify whether this email should go via the marketing channel or the sales channel. Has opt-in consent been renewed within the last 90 days? Does the volume exceed the daily send limit? If personal information appears in the body, does the template follow a pre-approved format?',
          'p-3-15':
            'If any one of these checks fails, the action must stop. And the reason it stopped must be recorded — what standard was applied, what evidence was considered — logged alongside the action. That way anyone reviewing it later arrives at the same explanation.',
          'p-3-16':
            'When an enterprise deploys agents, it enters this problem. Not just what the agent did matters — <strong>why it acted that way, who authorized it, and by what standard it was allowed or blocked</strong> must all remain on record.',
          'p-3-17':
            'This is likely to become the most important load-bearing layer in enterprise AI agents going forward.',

          'h2-4': 'The paths are already diverging.',
          'p-4-1':
            'What Google I/O 2026 showed enterprises is not just new features. It showed that employee expectations are shifting. People are already experiencing AI that helps them naturally and fluidly outside the office — and they will bring that expectation inside. This shift does not arrive all at once. It is already seeping in.',
          'p-4-2': 'For enterprises, two paths come into view.',
          'p-4-3':
            "One is to bring in the smooth user experience first. The 'let's just try it' approach is fast. The internal response can be positive, and demos look impressive. The problem comes with the first incident. Without a control structure, the flow can break immediately.",
          'p-4-4':
            'This scene has played out before. On March 11, 2023, Samsung Electronics permitted ChatGPT use in its Device Solutions division. Within roughly 20 days, engineers had pasted proprietary source code and meeting contents into ChatGPT on three separate occasions. By May 1, 2023, Samsung had banned generative AI use across its internal networks and corporate devices entirely.',
          'p-4-5': 'From permission to prohibition in under two months. The whole arc ended with an internal memo.',
          'p-4-6':
            'Not every organization will follow the same path. Sectors differ, security postures differ, leadership styles differ. But the odds of a similar sequence when usability is brought in ahead of control structures are high enough to take seriously.',
          'p-4-7':
            'The other path is to lay down the Control Plane first, then expand the experience on top of it. This can look slower at the start — policies need to be codified, permissions partitioned, logs designed. The field may find it frustrating.',
          'p-4-8':
            'But over time the difference emerges. Onboarding a new SaaS in an organization with a mature IAM structure is a completely different operation from doing the same in one without it. Agents work the same way. An organization with a Control Plane does not have to start from scratch every time it adds a new agent. The basic skeleton for what is permitted, what is logged, and when action stops is already in place.',
          'p-4-9': 'This is exactly why Imperai is building <strong>EACP (Enterprise Agent Control Plane)</strong>.',
          'p-4-10':
            'The conviction is that regardless of whether an organization uses Google, Anthropic, OpenAI, or its own agents — whichever agents it runs — Cognition, Appraisal, Permission, Execution, and Review should all leave a record within the same Control Plane. Just as IAM became the foundation that made it possible to deploy more SaaS more safely — not a bottleneck — EACP is not a brake on agent deployment. It is the foundation for deploying more, for longer.',
          'p-4-11':
            'The ability to control properly is what enables more confident deployment. And more confident deployment is what moves agents from experimental tools to operational infrastructure inside the enterprise.',
          'p-4-12':
            "The question enterprises must ask is shifting — slowly but surely — away from 'will we use agents?'",
          'p-4-13':
            "'How far can our organization explain what the agent has done?' The gap between companies that can answer and those that cannot may become visible faster than most expect.",

          'post-note':
            'Imperai Signal is a regular column on enterprise governance in the AI agent era, published by Imperai. Imperai designs enterprise AI agent Control Planes. Its first product, Toren, provides governance infrastructure for safe deployment of any agent, based on the CAPER (Cognition, Appraisal, Permission, Execution, Review) five-stage decision cycle.',

      function setLang(l) {
        currentLang = l;
        document.documentElement.setAttribute('lang', l);
        document.body.classList.toggle('ko', l === 'ko');
        Object.keys(T[l]).forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = T[l][id];
        });
        document
          .querySelectorAll('.lang-switch button')
          .forEach((btn) => btn.classList.toggle('on', btn.dataset.lang === l));
        document.title =
          l === 'ko'
            ? '검색이 행동을 시작한 날, 기업은 무엇을 준비해야 하는가 — Imperai Signal #01'
            : 'The Day Search Became Action: What Must Enterprises Prepare For? — Imperai Signal #01';
        setupShareLinks();
        addSectionNumbers();
      }

      /* ── section numbers ──────────────────────────────────────────── */
      function addSectionNumbers() {
        document.querySelectorAll('.post-body h2').forEach((h2, i) => {
          const existing = h2.querySelector('.sec-num');
          if (existing) existing.remove();
          const span = document.createElement('span');
          span.className = 'sec-num';
          span.textContent = String(i + 1).padStart(2, '0');
          h2.insertBefore(span, h2.firstChild);
        });
      }

      /* ── TOC visibility (scroll-based) ───────────────────────────── */
      const tocEl = document.getElementById('post-toc');
      const heroVisual = document.querySelector('.post-hero');

      function updateTocVisibility() {
        if (!heroVisual || !tocEl) return;
        const heroBottom = heroVisual.getBoundingClientRect().bottom;
        tocEl.classList.toggle('toc-visible', heroBottom < 0);
      }
      window.addEventListener('scroll', updateTocVisibility, { passive: true });
      updateTocVisibility();

      /* ── TOC click: smooth scroll ─────────────────────────────────── */
      const tocList = document.getElementById('toc-list');
      if (tocList) {
        tocList.addEventListener('click', function (e) {
          const a = e.target.closest('a[href^="#"]');
          if (!a) return;
          const id = a.getAttribute('href').slice(1);
          const target = document.getElementById(id);
          if (target) {
            e.preventDefault();
            const navEl = document.getElementById('nav');
            const offset = navEl ? navEl.offsetHeight + 16 : 88;
            const top = target.getBoundingClientRect().top + window.scrollY - offset;
            window.scrollTo({ top, behavior: 'smooth' });
          }
        });
      }

      /* ── TOC active section highlight ─────────────────────────────── */
      const tocObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            const id = e.target.id;
            const link = document.querySelector(`#toc-list a[href="#${id}"]`);
            if (!link) return;
            if (e.isIntersecting) {
              document.querySelectorAll('#toc-list a').forEach((a) => a.classList.remove('toc-active'));
              link.classList.add('toc-active');
            }
          });
        },
        { rootMargin: '-15% 0px -75% 0px' }
      );
      document.querySelectorAll('.post-body h2[id]').forEach((h2) => tocObserver.observe(h2));

      /* ── reading progress ─────────────────────────────────────────── */
      (function () {
        const bar = document.getElementById('reading-progress');
        const article = document.querySelector('article');
        if (!bar || !article) return;
        window.addEventListener(
          'scroll',
          () => {
            const top = article.getBoundingClientRect().top + window.scrollY;
            const height = article.offsetHeight - window.innerHeight;
            const pct = Math.max(0, Math.min(100, ((window.scrollY - top) / height) * 100));
            bar.style.width = pct + '%';
          },
          { passive: true }
        );
      })();

      const urlLang = new URLSearchParams(window.location.search).get('lang');
      setLang(urlLang === 'en' ? 'en' : 'ko');
    </script>
