<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent Governance Maturity Model v1.1 — ImperAI</title>
    <meta property="og:title" content="AI Agent Governance Maturity Model v1.1" />
    <meta
      property="og:description"
      content="5단계 × 5개 핵심 차원 에이전트 거버넌스 성숙도 프레임워크. 자가진단 도구 포함."
    />
    <meta property="og:url" content="https://imperai.ai/maturity-model.html" />
    <meta property="og:type" content="article" />
    <meta name="description" content="5단계 × 5개 핵심 차원 에이전트 거버넌스 성숙도 프레임워크. 자가진단 도구 포함." />
    <link rel="canonical" href="https://imperai.ai/maturity-model.html" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* ─── KEYFRAMES ─────────────────────────────────────────── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade {
        opacity: 0;
        transform: translateY(18px);
        transition:
          opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .fade.in {
        opacity: 1;
        transform: none;
      }

      /* ─── HERO ──────────────────────────────────────────────── */
      .hero {
        padding: 152px var(--pad-h) 72px;
        border-bottom: 1px solid var(--hairline);
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--navy);
      }
      .hero::after {
        content: 'MATURITY';
        position: absolute;
        right: -10px;
        bottom: -40px;
        font-family: var(--font-en);
        font-size: 140px;
        font-weight: 700;
        letter-spacing: -0.04em;
        color: rgba(27, 42, 78, 0.04);
        line-height: 1;
        pointer-events: none;
        user-select: none;
      }
      .hero-eyebrow {
        font-family: var(--font-en);
        font-size: 10px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: var(--navy);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
      }
      .hero-eyebrow::before {
        content: '';
        width: 28px;
        height: 1px;
        background: var(--navy);
        flex-shrink: 0;
      }
      .hero-title {
        font-family: var(--font-en);
        font-size: clamp(26px, 3.8vw, 52px);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.15;
        letter-spacing: 0.015em;
        max-width: 780px;
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
      }
      body.ko .hero-title {
        font-family: var(--font-kr);
        font-size: clamp(22px, 3.4vw, 46px);
        line-height: 1.3;
        letter-spacing: -0.01em;
      }
      .hero-sub {
        font-size: 15px;
        color: var(--slate);
        max-width: 560px;
        line-height: 1.85;
        margin-bottom: 36px;
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
      }
      body.ko .hero-sub {
        font-family: var(--font-kr);
        font-weight: 400;
      }

      /* ─── STAT STRIP ─────────────────────────────────────────── */
      .stat-strip {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        border-top: 1px solid var(--hairline);
        border-bottom: 1px solid var(--hairline);
        background: var(--ivory);
      }
      .stat-cell {
        padding: 32px 36px;
        border-right: 1px solid var(--hairline);
      }
      .stat-cell:last-child {
        border-right: none;
      }
      .stat-num {
        font-family: var(--font-en);
        font-size: clamp(28px, 3vw, 44px);
        font-weight: 300;
        color: var(--navy);
        letter-spacing: -0.03em;
        line-height: 1;
        display: block;
        margin-bottom: 8px;
      }
      .stat-label {
        font-size: 12px;
        color: var(--slate);
        line-height: 1.5;
      }
      body.ko .stat-label {
        font-family: var(--font-kr);
        font-weight: 400;
      }

      /* ─── SECTION COMMON ─────────────────────────────────────── */
      .section {
        padding: 80px var(--pad-h);
        border-bottom: 1px solid var(--hairline);
      }
      .section-alt {
        background: var(--ivory);
      }
      .section-dark {
        background: var(--navy);
      }
      .sec-eyebrow {
        font-family: var(--font-en);
        font-size: 10px;
        letter-spacing: 0.2em;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--navy);
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .sec-eyebrow::before {
        content: '';
        width: 20px;
        height: 1px;
        background: var(--navy);
      }
      .section-dark .sec-eyebrow {
        color: rgba(255, 255, 255, 0.5);
      }
      .section-dark .sec-eyebrow::before {
        background: rgba(255, 255, 255, 0.3);
      }
      .sec-title {
        font-family: var(--font-en);
        font-size: clamp(20px, 2.4vw, 32px);
        font-weight: 400;
        color: var(--obsidian);
        letter-spacing: 0.02em;
        line-height: 1.25;
        margin-bottom: 12px;
      }
      body.ko .sec-title {
        font-family: var(--font-kr);
        letter-spacing: -0.01em;
      }
      .section-dark .sec-title {
        color: var(--white);
      }
      .sec-desc {
        font-size: 14px;
        color: var(--slate);
        line-height: 1.85;
        max-width: 600px;
        margin-bottom: 48px;
      }
      body.ko .sec-desc {
        font-family: var(--font-kr);
        font-weight: 400;
      }
      .section-dark .sec-desc {
        color: rgba(255, 255, 255, 0.6);
      }

      /* ─── STAIRCASE DIAGRAM ───────────────────────────────────── */
      .staircase-wrap {
        overflow-x: auto;
        padding-bottom: 8px;
      }
      .staircase {
        display: flex;
        align-items: flex-end;
        gap: 0;
        min-width: 600px;
      }
      .stair-step {
        flex: 1;
        position: relative;
        border: 1px solid var(--hairline);
        border-right: none;
        cursor: default;
        transition: all 0.2s;
      }
      .stair-step:last-child {
        border-right: 1px solid var(--hairline);
      }
      .stair-step:hover {
        z-index: 2;
      }
      .stair-l1 {
        height: 100px;
        background: var(--white);
      }
      .stair-l2 {
        height: 140px;
        background: var(--white);
      }
      .stair-l3 {
        height: 185px;
        background: var(--ivory);
        border-top: 2px solid rgba(234, 179, 8, 0.4);
      }
      .stair-l4 {
        height: 240px;
        background: rgba(27, 42, 78, 0.06);
        border-top: 2px solid rgba(27, 42, 78, 0.3);
      }
      .stair-l5 {
        height: 300px;
        background: var(--navy);
        border-top: none;
      }
      .stair-inner {
        padding: 16px 16px 20px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }
      .stair-badge {
        font-family: var(--font-en);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
        display: inline-block;
        padding: 2px 8px;
        border-radius: 2px;
      }
      .stair-l1 .stair-badge {
        color: var(--slate);
        background: var(--ivory);
      }
      .stair-l2 .stair-badge {
        color: var(--slate);
        background: var(--ivory);
      }
      .stair-l3 .stair-badge {
        color: rgba(120, 100, 0, 0.9);
        background: rgba(234, 179, 8, 0.12);
      }
      .stair-l4 .stair-badge {
        color: var(--navy);
        background: rgba(27, 42, 78, 0.1);
      }
      .stair-l5 .stair-badge {
        color: rgba(255, 255, 255, 0.9);
        background: rgba(255, 255, 255, 0.15);
      }
      .stair-name {
        font-family: var(--font-en);
        font-size: clamp(13px, 1.5vw, 17px);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.2;
        margin-bottom: 6px;
      }
      .stair-l5 .stair-name {
        color: var(--white);
      }
      .stair-desc {
        font-size: 11px;
        color: var(--mist);
        line-height: 1.5;
      }
      body.ko .stair-desc {
        font-family: var(--font-kr);
        font-weight: 400;
      }
      .stair-l5 .stair-desc {
        color: rgba(255, 255, 255, 0.55);
      }
      .stair-pct {
        font-family: var(--font-en);
        font-size: 10px;
        letter-spacing: 0.06em;
        color: var(--mist);
        margin-top: 8px;
      }
      .stair-l5 .stair-pct {
        color: rgba(255, 255, 255, 0.4);
      }
      .stair-threshold {
        position: absolute;
        top: -1px;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 12px;
      }
      .stair-threshold-tag {
        font-family: var(--font-en);
        font-size: 9px;
        letter-spacing: 0.1em;
        font-weight: 700;
        text-transform: uppercase;
        white-space: nowrap;
        background: rgba(234, 179, 8, 0.9);
        color: #5a4a00;
        padding: 2px 7px;
        border-radius: 0 0 2px 2px;
        transform: translateY(-100%);
      }
      .stair-l4 .stair-threshold-tag {
        background: var(--navy);
        color: var(--white);
      }

      /* ─── 5×5 MATRIX ─────────────────────────────────────────── */
      .matrix-wrap {
        overflow-x: auto;
      }
      .matrix {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }
      .matrix th {
        font-family: var(--font-en);
        font-size: 10px;
        letter-spacing: 0.14em;
        font-weight: 700;
        text-transform: uppercase;
        padding: 14px 16px;
        text-align: left;
        white-space: nowrap;
        border-bottom: 2px solid var(--hairline);
      }
      body.ko .matrix th {
        font-family: var(--font-kr);
        letter-spacing: 0.06em;
        text-transform: none;
      }
      .matrix-th-dim {
        background: var(--obsidian);
        color: var(--white);
        width: 160px;
      }
      .matrix-th-l1 {
        background: var(--white);
        color: var(--slate);
      }
      .matrix-th-l2 {
        background: var(--white);
        color: var(--slate);
      }
      .matrix-th-l3 {
        background: rgba(234, 179, 8, 0.1);
        color: rgba(100, 80, 0, 0.85);
      }
      .matrix-th-l4 {
        background: rgba(27, 42, 78, 0.1);
        color: var(--navy);
      }
      .matrix-th-l5 {
        background: var(--navy);
        color: var(--white);
      }

      .matrix td {
        vertical-align: top;
        padding: 16px;
        font-size: 12px;
        line-height: 1.6;
        border-bottom: 1px solid var(--hairline);
        border-right: 1px solid var(--hairline);
      }
      body.ko .matrix td {
        font-family: var(--font-kr);
        font-weight: 400;
      }
      .matrix td:last-child {
        border-right: none;
      }

      /* dim label cell */
      .matrix-dim {
        background: var(--obsidian);
        color: var(--white);
        font-size: 11px;
        font-weight: 500;
        line-height: 1.5;
        min-width: 140px;
      }
      body.ko .matrix-dim {
        font-family: var(--font-kr);
        font-weight: 400;
      }
      .matrix-dim-badge {
        display: inline-block;
        font-family: var(--font-en);
        font-size: 9px;
        letter-spacing: 0.1em;
        font-weight: 700;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 6px;
      }
      .matrix-dim-star {
        color: #f5c518;
        margin-left: 2px;
      }

      /* level cells */
      .cell-l1 {
        background: var(--white);
        color: var(--slate);
      }
      .cell-l2 {
        background: var(--white);
        color: var(--slate);
      }
      .cell-l3 {
        background: rgba(234, 179, 8, 0.06);
        color: var(--obsidian);
      }
      .cell-l4 {
        background: rgba(27, 42, 78, 0.07);
        color: var(--obsidian);
      }
      .cell-l5 {
        background: rgba(27, 42, 78, 0.14);
        color: var(--navy);
        font-weight: 500;
      }

      .cell-tag {
        display: block;
        font-family: var(--font-en);
        font-size: 9px;
        letter-spacing: 0.08em;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 6px;
        opacity: 0.5;
      }
      .cell-summary {
        display: block;
        font-size: 11px;
        font-weight: 600;
        line-height: 1.45;
        margin-bottom: 8px;
        color: inherit;
      }
      body.ko .cell-summary {
        font-family: var(--font-kr);
        font-weight: 500;
      }
      .cell-points {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .cell-points li {
        font-size: 10.5px;
        line-height: 1.55;
        color: inherit;
        padding-left: 11px;
        position: relative;
        opacity: 0.88;
      }
      body.ko .cell-points li {
        font-family: var(--font-kr);
        font-weight: 400;
      }
      .cell-points li::before {
        content: '·';
        position: absolute;
        left: 0;
        opacity: 0.55;
      }

      /* ─── RADAR CHART ─────────────────────────────────────────── */
      .radar-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        align-items: center;
      }
      .radar-canvas-wrap {
        position: relative;
        aspect-ratio: 1;
        max-width: 400px;
      }
      canvas#radarChart {
        width: 100%;
        height: auto;
        display: block;
      }
      .radar-controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .radar-ctrl-title {
        font-family: var(--font-en);
        font-size: 11px;
        letter-spacing: 0.12em;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--slate);
        margin-bottom: 4px;
      }
      body.ko .radar-ctrl-title {
        font-family: var(--font-kr);
        letter-spacing: 0.04em;
        text-transform: none;
      }
      .radar-dim-row {
        display: grid;
        grid-template-columns: 120px 1fr 28px;
        align-items: center;
        gap: 10px;
      }
      .radar-dim-label {
        font-size: 11px;
        color: var(--obsidian);
        text-align: right;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      body.ko .radar-dim-label {
        font-family: var(--font-kr);
        font-weight: 400;
      }
      .radar-dim-label.star::after {
        content: ' ★';
        color: #f5c518;
        font-size: 9px;
      }
      input[type='range'].slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 3px;
        background: var(--hairline);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      input[type='range'].slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--navy);
        cursor: pointer;
        border: 2px solid var(--white);
        box-shadow: 0 0 0 1px var(--navy);
        transition: transform 0.15s;
      }
      input[type='range'].slider::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
      .slider-val {
        font-family: var(--font-en);
        font-size: 12px;
        font-weight: 700;
        color: var(--navy);
        text-align: center;
        min-width: 24px;
      }
      .radar-result {
        margin-top: 20px;
        padding: 16px 20px;
        background: var(--navy);
        border-radius: 2px;
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .radar-result-score {
        font-family: var(--font-en);
        font-size: 36px;
        font-weight: 300;
        color: var(--white);
        letter-spacing: -0.03em;
        line-height: 1;
        flex-shrink: 0;
      }
      .radar-result-label {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.75);
        line-height: 1.5;
      }
      body.ko .radar-result-label {
        font-family: var(--font-kr);
        font-weight: 400;
      }
      .radar-result-level {
        font-family: var(--font-en);
        font-size: 15px;
        font-weight: 700;
        color: var(--white);
        display: block;
        margin-bottom: 2px;
      }

      /* ─── FRAMEWORK COMPARISON ─────────────────────────────────── */
      .compare-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      .compare-table th {
        padding: 12px 16px;
        text-align: center;
        font-family: var(--font-en);
        font-size: 10px;
        letter-spacing: 0.12em;
        font-weight: 700;
        text-transform: uppercase;
        background: var(--obsidian);
        color: var(--white);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
      }
      .compare-table th:first-child {
        text-align: left;
      }
      body.ko .compare-table th {
        font-family: var(--font-kr);
        letter-spacing: 0.04em;
        text-transform: none;
      }
      .compare-table th.highlight {
        background: var(--navy);
      }
      .compare-table td {
        padding: 13px 16px;
        border-bottom: 1px solid var(--hairline);
        border-right: 1px solid var(--hairline);
        vertical-align: top;
        color: var(--slate);
        line-height: 1.55;
      }
      body.ko .compare-table td {
        font-family: var(--font-kr);
        font-weight: 400;
      }
      .compare-table td:first-child {
        font-weight: 600;
        color: var(--obsidian);
        background: var(--ivory);
      }
      .compare-table td.highlight {
        background: rgba(27, 42, 78, 0.05);
        color: var(--obsidian);
        font-weight: 500;
      }
      .compare-table td:last-child {
        border-right: none;
      }
      .check {
        color: #16a34a;
        font-weight: 700;
      }
      .cross {
        color: var(--mist);
      }
      .partial {
        color: rgba(180, 120, 0, 0.8);
      }

      /* ─── DIMENSION CARDS ─────────────────────────────────────── */
      .dim-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1px;
        background: var(--hairline);
        border: 1px solid var(--hairline);
      }
      .dim-card {
        background: var(--white);
        padding: 28px 28px 32px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .dim-card-num {
        font-family: var(--font-en);
        font-size: 11px;
        letter-spacing: 0.14em;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--mist);
      }
      .dim-card-title {
        font-family: var(--font-en);
        font-size: clamp(14px, 1.5vw, 17px);
        font-weight: 400;
        color: var(--obsidian);
        line-height: 1.3;
        letter-spacing: 0.015em;
      }
      body.ko .dim-card-title {
        font-family: var(--font-kr);
      }
      .dim-card-wt {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: var(--font-en);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--navy);
        background: rgba(27, 42, 78, 0.08);
        border: 1px solid rgba(27, 42, 78, 0.15);
        border-radius: 2px;
        padding: 3px 9px;
        width: fit-content;
      }
      .dim-card-desc {
        font-size: 12px;
        color: var(--slate);
        line-height: 1.7;
      }
      body.ko .dim-card-desc {
        font-family: var(--font-kr);
        font-weight: 400;
      }
      .dim-card-threshold {
        margin-top: auto;
        padding-top: 16px;
        border-top: 1px solid var(--hairline);
        font-size: 11px;
        color: var(--slate);
        line-height: 1.6;
      }
      body.ko .dim-card-threshold {
        font-family: var(--font-kr);
        font-weight: 400;
      }
      .dim-card-threshold strong {
        display: block;
        color: var(--obsidian);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 4px;
        font-family: var(--font-en);
      }
      body.ko .dim-card-threshold strong {
        font-family: var(--font-kr);
        letter-spacing: 0.02em;
        text-transform: none;
      }

      /* ─── ROADMAP ─────────────────────────────────────────────── */
      .roadmap {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;

      function togMob() {
        document.getElementById('mobNav').classList.toggle('open');
      }
      function closeMob() {
        document.getElementById('mobNav').classList.remove('open');
      }

      window.addEventListener(
        'scroll',
        () => {
          document.getElementById('nav').classList.toggle('scrolled', scrollY > 30);
        },
        { passive: true }
      );

      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        },
        { threshold: 0, rootMargin: '0px 0px -40px 0px' }
      );
      document.querySelectorAll('.fade').forEach((el) => io.observe(el));
      // Fallback: ensure all visible elements are shown even if IO fires before layout settles
      setTimeout(() => {
        document.querySelectorAll('.fade:not(.in)').forEach((el) => {
          const rect = el.getBoundingClientRect();
          if (rect.top < window.innerHeight + 100) el.classList.add('in');
        });
      }, 400);

      function renderStaircase(lang) {
        const d = DATA[lang];
        const classes = ['stair-l1', 'stair-l2', 'stair-l3', 'stair-l4', 'stair-l5'];
        const container = document.getElementById('staircase-container');
        container.innerHTML = d.staircase
          .map(
            (s, i) => `
        <div class="stair-step ${classes[i]}">
          ${s.threshold ? `<div class="stair-threshold"><span class="stair-threshold-tag">${s.threshold}</span></div>` : ''}
          <div class="stair-inner">
            <span class="stair-badge">${s.badge}</span>
            <div class="stair-name">${s.name}</div>
            <div class="stair-desc">${s.desc}</div>
            <div class="stair-pct">${s.pct}</div>
          </div>
        </div>`
          )
          .join('');
      }

      function renderMatrix(lang) {
        const d = DATA[lang];
        const levels = ['L1', 'L2', 'L3', 'L4', 'L5'];
        const thClasses = ['matrix-th-l1', 'matrix-th-l2', 'matrix-th-l3', 'matrix-th-l4', 'matrix-th-l5'];
        const cellClasses = ['cell-l1', 'cell-l2', 'cell-l3', 'cell-l4', 'cell-l5'];
        const tbl = document.getElementById('matrix-table');
        let html = '<thead><tr>';
        html += `<th class="matrix-th-dim" id="mh-dim"></th>`;
        levels.forEach((l, i) => (html += `<th class="${thClasses[i]}">${l}</th>`));
        html += '</tr></thead><tbody>';
        d.matrix_dims.forEach((dim, di) => {
          html += '<tr>';
          const lines = dim.label.split('\n');
          html += `<td class="matrix-dim">
          <span class="matrix-dim-badge">${dim.weight}</span><br>
          ${lines[0]}<br><strong style="opacity:.75">${lines[1]}${dim.star ? '<span class="matrix-dim-star"> ★</span>' : ''}</strong>
        </td>`;
          d.matrix_cells[di].forEach((cell, li) => {
            const isRich = typeof cell === 'object' && cell.s;
            html += `<td class="${cellClasses[li]}">
            <span class="cell-tag">${levels[li]}</span>
            ${
              isRich
                ? `<span class="cell-summary">${cell.s}</span><ul class="cell-points">${cell.p.map((pt) => `<li>${pt}</li>`).join('')}</ul>`
                : cell
            }
          </td>`;
          });
          html += '</tr>';
        });
        html += '</tbody>';
        tbl.innerHTML = html;
      }

      function renderDimCards(lang) {
        const d = DATA[lang];
        const grid = document.getElementById('dim-grid');
        grid.innerHTML = d.dims
          .map((dim) => {
            const lines = dim.title.split('\n');
            return `<div class="dim-card">
          <div class="dim-card-num">${dim.num} <span style="opacity:.4;font-size:9px;letter-spacing:.08em">${dim.caper}</span></div>
          <div class="dim-card-title">${lines[0]}<br>${lines[1]}</div>
          <span class="dim-card-wt">${dim.weight}</span>
          <div class="dim-card-desc">${dim.desc}</div>
          <div class="dim-card-threshold"><strong>${lang === 'ko' ? '규제 매핑 (L3 기준)' : 'Regulatory Mapping (L3)'}</strong>${dim.threshold}</div>
        </div>`;
          })
          .join('');
      }

      function renderComparison(lang) {
        const d = DATA[lang];
        const tbl = document.getElementById('compare-table');
        let html = '<thead><tr>';
        d.compare_headers.forEach((h, i) => {
          const cls = i === d.compare_headers.length - 1 ? 'highlight' : '';
          html += `<th class="${cls}">${h}</th>`;
        });
        html += '</tr></thead><tbody>';
        d.compare_rows.forEach((row) => {
          html += '<tr>';
          row.forEach((cell, i) => {
            const last = i === row.length - 1;
            const cls = last ? 'highlight' : '';
            const icon =
              cell === '✓'
                ? '<span class="check">✓</span>'
                : cell === '✗'
                  ? '<span class="cross">✗</span>'
                  : cell.startsWith('△')
                    ? `<span class="partial">${cell}</span>`
                    : cell;
            html += `<td class="${cls}">${icon}</td>`;
          });
          html += '</tr>';
        });
        html += '</tbody>';
        tbl.innerHTML = html;
      }

      /* ─── RADAR CHART ─────────────────────────────────────────── */
      const sliderVals = [1, 1, 1, 1, 1];

      function renderRadarSliders(lang) {
        const d = DATA[lang];
        const container = document.getElementById('radar-sliders');
        container.innerHTML = d.radar_dims
          .map(
            (dim, i) => `
        <div class="radar-dim-row">
          <div class="radar-dim-label${dim.includes('★') ? ' star' : ''}" style="font-family:${lang === 'ko' ? 'var(--font-kr)' : 'var(--font-en)'}">${dim.replace(' ★', '')}</div>
          <input type="range" class="slider" min="1" max="5" value="${sliderVals[i]}"
            oninput="sliderVals[${i}]=+this.value; updateSliderDisplay(${i}, +this.value, '${lang}')">
          <div class="slider-val" id="sv-${i}">${sliderVals[i]}</div>
        </div>`
          )
          .join('');
        updateRadarResult(lang);
      }

      function updateSliderDisplay(idx, val, lang) {
        document.getElementById('sv-' + idx).textContent = DATA[lang].radar_levels[val - 1] || val;
        drawRadar(lang);
        updateRadarResult(lang);
      }

      function updateRadarResult(lang) {
        const d = DATA[lang];
        const weights = d.radar_weights;
        let weightedSum = 0,
          totalWeight = 0;
        sliderVals.forEach((v, i) => {
          weightedSum += v * weights[i];
          totalWeight += weights[i];
        });
        const score = (weightedSum / totalWeight).toFixed(2);
        const levelIdx = Math.min(4, Math.floor((score - 1) / 0.9));
        const levelNames = ['Shadow', 'Reactive', 'Controlled', 'Governed', 'Adaptive'];
        const levelName = levelNames[Math.min(4, Math.round(score) - 1)];
        const resultEl = document.getElementById('radar-result');
        resultEl.innerHTML = `
        <div class="radar-result-score">${score}</div>
        <div class="radar-result-label">
          <span class="radar-result-level">L${Math.min(5, Math.max(1, Math.round(parseFloat(score))))} — ${levelName}</span>
          ${d.radar_result_prefix}
        </div>`;
      }

      function drawRadar(lang) {
        const canvas = document.getElementById('radarChart');
        if (!canvas || !canvas.getContext) return;
        const ctx = canvas.getContext('2d');
        const W = canvas.width,
          H = canvas.height;
        const cx = W / 2,
          cy = H / 2;
        const R = W * 0.38;
        const dims = DATA[lang].radar_dims.length;
        ctx.clearRect(0, 0, W, H);

        // Grid rings
        for (let ring = 1; ring <= 5; ring++) {
          ctx.beginPath();
          for (let i = 0; i < dims; i++) {
            const angle = (Math.PI * 2 * i) / dims - Math.PI / 2;
            const r = R * (ring / 5);
            const x = cx + r * Math.cos(angle);
            const y = cy + r * Math.sin(angle);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.strokeStyle = ring === 3 ? 'rgba(234,179,8,.35)' : 'rgba(217,214,206,.6)';
          ctx.lineWidth = ring === 3 ? 1.5 : 1;
          ctx.stroke();

          // Ring label
          const labelAngle = -Math.PI / 2;
          const lx = cx + R * (ring / 5) * Math.cos(labelAngle) + 4;
          const ly = cy + R * (ring / 5) * Math.sin(labelAngle) - 4;
          ctx.fillStyle = ring === 3 ? 'rgba(120,100,0,.8)' : 'rgba(168,173,183,.7)';
          ctx.font = '10px sans-serif';
          ctx.fillText('L' + ring, lx, ly);
        }

        // Spokes
        for (let i = 0; i < dims; i++) {
          const angle = (Math.PI * 2 * i) / dims - Math.PI / 2;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
          ctx.strokeStyle = 'rgba(217,214,206,.5)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        // Data polygon
        ctx.beginPath();
        for (let i = 0; i < dims; i++) {
          const angle = (Math.PI * 2 * i) / dims - Math.PI / 2;
          const r = R * (sliderVals[i] / 5);
          const x = cx + r * Math.cos(angle);
          const y = cy + r * Math.sin(angle);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = 'rgba(27,42,78,.15)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(27,42,78,.7)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Dots
        for (let i = 0; i < dims; i++) {
          const angle = (Math.PI * 2 * i) / dims - Math.PI / 2;
          const r = R * (sliderVals[i] / 5);
          ctx.beginPath();
          ctx.arc(cx + r * Math.cos(angle), cy + r * Math.sin(angle), 5, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(27,42,78,.9)';
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        // Dim labels
        ctx.font = `11px 'SUIT', sans-serif`;
        ctx.fillStyle = 'var(--obsidian)';
        const labels = DATA[lang].radar_dims.map((d) => d.replace(' ★', '').replace(' ★', ''));
        for (let i = 0; i < dims; i++) {
          const angle = (Math.PI * 2 * i) / dims - Math.PI / 2;
          const lx = cx + (R + 22) * Math.cos(angle);
          const ly = cy + (R + 22) * Math.sin(angle);
          ctx.fillStyle = '#1b2a4e';
          ctx.font = '10.5px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';

          const maxChars = 10;
          const label = labels[i];
          if (label.length <= maxChars) {
            ctx.fillText(label, lx, ly);
          } else {
            const words = label.split(/[\s·]/);
            if (words.length >= 2) {
              ctx.fillText(words[0], lx, ly - 7);
              ctx.fillText(words.slice(1).join(' '), lx, ly + 7);
            } else {
              ctx.fillText(label.substring(0, maxChars), lx, ly);
            }
          }
        }
      }

      /* ═══════════════════════════════════════════════════════════
       MAIN setLang
    ═══════════════════════════════════════════════════════════ */
      function setLang(l) {
        currentLang = l;
        document.documentElement.setAttribute('lang', l);
        document.body.classList.toggle('ko', l === 'ko');
        const d = DATA[l];
        Object.keys(d).forEach((id) => {
          if (typeof d[id] !== 'string') return;
          const el = document.getElementById(id);
          if (el) el.innerHTML = d[id];
        });
        document
          .querySelectorAll('.lang-switch button')
          .forEach((btn) => btn.classList.toggle('on', btn.dataset.lang === l));

        renderStaircase(l);
        renderMatrix(l);
        renderDimCards(l);
        renderComparison(l);
        renderRoadmap(l);
        renderRadarSliders(l);
        drawRadar(l);
      }

      const urlLang = new URLSearchParams(window.location.search).get('lang');
      setLang(urlLang === 'en' ? 'en' : 'ko');
    </script>
  </body>
</html>
